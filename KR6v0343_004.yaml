body:
  text: 宗喀巴大師造釋第三勝義菩提心之二癸二明理應修忍分二子一多思安忍勝利子二總勸修習安忍今初不忍之失既如上說違彼而忍功德云何頌曰忍招違前諸功德忍感妙色善士喜善巧是理非理事歿後轉生人天中所造衆罪皆當盡由修忍故能招感違前所說瞋恚諸失所有功德又修忍故當感妙色令諸善士見便歡喜是理非理悉能善巧分別歿後當於人天受生由瞋恚心所造衆罪皆當滅盡由思彼等引安忍力子二總勸修習安忍了知異生與佛子瞋恚過失忍功德永斷不忍常修習聖者所讚諸安忍了知前說異生瞋恚之過失及諸佛子安忍之功德即當永斷不忍一切時中常修聖者所讚之安忍壬三明忍度之差別縱回等覺大菩提可得三輪仍世間佛說若彼無所得即是出世波羅蜜此說安忍波羅蜜多亦分世出世間二類如前應知壬四明此地餘淨德此地佛子得禪通及能遍盡諸貪瞋彼亦常時能摧壞世人所有諸貪欲此佛子住第三地得安忍波羅蜜多最極清淨如是亦得初靜慮等四禪及空無邊處識無邊處無所有處及有頂等四無色等至慈悲喜捨四無量心神變天耳他心宿命天眼等五種神通雖於靜慮無色能出能入然除彼見能滿大菩提分由大願力故思於彼中生不復由其世間靜慮等至增上而生雖初地中已證是德然以此地定學增上較前尤勝或疑此地隨定受生故特說之又此地中能盡貪瞋及是亦義亦攝能盡未說之癡此中盡義非畢竟盡經說一切欲縛色縛有縛無明縛皆轉微薄故此等文義若依菩薩地意趣謂由靜慮無色世間定力於欲色無色皆悉離欲即斷如前所說之現行由是當知是說微薄縛亦同對法所說此中經又說見縛先滅有釋此謂後三見見道已滅當知是說分別五見初地已滅然菩薩地則說初於勝解行地由勝解諸法真如故即已斷諸見縛彼經又說邪貪邪瞋及以邪癡於無量百千億那由他劫所不能減於此地中悉得除斷此約斷種謂修所斷俱生煩惱分中上為六品從第二地至第七地依次而斷今說此地所斷者釋論雖未明說分別煩惱在初地斷俱生煩惱從二地斷然說未得第八地時一切煩惱種子皆不能盡又安立實執為煩惱障攝乃至未盡實執亦不能盡薩迦耶見然於初地已斷三結寶鬘論亦如是說故煩惱總分二類薩迦耶見尤當分二類極為明顯又此安立實執為煩惱之宗中凡以無漏道斷除煩惱則必斷一分實執種子除此種子外其餘現似二取之習氣立為所知障者雖少分亦不能斷乃至未盡一切煩惱必不能斷所知障諸所知障至三清淨地乃能斷除又住第三地時多作帝釋大主常能善巧令諸世間有情捨離貪欲為衆中首善度有情令出五欲淤泥拏錯譯此為亦令常時離貪欲較為易知辛三明初三度之別今為顯示前三波羅蜜多所依差別資糧體性并所感果故頌曰如是施等三種法善逝多為在家說彼等亦即福資糧復是諸佛色身因雖諸菩薩在家出家皆是施等所依若約修行難易則在家菩薩較易行施等三法故善逝為彼多說此三二資糧中福德資糧亦即此三法此福資糧是正感諸佛色身之因寶鬘論亦云此中施與戒并及安忍法別為在家說善修悲心要在家菩薩所修之布施謂財與無畏施尸羅謂在家分戒安忍謂諦察法忍出家菩薩則易修精進靜慮智慧然非彼二全無餘德智慧資糧謂靜慮與般若此二正是法身之因精進是二資糧之共因辛四結明此地功德發光佛子安住日先除自身諸冥暗復欲摧滅衆生暗此地極利而不瞋發光地佛子如住日輪自身所有無知冥暗凡能障礙生此勝義地者此地初正生時即先除滅復將此行相為他宣說欲使他衆生亦能摧滅障第三地之暗也又彼菩薩由滅障第三地功德之過失暗故如日輪光極明利然於犯過衆生不生瞋恚以於安忍善修習故已由大悲潤相續故釋第四勝義菩提心庚四焰慧地分三辛一明此地精進增勝辛二明此地訓釋辛三明斷德差別今初今明此地精進波羅蜜多較前三波羅蜜多增勝較餘六波羅蜜多下劣頌曰功德皆隨精進行福慧二種資糧因何地精進最熾盛彼即第四焰慧地若於善業心不勇悍必不能修施等諸行一切功德全不得生若於前說施等功德或已修集或當修集具足勇悍則已得功德倍復增長未得功德皆能獲得故說一切功德皆隨精進而行此精進即福德智慧二種資糧之因若於何地成就如是熾盛精進者則彼地名第四焰慧地第三地中由得增上定學勝前二地所生殊妙輕安畢竟斷除一切懈怠此地乃證故此地中精進波羅蜜多最為增勝辛二明此地訓釋何故此地名曰焰慧頌曰此地佛子由勤修菩提分法發慧焰較前赤光尤超勝此第四地佛子由修三十七品菩提分法較前增上從此所發智慧光焰較第三地所說如赤金光尤為超勝以發增上正智火焰故此地名曰焰慧如寶鬘論云第四名焰慧發正智焰故一切菩提分增上修習故彼招異熟果作夜摩天王善能破一切薩迦耶見等三十七菩提分法謂四念住等七聚四念住謂身受心法念住四正斷謂諸善法未生令生已生令長諸不善法未生令不生已生正斷四神足謂欲勤心觀三摩地神足五根謂信進念定慧根五力謂信等力七菩提分謂念擇法進喜輕安定捨正菩提分正等亦通前六支八聖道分謂正見思惟語業命精進念定聖道分正字通思惟以下聖道分亦通前七其第一聚為學所依學體性中第二聚為增上戒學第三聚為增上心學第四聚至第六聚為增上慧學立為三學故此地菩薩成就最勝慧學於三十七菩提分法若粗若細皆悉善巧辛三明斷德差別自見所屬皆遍盡自見謂微細薩迦耶見之我見所屬謂此見為首執著我人等主宰實有之粗分補特伽羅我我所執及執著蘊處界實有之法我執皆遍滅盡盡謂永斷此地所應斷二種我執之種子非一切皆盡經說猶有俱生薩迦耶見故釋第五勝義菩提心庚五難勝地分二辛一明此地訓釋辛二明靜慮增勝善巧諸諦今初大士住於難勝地一切諸魔莫能勝大士住於第五難勝地時一切世界諸天魔王尚不能勝何況其餘諸魔眷屬是故此地名曰難勝寶鬘論亦云第五極難勝諸魔難勝故善知聖諦等微妙深義故此所感異熟作覩史天王能破諸外道煩惱惡見處辛二明靜慮增勝善巧諸諦靜慮增勝極善知善慧諸諦微妙性第五地於十波羅蜜多中靜慮波羅蜜多最為增勝布施至精進四波羅蜜多增勝先已得訖故知此約餘六波羅蜜多說如此地已得靜慮波羅蜜多永不復為散亂等障品所伏但於般若波羅蜜多等則猶未能爾又此地非但靜慮增勝即於善慧聖諦深微體性亦極善通達故於粗細聖諦皆有善巧增上慧學問十地經說第五地菩薩善巧苦集滅道四諦次復別說善巧世俗勝義二諦父子相見會及中論復說世俗勝義二諦決定豈離二諦別有四諦耶答雖無二諦所不攝之諦然為顯示所治雜染品中集諦為因苦諦為果與能治清淨品中道諦是因滅諦是果故說四諦釋論說彼苦集道諦是世俗諦滅諦是勝義諦六十正理論釋亦云涅槃是勝義諦餘三諦是世俗諦所言涅槃即是滅諦六十正理論釋又說大師親說現證滅諦若如實事師所許現量但緣自相事則不能爾又自宗以無漏根本智親證真實義成立滅諦可以現證若說滅諦是世俗諦則此建立亦不應理又多勵力成立證涅槃時必須現證真實義故說滅諦是世俗諦猶未得正解也又於有法上遣除所破實性即勝義諦然勝義諦之所遣除者非於所知決定非有如法界讚云由不知何法流轉於三有敬禮彼法界遍住諸有情原為生死因若已善淨治清淨即涅槃亦即是法身此說有垢之法性若淨治離垢即是涅槃及法身處處說清淨法性所遣即諸垢染若謂法性不可離垢則徒勞無果若謂可離則彼所遣是所知中有如無兔角所遣之兔角雖於所知非有然遣除所知中可有之瓶立為無瓶亦可安立為無兔角若依總遍一切染淨諸法之法性而言雖所遣二我於所知非有然由諸法垢染漸淨則彼法性亦必隨之垢染漸淨故於殊勝有法位其法性僅有一分清淨自性清淨猶為不足必須隨各位離垢清淨即說此淨名為滅諦十地經中於此地復說善知相諦等雖立多種諦名當知彼等亦非二諦所不攝也釋第六勝義菩提心之一巳二釋第六現前地分四庚一明此地訓釋與慧度增勝庚二讚慧度功德庚三觀甚深緣起真實庚四結述此地功德今初現前住於正定心正等覺法皆現前現見緣起真實性由住般若得滅定由第五地已得清淨靜慮波羅蜜多故第六現前地得住最勝定心以此為依現見甚深緣起實性即此菩薩住第六地由得最勝般若波羅蜜多故得住滅定前五地中以未得增勝般若波羅蜜多故唯由施等五波羅蜜多增勝不能得滅定也又由般若增上現證法性如影像故第五地中見道諦故正等覺法現前得故此地名現前地疏中釋第二理由謂能知所知不可得道已現證故然釋論說見道諦者是舉四諦中最後諦義謂彼地於粗細四諦得善巧故第六地已得圓滿善巧四諦慧第一理由顯示圓滿善巧順逆緣起之慧學由已圓滿此二慧學故四諦緣起皆得現前如是當知此地圓滿三種慧學又奢摩他若何增勝則毗鉢舍那亦隨增勝第五地既得最勝靜慮波羅蜜多則此地自亦能得最勝般若波羅蜜多故從此地後乃得入不共滅定也寶鬘論云第六名現前現證佛法故由修止觀道得滅定增廣此地異熟果作善化天王聲聞無能奪能滅諸我慢善化即化樂天庚二讚慧度功德此顯諸餘施等資糧要依般若波羅蜜多方能趣果頌曰如有目者能引導無量盲人到止境如是智慧能攝取無眼功德趣勝果如一有目士夫能引一切盲人到達欲往之處如是於修道時亦由般若波羅蜜多能不顛倒明見正道非正道故便能攝取如無眼之布施等功德趣向聖位佛果般若攝頌云無量盲人無引導不能見道入城廓闕慧五度無眼導無力能證菩提果能斷金剛經云善現如士夫入於暗室都無所見當知菩薩若墮於事而行布施亦復如是善現如明眼士夫過夜曉已日光出時見種種色當知菩薩不墮於事而行布施亦復如是於持戒等當知亦爾庚三觀甚深緣起真實分五辛一立志宣說甚深義辛二可說深義法器辛三說後引發功德辛四勸法器人聽聞辛五宣說緣起真實今初云何現見緣起之真實性釋論答云彼緣起實性非吾輩無明厚翳障蔽慧眼者之境界唯是第六地以上之境故此不應問吾等應問已塗善見空性安善那藥除無明翳成就慧眼之諸佛菩薩由此當知如塗安膳那藥令眼明了非剜其眼如是由塗善見空性安膳那藥令慧眼明了非剜明眼故此宗無誹謗聖根本定全無智慧之惡見也問般若經與十地經等豈不明說修行般若波羅蜜多菩薩見緣起性乎故但當隨彼聖教而說答聖教密意亦難解吾輩雖依聖教亦不能說也此依自力解說而言然堪為定量大士所造宣說真實義諸論則能無倒解釋經義要依彼論乃能了解聖教密意頌曰如彼通達甚深法依於經教及正理如是龍猛諸論中隨所安立今當說如彼六地菩薩通達最甚深法如是龍猛菩薩無倒了解諸經義已於中論中依諸經藏及餘正理顯示諸法真實義極為明了故月稱論師唯依龍猛菩薩論中所說真實義今當如彼教規而說云何得知龍猛菩薩無倒解釋了義經義耶答由教證知如楞伽經云南方碑達國有吉祥苾芻其名呼曰龍能破有無邊於世宏我教善說無上乘證得歡喜地往生極樂國此說龍猛菩薩能離有無二邊解釋了義大乘金光明經說此菩薩是佛世離車子一切世間樂見童子後身大雲經云我滅度後滿四百年此童子轉身為苾芻其名曰龍廣宏我教法後於極淨光世界成佛號智生光故此菩薩定能無倒解釋經義曼殊室利根本教說誕生年代與名號同說住世六百歲大法鼓經說一切世間樂見離車子童子於大師滅度後人壽八十歲教法衰微時轉身為名含大師德號之苾芻廣宏聖教滿百歲後往生極樂世界覺賢上座與阿底峽尊者說此亦是授記龍猛菩薩蓋以樂見離車子與龍猛菩薩是一體故大法鼓經說彼苾芻位登七地然不能成與前衆經決定相違如有經說四大天王證預流果亦有經中說已成佛如是等類經中非一辛二可說深義法器了義諸論唯應為夙植通達空性種子者說不可為餘人說以彼聞空性諸論轉於空性起邪執心當獲重大非義也獲重大非義者或有因不善巧故謗毀空性而墮惡趣或有誤解空性深義顛倒妄執諸法全無或全非有初生邪見謗一切因果等法次著不捨展轉增長如云不能正觀空鈍根則自害如不善咒術不善捉毒蛇顯句論釋此云要不墮於損減世俗邊不違害如影像之業果要不墮於增益勝義邊知唯無自性乃能有業果若與此相違說為墮常斷二邊又說妄計諸行非有是為邪見故無與非有言雖異而無之行相則無差別四百論云一墮於惡趣正見證寂滅釋云不善士夫聞無我法由生謗毀反起邪執應墮惡趣說彼二種俱墮惡趣起邪執者謂執空性為非有義由是若無簡擇最微細義之慧力妄矜為有於不適自機之甚深義文強作勝解必當引生重大非義故於此處應極慎之問何種機可說空性何種人不應說空性此既難決定為以何方便能了知耶答由外相狀即能了知頌曰若異生位聞空性內心數數發歡喜由喜引生淚流注周身毛孔自動竪彼身已有佛慧種是可宣說真性器當為彼說勝義諦其勝義相如下說諸異生初發業時無倒聽聞空性言教若彼聞已於此言教內心數數引發歡喜由此歡喜流淚毛竪則知此人有正覺慧無分別智種即通達空性之種子此人即是阿遮利耶可為宣說真實義之法器當為此人宣說真勝義諦勝義諦行相下當廣說此等相狀要由無倒聽聞空性言教及聽已了解之所引生若聞而未解或了解而無彼相狀雖暫不知是否甚深法器然若能不違善知識之教誡亦是堪新植通達空性功能之法器也辛三說後引發功德為堪聞者宣說空性非空無果頌曰彼器隨生諸功德常能正受住淨戒勤行布施修悲心并修安忍為度生善根回向大菩提復能恭敬諸菩薩彼聞空性見非但不於空性起顛倒執引生無義且能隨行所聞引生功德謂彼法器聞空性見如獲寶藏為令空見於餘生中不退失故常能正受安住淨戒彼作是念我若犯戒必以此而墮惡趣致空見為之間斷故能受戒守護不犯此言犯戒不限先受淨戒違品諸自性罪皆是犯戒也又作是念我縱能嚴持淨戒生諸善趣倘生貧家缺乏飲食衣服醫藥資生之具恆須追求則聽聞空見及修習空義皆將間斷遂於前說上下福田盡力供施復作是念此空性見要以如上所說大悲攝持方能引生佛果故恆修大悲心而為根本復作是念由瞋恚力能墮惡趣能壞善根能令顏色極不可愛緣此令諸聖者不生歡喜故當修安忍又見持戒等善根若不數數回向一切種智則非成佛之因亦不能恆感身及資財無量妙果故持所有戒等善根為度衆生出生死故回向菩提又見二乘等不能如諸菩薩宣說甚深緣起故於諸菩薩所起極敬重心得空見諸大乘人由生清淨正見於修廣大行品起極敬重此是最應稱讚之處菩提心釋云由知諸法空復能說業果此為最甚奇此乃極希有是故必須永離二種非器或不信解而生毀謗或似信解而以正理破除一切因果等法即依無自性之空見了達一切能作所作諸法極為應理也若非如是自謂己得正見而於持戒等一切業果建立見如兔角之花紋謂彼等行是對未知了義者說已知了義即不須彼此乃妄執一切皆是分別所作一切分別皆是著實之相執故便同支那堪布摧毀一切善根也或有妄說就亂識前暫許取捨若於分別仍分是否實執二類則說破自性之正理能破一切境便成誑語若不分二類則見行二種分別應互相違害勢同水火其安立取捨處之亂識與能安立者并所安立法皆應無處安立縱作此等說適成前引諸論之敵者也辛四勸法器人聽聞善巧深廣諸士夫漸次當得極喜地求彼者應聞此道如上所說甚深廣大之理若有士夫能善巧者則於異生位中不久即能修集甚深廣大福智資糧漸次當得極喜地故凡欲求極喜地者應聽聞此甚深道也此即勸令聽聞如四百論釋云若極愛重自性空論當修彼順緣門即凡能於空性增長淨信者當如是行又由悲心故欲報佛恩故欲令自身正法離諸險難因緣故當行諸難行施諸難施以四攝事攝衆生於正法器盡力宣說此正法教此謂於遠離非器二過失者當勵力宏揚此法若未如實了知其勝解者應先以不違緣起之法而為宣說若諸說者善知聞者成就法器為之如理講說其福極大集經論云若信解甚深法便能攝集一切福德乃至未成佛以來世出世間一切勝事皆能成辦如寶施童子經云曼殊室利若諸菩薩無善巧方便經百千劫修行六波羅蜜多若復有人聞此正法生疑心者所得福德尚多於彼何况無疑而正聽聞及以書寫受持講說為他開示能斷金剛經云佛告善現於汝意云何殑伽河中所有沙數設有如是沙等殑伽河是諸殑伽河沙寧為多不善現答言甚多世尊諸殑伽河尚多無數何況其沙佛言善現吾今告汝若善男子善女人以妙七寶盛滿爾殑伽河沙等世界奉施如來是善男子善女人由此因緣所生福聚寧為多不善現答言甚多世尊甚多善逝世尊告曰若復有人於此法門乃至四句伽陀受持讀誦廣為他說所生福聚甚多於前如來藏經於說上品十不善法後云假使衆生具足彼等若能悟入諸法無我信解諸法本來清淨則彼衆生必不墮惡趣降魔品亦云若有苾芻了知一切諸法最極調伏了知衆罪前際性空則能滅除犯戒憂悔令不堅固於無間罪尚能超勝况犯軌則尸羅微細邪行未生怨王經云諸造無間罪者若能聞此正法信解修行我不說彼業是真業障此等是說若講說聽聞及餘時中信解思惟甚深法義之勝利要具二緣方能獲得所說勝利一發清淨心謂不顧戀名利恭敬等二不倒說謂不倒執所說法義若具二過或隨一過皆能障礙無量功德世親論師云故若顛倒說法及心雜染希求利養恭敬名聞而說法者失壞自身大福德聚其聞法者發清淨心與不倒解法義亦極重要辛五宣說緣起真實分三壬一聖教宣說真義之理壬二以理成立聖教真義壬三說彼所成空性之差別初中又二癸一引聖教癸二明了知真實之障今初十地經說第五地菩薩欲入第六地者當觀諸法十平等性何等為十謂一切法無相故平等性一切法無體故平等性無生故無起故遠離故本來清淨故無戲論故無取無捨故平等性一切法如幻如夢如影如響如水中月如鏡中像如化事故平等性一切法有無不二故平等性菩薩如是善通達一切法自性得明利隨順忍得入菩薩第六現前地此中無取無捨二者合為一平等性如幻等七喻合為一平等性末二亦合為一平等性明十種平等性十地經釋與菩薩地有所不同彼二與此宗解釋空性亦不相同故此中更當別釋其中初平等性謂於聖根本智前諸法異相皆不顯現第二謂一切法皆無自體故平等此二是總標餘八性是別釋第三無生依未來世說第四無起依餘時言此亦通一切法皆悉平等以下諸性當知亦爾第五遠離謂當生已生空此即由第二自體平等性相所顯之遠離此復非是現以教理令其遠離乃是本來即如是清淨是第六性第七性謂無二取戲論即與第一性義合若作名言分別所不能論解即是第二性之差別第八性之差別亦如是第九性謂能證成前義諸譬喻門第十性謂一切法若有事無事皆無自性明利謂速慧隨順謂與第八地無生法忍相隨順此隨順忍以隨位不同有多種異釋宣說諸法真實義之教文雖多今是解釋第六地慧通達真實故但引以十種平等性證第六地之教也癸二明了知真實之障於决擇諸法無實中若不善解何為實有及如何執實有則於真實義見定有錯失入行論云未知所觀事必不取彼無此說心中若未善現起所破事之總相則必不善緣取彼所破事之無以是心中若未如實現起所無之實有行相及由何事空之所破行相則必不能定解無實與空性也又此所破唯由宗派遍計之實有及略知實執猶為未足必須了解無始隨逐傳來為宗派變未變心者共有之俱生實執及彼所執之實有若未能解此則雖以正理破其所破然於無始隨逐傳來之實執全無所損又應先解自身之實執次當善知以諸正理直接間接破除彼境之理以若唯作向外轉之破立則利益甚微也此中若能善知自續應成中觀兩派所明乃能善辨所破差別釋此分二子一明自續中觀派之實執子二明應成中觀派之實執初又分三丑一明實有與實執丑二以幻事喻明觀待世間之實妄丑三法喻合釋今初自續派之論典於所破多未明說惟中觀明論釋世俗有可就其違品之有知其何為勝義有或真實有如彼論云於無真實性事增益違上行相之亂覺名為世俗此能障真或由此能蔽真實故如經云法生唯世俗勝義無自性於無性錯亂說明真世俗從彼所生由彼所顯現所見一切虛僞之事名唯世俗此復由無始錯亂習氣成熟增上而生由此能於一切含識示現似有真實事性令見為有故由彼等意樂增上安立一切虛僞性事名唯世俗有亂覺以上明於勝義無自性錯亂為有之義從名為世俗至蔽真實故明真世俗之義世俗是能障義謂能障蔽真實也從彼實執所出生故由彼實執現似實有能見彼者是分別心非是根識與二諦論釋之所破實有非根識所見義同從此復至而生明彼實執是俱生執故云於一切含識彼等含識之意樂非唯分別心亦有無分別心由彼二種心增上安立為有非勝義有之諸虛僞事名唯世俗有者即法生唯世俗之義非謂於實執世俗中有也由是當知若謂非由於心顯或由心增上之所安立而是彼義自體中有即是實有勝義有真實有若執彼有即是俱生實執中觀明論云言勝義無生者謂由真智不能成立諸法生也準此可顯若觀真實義智而能成立為生及有者即勝義之生有此與前說復云何通答誠如所問當知於所破所加之勝義簡別有二勝義一以聞思修三種理智為勝義如上所說即由彼不成者二以非由心增上安立而是彼義自體中有為勝義有凡前種勝義及彼所成就皆可是有後種勝義及彼中有皆定非有以是若後勝義中有則前勝義中亦决定有然執有前者非俱生實執其俱生實執必須執後者為實有也頗有未能辨別此二之差別於明所破時便謂堪忍正理觀察或堪觀之事為所破量齊由此或說勝義非有或說是實有異說競起若能善辨前義則知說實性中無勝義中無與說法性是有法性即實性即勝義都不相違也丑二以幻事喻明觀待世間之實妄欲知何為以心增上安立或不安立為有由彼幻喻即易於了知如幻師變木石等為象馬即彼幻師與眼識迷惑之觀者及眼識未迷者之三人中初唯見為象馬而不執為象馬第二類人既見且執第三類人象馬之執見俱無又彼幻物現為象馬者不可妄謂如誤繩為蛇於彼識前繩現為蛇而繩實非蛇如是唯於亂識前現為象馬然彼幻物不現為象馬此即不加簡別必須許幻物現為象馬若不爾者應於所見都無迷亂若約此義安立幻物現為象馬則約幻師言唯由亂心如是顯現增上而立非由幻物本體增上而立也約觀者言則不自覺所見象馬由心增上而立反執彼幻處確有真實之象馬存在此即就喻說明由心增上安立與不安立之理故於彼物現為彼像是否所現之實體有其二類若善解此義則餘妄計諸實事宗亦由能量增上安立所量能量即心由彼安立所量亦即由心增上安立則彼亦應破除實有於此等二宗紊亂之點皆能分別由能量安立所量是由能量通達二種所量之實性彼與前說實極不相同成立如是幻相者若順瑜伽行之中觀師謂由自證現量成立若許有外境之自續師則謂由緣地方及虛空等之根識現量成立如現非有者謂若如是有者則於眼未迷者應亦能見然彼無所見是故現似象馬與象馬本空二義俱存此依未學教者通常名言識成立為妄與成立鏡中影像為空之心俱非粗細任何理智若依通常名言識增上果是實有者則應凡所見事彼事非空若彼事為空則應不可見此二既俱存則知依通常名言識增上者唯是虛妄也丑三法喻合釋如眼識迷惑之觀者認幻事為實有如是諸有情類見內外諸法似真實有不知唯由自心顯現增上安立執為諸法自體實爾是為無始傳來俱生實執此自續派所安立者若以應成派觀之則彼執所破之心猶覺太粗仍非最細之俱生實執若時能以正理破彼實執所計之實有則猶如幻師了知唯由內心增上安立為有不復妄執內外諸法實體本爾此復是許由無正量違害之心增上安立者乃名言有非許凡由心增上安立者一切皆是名言中有從種生芽雖由心增上安立然說芽體從種子生亦不相違如幻物自體亦變為象馬一切名言有法皆當如是知即諸法性亦由能見自體之心增上安立為有故名言中有無不遍一切之失以是有說如幻事現為象馬而象馬實空如是瓶等一切法雖現為瓶等然瓶等亦本空當知全非幻喻喻法合釋之義若如彼說則應全無是彼法者即法喻合釋亦應唯現為彼相非是彼事若時生起根本無分別智一切二取相於彼皆滅此如眼識未迷者之於諸幻相見執俱無自續派以正理破執之不共義下不復說故於此中當略說之彼謂所知中有有事無事二類先說有事於有事中有色非色二類若是色法破其無東西等方分若是心法破其無前後等時分如餘處說由此成立凡是有事定屬有分次破分與有分若異性者應全無關係若一性者爾時於彼應審諦觀察其體雖是一然現相似異乃無可否認之事實故能决擇雖現彼事即由彼為空猶如幻事次觀彼事若是由心顯現增上安立之妄體可不相違若彼非由心顯現增上所立而實體如是者則定不應理以如前說實有法上體性現相不相隨順不容有故若是實有必一切種離虛妄故見為異性之心應非錯謬則違一性此若已成則於無事法亦依此理而破實有如虛空無為應許遍諸色法則亦應許彼有遍東分與遍餘方之分如是法性亦有所遍諸分及有前後覺慧通達諸分餘無為法亦如是此分與有分亦非異性而應是一性若此性是妄可不相違若實有則不應理廣如前破如是觀察便能成立一切所知皆非實有是靜命師徒所許有說分與有分唯觀有事非也未學宗派者共許之虛妄與中觀師所許之虛妄不同由心安立雖亦為彼等共許然僅彼義自宗不許為由心安立由是當知此派中雖無非由內心顯現增上安立之體性然許有非唯假名由彼增上安立之體性亦不相違故兩派中觀之所破於內心安立上有極大之不同若將此派之實有實執與破實執之正理先善為引導次乃示以應成正宗則善能分辨正見之差別故於此中略為宣說子二明應成中觀派之實執分二丑一明由分別增上安立之理丑二明執彼違品之實執今初塢波離問經云種種可愛妙花數悅意金宮相輝映此亦未曾有作者皆從分別增上生分別假立諸世間此說諸法皆由分別增上安立說一切法唯由分別假立及由分別增上安立者餘證亦多六十正理論云正等覺宣說無明緣世間說世是分別云何不應理釋論釋此義謂一切世間非自性有唯由分別之所假立百論亦云若無有分別貪等亦非有故智者誰執真義及分別釋論云有分別方有彼貪等若無分別彼等亦無决定當知如於繩上假立為蛇定無自性真義謂有自性分別謂依彼而生彼貪等如於繩上假立為蛇者乃舉一例餘一切法皆是分別假立如於繩上假立為蛇由彼之雜色盤伏與蛇相似若於境不明便起彼繩為蛇之亂覺爾時若繩總體若繩一分都無少分可安立為蛇者故知彼蛇唯是分別假立如是依於諸蘊便起我想然彼諸蘊若前後相續若同時總體或一分全無少分可安立為我者離蘊分及有分之外亦無少分異體可安立為我者故彼我唯是依蘊分別假立都無自性寶鬘論云士夫非地水非火風非空非識非一切異此無士夫此中士夫即補特伽羅有情自我非地乃至非識破有情六界之一分為我非一切破六界之合集為我末句破離六界外異體之我然非不許補特伽羅亦非別許阿賴耶識等為補特伽羅故如釋論所解正是菩薩所許也若了知由分別心安立補特伽羅之理由分別心安立餘一切法與彼義同如三摩地王經云如汝知我想如是觀一切般若攝頌云知自及諸衆生等乃至諸法亦復然寶鬘論云如六界集故士夫非真實如是一一界集故亦非真初二句謂依六界合集假立為士夫後二句謂離分與有分之法决定非有故一一界皆依多分合集假立則分及有分皆非安立為彼之事離彼二外亦無異性可立為彼之事也瓶等諸法由分別安立之理雖與繩上假立之蛇相同然瓶等諸法與繩上之蛇為有為無及有無作用等則極不相同以彼二事須否决定名言即立彼名有無違難等極不同故說分別安立之法能有各別作用者是佛護靜天月稱三大論師解釋龍猛父子意趣之不共勝法此亦即是中觀見之究竟深處如寶鬘論云色法唯名故虛空亦唯名無種寧有色故名亦非有受想及行識如大種如我皆應如是思故六界無我又云唯除於假名若云有云無世間寧有此此說於勝義中名亦都無除名言中唯由名言增上安立都無所有故唯是假名若善了知以上諸義則能善解一切諸法皆是依緣安立依緣假設依緣而生皆無自性皆無不由他名增上安立之自在體隨立何法皆是不尋彼假義而安立者
