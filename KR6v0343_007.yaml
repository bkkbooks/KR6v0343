body:
  text: 宗喀巴大師造釋第六勝義菩提心之四巳四明全無自性生分二午一破計有自相午二釋妨難初又分三未一聖根本智應是破諸法之因未二名言諦應堪正理觀察未三應不能破勝義生今初論曰全無少法由自性生決定應許此義應説決定須許此義不可倒説此宗全無所許若不爾者頌曰若謂自相依緣生謗彼即壞諸法故空性應是壞法因然此非理故無性若謂色受等自相係由自性所成之自體是依因緣生者則修觀行者現證諸法自性空時應是謗毀諸法自性而證空性以根本智不見色等若諸法有自性根本智應見然實不可見則諸法應無若諸法無者於根本智前諸法原有後乃成無應是破壞則根本智為此破壞之因若見空性是毀壞諸法自性之因如錘等是擊壞瓶等之因者不應正理故知諸法都無自性終不應許有自性生許有自相生之中觀師以計有自相非是實有之理由雖救云色等有自相不必為現見真實義之聖智所見然有自相即成實有前已解説後理復破故不能救也釋論於此處引寶積經云復次迦葉中道正觀諸法者不以空性令諸法空但法性自空無相無願無作無生無起亦如是説此説諸法若有自相之體性則非諸法自空經説法性自空則不應理倘不從自體破除自性須以他空而説名空則違經説不以空性令諸法空故是説以中道觀察諸法自性時要從諸法自體空乃為自性空此經亦破唯識宗所説依他起自相不空由無異體能取所取説名為空四百論云願我得涅槃非不空觀空以佛説邪見不能得涅槃中論亦云大聖説空法為離諸見故若復見有空諸佛所不化此等即是解前經義亦即説諸法自相空義有説瓶不以瓶空而以實空是他空義瓶以瓶空乃是自空極不應理若瓶以瓶空瓶應無瓶若自法上無自法他法上亦應無自法則瓶應成畢竟無餘一切法皆應如是作是説者亦應非有則説以此是空以彼不空等建立應皆無有如斯之空有説是真空者有許是斷空者彼俱未知諸佛菩薩數數宣説緣起遠離常斷二邊之義尤其宣説一切世俗諦皆須決擇自法以自法空而復許彼是斷空者極不應理以四宗中絶無既知該見為斷見復令自身生彼見者也雖所依事無所破體及彼所依由所破空其空相同然説諸法以自相空是自體空義其餘之空非自體空此中理由謂以正量成立前空乃至功力未失之時其由宗派妄執彼事為實有之增益定不得生若以正量成立後空乃至功力未失之時則起宗派之實有增益都不相違也未二名言諦應堪正理觀察問以無勝義生故雖破自他生然色受等法是二量所得應許彼等自性是從他生若不許爾如何説有二諦應唯一諦故定有他生此中敵者許勝義無生及名言他生故是自續中觀師言若於世俗不許自性生之他生應唯一諦者義謂若於世俗無自相生則無真正世俗由無世俗諦故應唯一勝義諦也答此實如是於勝義中非有二諦如經云諸苾芻勝諦唯一謂涅槃不欺誑法一切諸行皆是虛妄欺誑之法此等義説自宗所許之諦義謂不欺誑不欺誑之諦唯一故曰此實如是言於勝義中者謂於見真實義之智前無有世俗勝義二諦説彼智前唯一勝義諦故言勝諦者謂勝義諦以説彼智前無世俗諦謂欺誑法故可證知總之若諸法由自相有則諸行不成虛妄欺誑之法由無世俗諦故二諦俱無無自相宗乃有世俗勝義二諦設作是念前經既説唯涅槃諦實餘諸行虛妄諸有為法雖無自相涅槃勝義諦寧非由自相有耶曰涅槃之諦經説為不欺誑法故是不欺誑義非有自性之諦實由説一切諸行皆是虛妄欺誑之法亦可證知前所説諦是不欺之義也六十正理論釋亦云如有為法顛倒顯現欺誑愚夫涅槃勝義則不如是顯現欺誑故説涅槃諦實餘不諦實故定應許此分諦不諦實是欺不欺誑之義六十正理論釋説涅槃於世俗為諦者義謂就世俗前安立涅槃勝義為有非許涅槃於名言中為諦實也由世俗諦是悟入勝義諦之方便故中觀師應如世人安立名言亦不觀察自生他生而許為有頌曰設若觀察此諸法離真實性無可得是故不應妄觀察世間所有名言諦設若觀察此色受等法為從自生為從他生等則唯見真實性勝義無生無滅離實性外別無生等可得故世間名言諦不應觀察自他生等唯如世人所見由此有故彼法生等以是世間悟入名言之門則應受許提婆菩薩云如於蔑戾車餘言不能化如是世未知不能教世間中論亦云若不依俗諦不得第一義不得第一義則不得涅槃回諍論云若不受名言我等不能説此中所言觀不觀察是説觀不觀察真實義此復了知齊何觀察是觀察真實義最為切要故當略説應成派説若唯假名猶嫌不足如云芽生必須尋求此假立義為從自生抑從他生即安立為觀真實義故與世間言説從何處來向何處去及言在內在外等之觀察極不相同自續諸師唯彼觀察猶不立為觀真實義要如前説觀其為由於識顯現增上安立為有抑非由彼增上安立是由彼義實體而有如是乃是觀真實義由明所破不同之關係故觀察真實義之界限亦不相同有未解此義者妄謂譬如此處天授實不曾來誤彼已來次審觀察為來未來乃知其未來凡一切不觀察之建立皆是顛倒觀察之建立乃不顛倒此説俱非中觀因明之義以彼二派不觀察之建立皆有無量以正量成立之事故餘處已廣説故不繁贅如是當知若以觀察真實義之正理觀世俗法則一切世間名言皆當失壞未三應不能破勝義生如是於一切法上破實執時其執名言諦實有者驚惶失措大聲呼曰自相實體為雜染清淨繫縛解脫之因應許有生也彼雖作是説亦唯存空言何以故頌曰於真性時以何理觀自他生皆非理彼觀名言亦非理汝所計生由何成如以觀真實勝義時所説正理觀察色等自生他生皆不應理如是即以彼理觀察名言亦不應理則汝所計之自性生為由何量成立由自相生二諦俱無汝雖不樂亦定當受許也其以觀真實義之正理於名言中所破之生在接續文中謂實體之生在結文中則如上説故皆是於所破上加自相生之簡別非破總生於名言義不可作勝義觀察已數宣説故若觀察真實義之正理不能於名言中破自相生應許亦不能破勝義生以有自相即成實有故加不加名言簡別都無差別如是於所破上加自相自體自性等簡別者於佛經中及龍猛師資并此論師之論中數見不鮮破彼等時有一類中觀師亦是敵者如前已説顯句論亦云此唯應如是許若不爾者寧非世俗亦具正理以是則成真實義非世俗法此破唯以假名猶覺不足必要觀察假立之義乃能安立名言義者如是則色等成勝義有非世俗有此是與不許勝義有而許世俗有者所出過難此復非説實事師故是説自續中觀師極為明顯論師又云有謂龍猛菩薩言非自非從他等破生者是破異體能取所取遍計執生非破依他起實有此解無因不能成立作是説者唯應結難此中敵者先覺有説是安慧論師者然安慧論中全無彼説護法論師釋四百論作唯識解似是指彼若爾將甚深經義作唯識解者於龍猛論義當如何釋世親菩薩等之論中未見解釋龍猛菩薩之論義唯釋正理論等皆依解深密經釋般若經為不了義應如是釋以龍猛諸論未有破者若如言解釋則般若經亦應如言解釋若説彼言為不了義則須將彼義作唯識釋也然論説一切諸法非勝義有非自相有此如言義有理成立無能違害不可解釋為不了義故密意説唯應結難於如言義舉無量能立於相違品出無量結難即是成立彼教義不可引作別解也午二釋妨難問若自相生二諦都無則無色等世間眼等識應不可見色等體性若不爾者應眼等識亦見兔角理相等故頌曰如影像等法本空觀待緣合非不有於彼本空影像等亦起具彼行相識如是一切法雖空從空性中亦得生法本空謂虛妄影像等等谷響等依待明鏡本質空谷發聲等因緣合集便生影響等非是世間不許有者於彼世間所許有中從虛妄之影像等亦生具彼影像等行相之眼等諸識如從虛妄影像生虛妄行相之識如是一切法雖皆自相本空然從自相空之因亦得生自相空之果此説從影像生緣影像之眼識故知影像亦是有事由與內識體異故是外境復是眼識之所緣緣故許為色處第二月毛輪相幻相谷響等應知亦爾如是應知錯亂根識所見之本質第二月毛輪等與無現前錯亂之五根識所見之自相相同本質等本來非有而現有本質與本無自相現為有自相相同影像與谷響等與色聲等相同以是色等五境為有自相雖不立為外境而現為有自相之色等則立為外境如是影像等為本質雖不立為外境其影像等亦可立為外境故彼二法可否立為外境相同影像空無本質之虛妄義世間老人全未學習空性之教理者亦能了知故説了解彼義是一種粗淺理智不應道理問若爾雖已成立世人所説之影像虛妄仍不成立中觀所立之虛妄前者如何為後者喻答此舉影像等喻是舉世間已極成者為喻非以中觀所立之虛妄已極成者為喻此復是以影像現似本質不能分別此分現似本質某分不現似本質雖一切分現似本質如現而空然依自因生亦不相違取此為喻成立青色現似有自相亦不可分別現不現有自相之二分如斯顯現雖一切分皆如現而空然自從因生亦能生果都不相違若能了知影像現似本質雖一切分如現非有然能安立影像不無則亦能知青色現似有自相雖一切分如現非有然能安立青色是有以精細慧辨色等上有破不破之二分先就影像喻上而分是求中觀見者必不可少之事故不應略知便足也釋論亦云若知影像無自性之因果建立誰有智者由見有色受等不異之因果諸法而定執為有自性耶故雖見為有亦無自性生前説有生今説無自性生是明説有與自性有生與自性生之差別若不能分彼等差別説法是有便計為自性有説自性無便執為斷無終不能出增減二邊四百論釋云如實事師乃至説彼法有便計亦有自性若時捨離自性便執彼法畢竟非有如同兔角如此執著不出二邊終難合理以是當知由無自性故離一切有邊由能安立無自性之因果故離一切無邊是佛護月稱解釋龍猛菩薩意趣之別法故善分別二種有義與二種無義極為切要以影像喻決擇彼義如父子相見會云如於明鏡中現無性影像大樹汝當知諸法亦如是餘虛妄喻表法之理亦應如是知巳五明於二諦破自性生之功德分二午一易離常斷二見之功德午二善成業果之功德今初頌曰二諦俱無自性故彼等非斷亦非常由一切法如同影像自性空故於勝義世俗二諦之中俱無自性故色等法非有自性之常亦非斷滅言斷滅者如芽時種無壞時所説之斷滅中論云先有而今無是則為斷滅此説先計有自性之法後時滅無之無常皆是斷見以説凡計諸法有自性已隨計彼法為常無常皆是隨常斷二邊之邊見故釋論此處引中論説如佛世尊化一化人彼復化一化人作者作業與彼相等謂是顯示從無自性生無自性於無自性安立一切因果無斷見失若於世俗不破自相則不能通達微細無我最微細之常斷二見亦難令不生故能盡離一切常斷二見是於世俗中破彼自相之功德若能於世俗破有自相非但不墮觀待勝義之常斷二見亦必不為觀待世俗常斷二見之所染污故有易離常斷二見之功德也午二善成業果之功德分三未一明不許自性者不須計阿賴耶等未二明從已滅業生果之喻未三釋妨難初又分三申一釋連續文申二釋本頌義申三釋所餘義釋論云如是於二諦中俱無自性非但遠離常斷二見即業滅已經極久時與諸業果仍相係屬雖不別計阿賴耶識內心相續不失壞法及以得等亦極應理此説於名言中不許有自相之宗不但有遠離常斷二見之功德更有不許阿賴耶識等而善成立業果係屬之功德解釋龍猛菩薩論之諸派中其無微塵許之自相而能安立一切作用者是為此宗不共釋規依此可知此清淨宗有多種不共餘釋之義舉要言之謂破離六識之異體阿賴耶識破自證分不許用自續因引生敵者真實義見如許內識亦應許外境許二乘人亦能通達法無自性立法我執為煩惱障許滅是有為及以彼理安立三世等諸不共規初義是此處所明由不許自相故不許自證分下文當説由此故不許自續者如餘處廣説此中已略述由此故許外境者下當廣説由此故許二乘人亦達法無自性者如佛護説聲聞藏中説一切法無我其所無之我謂自性有此亦許爾彼即無我相之圓滿義故知補特伽羅無我之圓滿相即補特伽羅無自性欲如實通達補特伽羅無我亦須如實通達法無我也由是亦須安立法我執為煩惱障故明煩惱障有精細二義唯修無常等十六行相之道有能不能解脫之二説要至何位乃能斷所知障等差別甚多問兩派中觀師皆應許有先入大乘善決真實見已後復墮入二乘道者又應許如斯行者若善修習法無我義應能現證及現見後能更修習復應許以如是道於見道位斷分別法我執於修道位斷俱生法我執豈執諸法有自相之中觀宗許法我執有是否煩惱障之二類耶答於此未見明顯解釋然自續中觀師似應説二乘人修如是道雖能暫斷法我執現行由未修集無邊資糧以為助伴故不能斷二種法我執之種子故二乘人雖有暫斷所知障現行者然無永斷彼種子者此師許法我執是煩惱障斷彼種子不須修集無邊資糧以為助伴若淨冶二相錯亂習氣之所知障則無彼助伴不能淨治也若於上説能得正解其益極大故略開説申二釋本頌義問如何許諸法無自性宗雖不許阿賴耶識等業果關係亦極應理頌曰由業非以自性滅故無賴耶亦能生有業雖滅經久時當知猶能生自果雖業果中間隔極長時然從善不善業生苦樂果是內教上下諸部之所共許若謂彼業乃至未生果以前而安住者應成常法常法無作用則從業生果之關係不應道理若謂造彼業後第二剎那即謝滅者從彼時起乃至生果以前應無彼業其業謝滅復是無事如何從業能生後果為答此難於已造業第二剎那謝滅之前業將滅時為欲保持業功能故有計阿賴耶識者有計離二業外有餘不相應行名不失法如債券者有計離二業外有餘不相應行名二業之得者有計二業習氣所薰識相續者故説業雖已滅經極久時仍能生果亦不相違以業於阿賴識薰成習氣習氣即業之果由彼同類展轉相續最後生果許彼是從最初業果展轉而生餘三之義應知亦爾初説是一分唯識宗第二説觀音禁説是毗婆沙師然非迦濕彌羅毗婆沙師應是其餘一分第三説是毗婆沙師中一分第四説雖無明文若按俱舍論第九品義似是經部與迦濕彌羅毗婆沙師所許迦濕彌羅者雖亦許有得然不許得是由所得法二業引生此處是指如是許者故論云如有若如中觀應成派義業非以自性生故彼業亦非以自性滅從非以自性滅業引生自果全不相違故雖不許阿賴耶等業亦能生果以是當知有一類有情已造二業滅經多劫仍從彼業能生自果因果不亂是故此宗業果係屬極為應理前四家作如是答者是因許業之生滅皆有自相造業後之謝滅亦是有自性此師破云若許如是之滅謂由許有阿賴耶等故無過者其答非理以業無自性之生滅故為顯自宗答難是龍猛菩薩所許引中論云諸業本不生以無自性故諸業亦不失以其不生故義謂由業無自性故無自性生由無生故無自性滅故執造業後滅有自性而別計不失法不應道理此理雖正破不失法亦破餘三理相等故又引經云人壽量百年説活爾許時然年無可集此行亦如是我或説無盡或時説有盡依空説無盡名言説有盡此證無自性之盡或滅有由名言力安立之盡滅拏錯譯為諸年無可集觀資糧亦爾此等如云非以自性滅於所破上加簡別而説申三釋所餘義分二酉一明滅無自性是不許阿賴耶之因由酉二明雖不許阿賴耶亦立習氣之所依今初問自宗雖無自性之滅然説有業雖滅又云滅非有自性如經説名言説有盡亦許造業之後彼業謝滅爾時業滅便成無事復不許阿賴耶等為業果連係之所依則説業滅已久生果非理之難宛然存在故唯上答猶嫌不足答無過論云由業非以自性滅即以彼理由便能從業滅之滅引生後果故不作別答許諸法有自性之一切宗皆不可説滅為有事許無自性之中觀宗則可説滅是有事以實事宗説如苗滅時苗之一切有事皆滅離苗之外亦無其他有事如瓶等可得故許彼滅定非有事以彼覺青處等一一分有事或瓶等衆分合集之有事皆不可説是滅之所相故滅非有事也中觀宗則説如近密之五蘊若一若多及離此二之異體法皆不可立為近密之所相近密亦非彼三之所相然依自身諸蘊假立近密為有事全不相違如是所滅之有事及彼同類之有事雖皆不可立為滅之所相然滅是依所滅法生故是有事顯句論中以聖教正理成立此義初引聖教如釋地經云生緣老死死即所死有情之滅説彼是以生緣而生又云死亦有二種所作一能壞諸行二作無知相續不絶之因此説死能作二種事既説死由因生復説死生無明故滅亦應有能生因及能生果此雖是説相續之滅第一剎那於第二剎那謝滅理亦相同故亦顯示第一剎那為第二剎那謝滅之因由是當知有情之生與死粗無常及第二剎那不住與已不住細無常立不立為有事是否由因所生一切相同依此密意故中論云有無是有為六十正理論云由因盡而滅説彼名曰盡前説苗等有事與苗滅等無事俱是有為後説油等因盡是燭等果盡之因故定應許此是龍猛菩薩之意趣第一剎那於第二剎那謝滅要遮所破乃能通達故是遮法然非是無遮故是非遮以非唯遮所滅之法要遮所滅引有事故諸餘能立廣如中論釋説此是本宗中最要極細之正理也酉二明雖不許阿賴耶亦立習氣之所依問此宗雖不許阿賴耶識然須安立善不善業習氣及由習氣成熟出生自果入中論釋云由無始生死傳來諸法習氣成熟貪著諸法又云如斯流類餘亦甚多此復若無安立習氣之所依則不應理其所依為何答如許阿賴耶識者説染污意執我之根本阿賴耶識為習氣之依處如是此宗亦説俱生我執之所緣為習氣薰習之依處若爾云何入中論釋説內心相續為習氣之所依曰由此我事是依內心假立之相續故亦説名內心相續若如説心同類名心相續者亦是少分習氣薰習之所依無明習氣之理入中論釋云若法於心相續染污薰習隨逐是名習氣煩惱邊際串習根本習氣是諸異門聲聞獨覺以無漏道已斷煩惱然猶不能斷彼習氣如瓶衣等已貯油花等物後縱除去油花等物猶有微細香氣可得餘善不善等習氣亦有二種所依如理應知若爾見道無間道時雖無見所斷煩惱應有修所斷隨眠爾時意識已成無漏全無錯亂習氣所染若謂隨眠寄彼體中不應道理前五根識及色法亦非彼隨眠之所依復不許有阿賴耶識故彼隨眠應無所依答曰無過爾時假我為修所斷隨眠之所依故餘能治所治時應知亦爾若知此宗安立補特伽羅之不共道理或問生空無邊處識無邊處無所有處之聖者現起出世無漏心時由無其餘世間心故彼等之趣生體應亦隨滅或問生有頂天之聖者現起無所有地所攝之無漏心時有頂與無所有二地所攝之趣生體皆應隨滅以説彼無漏心之依處是彼二趣體及涅槃趣體不應理故此等正理皆不成難雖有漏心及無漏心皆不安立為彼等趣生體之所相然可安立彼趣生體故此就敵宗説未入道者及有學聖人之趣生體是無覆無記法而答愚鈍如我豈能自力答彼諸難然依如實安立龍猛菩薩意趣之諸大車宗故作是説由此可知成立阿賴耶識之諸餘道理對於此宗皆不成難諸具大慧細慧明利慧者當善思擇未二明從已滅業生果之喻前説業滅能生自果今以譬喻重明彼義頌曰如見夢中所緣境愚夫覺後猶生貪如是業滅無自性從彼亦能有果生如諸愚夫於睡夢中見有美女醒覺之後緣彼已滅現無之夢境猶生猛利貪著如是從無自性已滅之業亦得有業果發生也此説業滅仍能生果為證此義引轉有經云大王當知譬如男子於睡夢中見與美女共為稠密既睡覺已憶彼美女大王於意云何若此男子夢與美女共為稠密既睡覺已憶彼美女可説此人為有智否王言不也世尊何以故世尊由彼夢中美女非有不可得故况能與彼而行稠密唯由彼人徒自勞苦此段出喻次合法云大王如是愚癡寡聞凡夫眼見色時心生喜樂便起執著謂色實有起執著已隨生染愛起染愛故隨貪瞋癡發身語意造作諸業然此諸業作已即滅滅已不依東方而住乃至亦不依止四維上下寡聞謂未聞真實義不解真實執著謂執為實有由貪所發三業通善不善二類業瞋所發業唯屬不善癡所發業亦通二類業作已即滅是依名言而説餘文是破滅有自性次云後臨終時同分業盡意識將滅所作之業皆悉現前譬如男子從睡覺已憶念夢中所見美女影像現前同分謂同類五蘊現世業盡現世之最後識將滅時如染愛男子覺已無間猶憶夢中美女心生戀慕如是臨命終時於能感後世成熟之業心意現前然非憶念又云如是最後識滅生分所攝最初識生或生天上乃至或生餓鬼最後識謂現世識生分所攝最初識生謂生天等中有非六趣攝故是生有識生死之間雖有中有然多不宣説故知主要是依生死決擇業果之關係次云其最初識滅已無間彼同類心相續生起分明領受所感異熟大王曾無有法能從此世轉至後世然有死生業果可得大王當知最後識滅名之為死最初識起號之為生大王最後識滅無有去處生分所攝最初識生無所從來所以者何本性離故大王最後識由最後識空死由死空業由業空最初識由最初識空生由生空而彼諸業不曾散失此説於生有中結生相續領受宿業苦樂果報其能領受心識相續是從最初生識而生又説生死於名言有於勝義無其理由謂本性離故是於所破加簡別言當知此配最後識由自空等雖如是説然恐妄執業果非有故説諸業不曾散失未三釋妨難分二申一釋異熟無窮難申二釋違阿賴耶教難今初難曰若謂由業自性不生自性不滅故能感異熟者如是已感異熟者亦當更感異熟便成無窮頌曰如境雖俱非有性有翳唯見毛髮相而非見為餘物相當知已熟不更熟如境雖俱非有然有眩翳之眼唯見非有之毛髮等相而不見為兔角石女兒等諸餘物相如是當知業雖俱無自性然未熟業能感異熟其已熟業則不更熟又此譬喻非但成立業定有果且能成立善不善業感苦樂果各別決定頌曰故見苦果由黑業樂果唯從善業生無善惡慧得解脫亦遮思惟諸業果如有眩翳之眼唯見毛髮等不見兔角等決定不亂故可愛異熟不從不善業生非愛異熟不從善業生故見非愛苦異熟唯從黑業出生可愛樂異熟唯從善業出生通達善不善業自性不可得慧者便當解脫生死佛恐凡夫樂以理智審細觀察由如是如是差別業感如是如是差別果之理由毀謗業果壞世俗諦故曰諸業異熟不可思議遮止於諸業果而起思擇當知此論由多門中恐於業果退失定見故由多門令於業果發生定解即空性見亦是資助業果決定今到寶洲宜善努力幸勿徒手而返也申二釋違阿賴耶教難分三酉一正釋違教之文義酉二離意識外説不説有異體阿賴耶之理酉三明密意言教之喻今初問若無阿賴耶識亦能安立業果關係者則楞伽經及解深密經阿毗達摩大乘經等説有阿賴耶識為一切有為法功能差別之所依名一切種如海起波浪作內外一切諸法生起之因豈彼建立一切非有耶答曰不爾對須説有阿賴耶識而調伏者即應説有阿賴耶故此説為調伏衆生故説有阿賴耶識故自宗説彼是密意教其密意之所依當知唯説自性空之空性名阿賴耶識説彼名阿賴耶識之理由謂由彼空性隨一切法轉故又為教化增上之力非但説有阿賴耶識亦説實有補特伽羅對須説有實補特伽羅方能調伏之衆生即説有實補特伽羅而攝受故如經云諸苾芻五蘊即重擔荷重擔者謂補特伽羅此對執有獨立實有補特伽羅者不説無彼而説有能荷重擔之補特伽羅文雖未言實有義是宣説實有復為一類衆生説無實體補特伽羅唯有諸蘊如經云謂心意識長夜薰修信戒等德後生天趣此是為執著生天解脫為實有者暫不破彼實執之境而説唯有諸蘊義即顯示諸蘊實有此等一切皆是密意增上而説此等是為何等衆生密意而説頌曰説有賴耶數取趣及説唯有此諸蘊此是為彼不能了如上甚深義者説經中説有阿賴耶識或説有實補特伽羅及説唯此諸蘊實有者此等是為不能了達如上所説甚深義之衆生密意而説若諸衆生由其長夜習外道見不能悟入甚深法性如寶鬘論云謂我無當無我所無當無凡愚如是怖最初即為宣説法性深生恐怖於佛聖教起險處想便於聖教憎背不入於是當失最大義利故對此輩最初不説究竟深處而為宣説阿賴耶識及實蘊等先令依此除外道見引導令得最大義利後由善解經典真義自能棄捨阿賴耶等以是當知如是言教唯生功德都無過失依如是次第意趣四百論云若樂何何事先觀彼彼法倘令已退失便非正法器離六轉識須説異體阿賴耶者唯對堪説能所取空為真實義之法器亦必須破外境若不許有如上所述阿賴耶識則不能安立業果關係故彼是對不能了解甚深義者而説酉二離意識外説不説有異體阿賴耶之理如般若十萬頌等無量經典説識數時只説六識身不曾多説故佛經藏有建立不建立阿賴耶識之二類如是慈尊解經意時於辨中邊論與莊嚴經論辨法法性論中建立阿賴耶識破除外境於現觀莊嚴論與寶性論中則不建立阿賴耶識不破外境無著菩薩解寶性論亦不作唯識宗釋而作中觀宗釋攝大乘論為成立阿賴耶識所引之阿毗達摩經於寶性論釋中則引證一切有情皆有法性種性如云雖諸有情皆有如來界藏然彼有情自不能知如云無始時來界一切法等依由此有諸趣及涅槃證得與月稱論師説阿賴耶識意趣是依空性而説極相符合故彼亦許離六識身説有異體阿賴耶識是為度一類所化增上而説問釋菩提心論云如由近磁石其鐵速動轉彼鐵實無心似有心顯現如是阿賴耶非實似有實若時去來動爾時取後有如木在大海無心亦動蕩如是阿賴耶依身而動轉此説阿賴耶識能取後有當如何釋答彼論説唯破離心外境不破內心有自性説唯心者是為遣愚夫於一切空起恐怖故非真了義諸瑜伽師許轉依心清淨有自性唯是各別內證之境破彼執時彼便難云若心不實則從前世來生現世及從現世趣於後世動轉作用皆不應理為答此難説如鐵與木雖實無心而似有心亦能轉動如是阿賴耶雖非實有亦現有去來動作似有實體故非許有如餘論所説有自相之阿賴耶識若謂雖不許有自相之阿賴耶識可許離六識身別有如幻為一切染淨法之種子識曰若許有如是阿賴耶識則亦應許唯由阿賴耶識習氣成熟現似色聲等境別無外境然彼論云由知知所知離所知無知如是何不許無能知所知此説外境內心有無相等若無一此餘一亦無當知與本論所説心境二法勝義俱無名言俱有於二諦中俱不可分有無之別義理相同故無外境唯有內識非是龍猛菩薩所許既離意識不許異體阿賴耶識則所言阿賴耶者是總於內心明了分特於意識立為阿賴耶以是破心有自性答他難時説心雖非實能作所作皆應理故許能取後有之心是意識故復許意識是一切染淨法之所緣故中觀心論亦破阿賴耶為如實言智藏論師許有外境故亦不許阿賴耶識即破外境之唯識師亦有許不許阿賴耶識之兩派不許外境之蓮華戒論師亦云唯此意識有與餘生結生相續之功能如云斷善根與續離染退死生許唯意識中此引俱舍為證故靜命論師亦必不許阿賴耶識無畏論師意亦相同雖云餘大乘經説有阿賴耶識亦唯舉其名未釋其義審其文義亦不許彼離六識身別有異體且彼宗亦是許外境者故是於意識上假立彼名也酉三明密意言教之喻為令衆生趣入故非但先説阿賴耶識等頌曰如佛雖離薩迦見亦嘗説我及我所如是諸法無自性不了義經亦説有如佛永離薩迦耶見并諸習氣永斷一切我我所執諸分別心然由説我我所是令世人了知法義之方便故佛世尊亦嘗説言我及我所如是諸法雖無自性然不了義經説有自性者是令世人漸次了知真實義之方便總之如佛言我言我所時似有彼彼分別心然無分別乃是了義如是説諸法有自性時雖似是佛之意旨然諸法無自性乃是了義名言建立須與世間相順之理如東山住部隨順頌云若世間導師不順世間轉佛及佛法性誰亦不能知雖許蘊處界同屬一體性然説有三界是順世間轉無名諸法性以不思議名為諸有情説是順世間轉由入佛本性無事此亦無然佛説無事是順世間轉不見義無義然説法中尊説滅及勝義是順世間轉不滅亦不生與法界平等然説有燒劫是順世間轉雖於三世中不得有情性然説有情界是順世間轉如是廣説其中末頌明有情無自性之補特伽羅無我所餘諸頌明有事無事諸法無自性之法無我東山住部分別熾然論説是大衆部中分出故聲聞藏中亦有明顯説法無自性者
