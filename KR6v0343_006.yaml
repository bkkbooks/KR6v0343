body:
  text: 宗喀巴大師造釋第六勝義菩提心之三巳二釋世間妨難分二午一假使世間共許他生釋世妨難午二明世名言亦無他生釋世妨難初又分二未一世間妨難未二答無彼難今初外曰前為成立他生所説諸理如乾薪上注以油脂被汝慧火焚燒殆盡能使汝慧火熾盛之理薪前者已足不可更加矣問倘不述正理則所許他生之義寧非不成外曰不爾以世間成立者不須更用餘理成立世間現見最有力故頌曰世住自見許為量此中何用説道理他從他生亦世知故有他生何用理一切世間皆住自見許世所見即為定量此最有力從他有自性之因生他有自性之果亦是世人現所見者用正理成立者謂現見不現見二法之中是不現見法前現見法由現量成立故不須更用正理成立今此他生亦復何須説餘道理成立為有縱無餘理成立他生諸法他生亦能成立故今成立有他生中説餘道理更有何用以現量已成立故未二答無彼難此乃未能無倒了知教義復因無始生死以來實執習氣成熟之力恆於諸法執為實有如同親友未多聽聞捨離方便無自性理釋論謂驟聞令捨執法親友深生不忍以是狂叫世間違害也若不廣説世間道理不能遣除世間違害之狂叫故當詳説何等境界為世間所違害與何等境界為世所不違害闡明可害境與不可害境之差別此須先説二諦差別分五申一二諦總建立申二正釋此處義申三別釋二諦體申四明破他生無世妨難申五明世間妨難之理初又分四酉一由分二諦説諸法各有二體酉二明二諦餘建立酉三觀待世間釋俗諦差別酉四明名言中亦無亂心所著之境今初由於諸法見真妄故得諸法二種體説見真境即真諦所見虛妄名俗諦諸佛世尊正知二諦體性宣説行思與芽等內外一切諸法有二體性謂世俗諦體與勝義諦體此是説如芽一法之體亦可分世俗與勝義二體非説芽之一體觀待異生與聖者分為二諦也由此當知絶無無體之法凡是有法即不能超出一體異體雖許有此體然無自性之體亦不相違芽等諸法勝義諦體者謂現見真義殊勝智所得之境體此是二體之一非自性有言殊勝智者簡非一切聖智所得乃如所有智之所得也此説是彼智所得者為破妄執彼智所得即是實有故既言非自性有故知有説聖根本智若量勝義諦即成實有非所知攝認為是此師正宗者實未了解此宗所説雖是聖根本智所得然非實有之義致令智者正宗日趣壞滅也餘世俗諦體者謂諸異生為無明翳障蔽慧眼由彼妄見之力所得體性此是二體之一然非如異生所見境自相即實有彼自性也如是説得勝義諦時以聖人為能得者意取主要者説非説具中觀見之異生全不能得也説得世俗諦時以通常異生為能得者亦意取主要由無明增上見內外諸世俗法者非説聖者身中之名言量不能得彼諸法也未得中觀見者雖亦能得瓶等世俗諦法然以正量了知彼法為世俗諦則必須先得中觀正見以成立彼法為世俗諦必須先成立為虛妄正能成立為虛妄者則於彼法先須以正量破其實有故言由妄見力者謂通常衆生雖亦能見妄法然非彼衆生皆能成立能知為虛妄如觀幻術人見所幻之象馬時雖見妄法然非能知所見為妄也以是當知安立世俗諦謂妄見所得義者是説能量虛妄所知境諸名言量之所得也如前所説二種體性之中能見真義理智所得之境即勝義真諦此於下文由眩翳力等時茲當廣説能見虛妄所知諸名言量所得者大師説名世俗諦此説所得勝義世俗二事各別非於一事有二種得相也酉二明二諦餘建立二諦之所依雖有多種解釋此中是以所知為依如集學論引父子相見會云如來了知世俗勝義所知亦唯世俗勝義二諦中攝諸佛世尊由於空性善見善知善證故名一切種智言所知亦唯者明所知為依言二諦中攝者明二諦數決定及明如來由了知二諦故名一切種智故説勝義諦非所知法及説任何智慧皆不能證為入行論意趣者實是倒説世俗勝義二諦是所分體所分之義雖有多解此中則説二俱有體又彼體性亦定非是非一非異諸有法體若異空性反成實有故是一體觀待為異如所作與無常菩提心釋云異於世俗諦真諦不可得説俗諦即空唯空即世俗離一餘亦無如所作無常初四句義謂非離世俗別有異體之真諦即諸世俗法諦實空故諦實空性亦即於世俗事上而安立故次二句明無則不有之關係決定復是同體係如所作與無常是一體性所分之義謂如上所説二量所得即各別體相設作是念若説本論與入行論義同者彼論云世俗與勝義許此為二諦勝義非慧境説慧是世俗復如何通答彼前二句是明二諦差別後二句明所分體勝義一句明勝義諦説慧一句明世俗諦有説前句第三句立勝義諦非慧境之宗以後句第四句成立者實非論義彼所明二諦亦如集學論引父子相見會云此中世俗如來見為世間所行勝義諦者不可説非所知非所識非遍知不可見入行論中即安立此義此説勝義諦非所知者義如下文所引入二諦經所説之慧謂非彼慧境若謂全非任何智慧之境則經説如來由現證世俗勝義一切空相安立為一切種智應成相違下當廣説明世俗諦中非説唯安立彼慧為世俗諦是説彼慧之境如經云世間所行世間謂能量妄法之名言識所行謂彼境中所得之義論説慧境為世俗諦理亦如是分所知為二諦者明所知中二諦決定此中教證父子相見會前已引訖決定真實三摩地經亦云謂世俗勝義更無第三諦釋論亦云如是略有餘諦隨其所應當知唯是二諦中攝此説十地經所説多種諦名一切皆歸二諦中攝經中所説成立諦謂善分別蘊界處故此論師亦許二諦數量決定理證謂如一事若已決斷為欺誑虛妄則必遮斷為不欺真實欺與不欺互相違故由此遍於一切所知故亦遣除俱是俱非之第三品如中觀明論云凡互相違法絶無遮其一品不成餘品者故分別俱非品亦非正理又云若法決斷為此未有不遮斷為彼者此二即是互相違之相若法是互相違相則彼遍於一切種相若能遍於一切種相則能遣除餘第三品如有身與非有身等差別其餘一切正相違者皆如是知若無能遣第三品之正相違者則所許有無一異等二邊觀察皆不能破若有者則凡正相違法遮其一品未有不成立餘品者故説中觀應成派無正相違是全未知破立之建立凡正相違遮斷一品則決定餘品破遣一類即成立餘類應成自續都無差別酉三觀待世間釋俗諦差別世俗諦中有心境二類先依世間識明心之正倒頌曰妄見亦許有二種謂明利根有患根有患諸根所生識待善根識許為倒無患六根所取義即是世間之所知唯由世間立為實餘即世間立為倒非但所知中可分二諦即見妄法之心亦許有正倒二類未被現前錯亂因緣損壞之明利諸根及依此根所生諸識與已被現前錯亂因緣損壞之有患根識也有患諸根所起亂識觀待未被現前錯亂因緣損壞之善淨根識則許為顛倒識前者則許緣境非倒但此二種差別非是中觀自宗是觀待世間識而分如心可分倒與不倒二類其境亦爾謂未被現前亂因所損六種根識所取之義此是世間所知唯由世間立名真實非待聖者可立彼境名真實也此言聖者與言中觀宗義同餘謂影像等有患諸根所見之境即由世間安立為倒即字表示唯以名言量即能安立彼諸識為亂識不待理智也內身所有損壞諸根之因緣如眩翳黃目等病及食達都惹藥等達都惹即商陸誤食彼果便見一切皆成金色等字攝疫病等身外所有損根因緣如照鏡於空谷等處歌唱春季日光與砂磧等境界現前爾時內根縱無損患如其次第亦見影像谷響陽焰水等由幻師咒及所配藥等當知亦爾意根之損壞因緣如彼咒藥及邪教似因睡眠等此説睡眠是六根中意根之損壞因緣故説此師許夢中有根識實屬邪説由是當知無始時來二種我執無明等損害非此所説損壞因緣此唯取前説現前損壞諸根之錯亂因緣等其無如是損患六種根識所取之世俗義與有患諸識所取之義安立為正倒境者唯是觀待世間識立以認彼等如見為有是世間識有無違害故觀聖者則無正倒之別如影像等非如所見而有具無明者所見似有自相青等亦非如所見而有故故彼二識亦無錯不錯亂之別也問有患色根所見倒境及意識上有睡眠等患於睡夢中所見人物執為人等並醒覺時於幻象馬執為象馬於陽焰水相執為真水世人常識亦能了知此等顛倒然意識上由惡宗所損邪執諸義世人常識不知其倒云何可説唯由世間立為顛倒耶答此中所觀察有無損害之損緣非是俱生邪執之損害故惡宗所妄計是説唯學惡宗者邪計之自性等二十五諦中之自性世人常識雖不能知彼等顛倒然未證真實義之名言量能知其倒故是世間識了知為倒也又如二種我執所執之義是無患根識所取觀待世間常識可是真實然名言中亦非是有問若由不許正世俗故雖可不分正倒二類但無明所損之心境何故不安立為倒世俗耶答世俗是由諸名量所安立故若安立倒世俗亦應待彼而立然名言量不能成立由無明習氣所損者為錯亂也酉四明名言中亦無亂心所著之境上已總説有患意識於所著境迷亂今更以譬喻別明彼義頌曰無知睡擾諸外道如彼所計自性等及計幻事陽焰等此於世間亦非有如被無明睡眠擾亂意識之外道意中已有邪宗似因之害緣自以為悟入真實義於牧童婦女所共許之生滅等彼尚不能無倒正知而欲超出世間之上如攀樹者未握後枝已放前枝定當墮落惡見山澗之中由彼不能善知二諦故不能得解脫妙果故諸外道論中各別所計自性三功德等雖於世間世俗亦定非有有説此宗凡是亂識見為有者即立為世俗有此亦善破訖如是若計幻事陽焰影像等為實象馬實水實質等亦於世間世俗決定非有故名言中有者要由正量之所成立雖彼等所著之境於名言中亦不許有然所見境則不許爾現在根識見色聲等為有自相者是被無明損壞故彼等識與見影像谷響等之根識除略有粗細於所見境全無錯亂不錯亂之差別自相所成之青等與有實質之影像等同屬非有如實質雖無影像是有如是自相雖無而青等是有如許青等是外境故許影像亦是色處下文亦説影像能生見彼之識也由此當知眼識所見之幻事耳識所聞之谷響等亦皆如是是為此宗之不共建立也申二正釋此處義如有翳眼所緣事不能害於無翳識如是諸離淨智識非能害於無垢慧諸真實義非名言識之所安立許是聖者真智所見故破他生非唯住於世間知見而破是依勝義而破今破他生既加勝義簡別猶如有眩翳眼識所見毛輪等於無翳眼識不見毛輪者都無違害如是離無漏淨智被無明所障之異生識於未被無明障蔽之無漏淨慧亦無違害故破勝義他生時即使世間成立他生亦無違難當知彼難實為智者所笑之處申三別釋二諦體分二酉一釋世俗諦酉二釋勝義諦初又分三戌一明於何世俗前為諦何前不諦戌二三類補特伽羅見不見世俗之理戌三觀待異生聖者成為勝義世俗之理初又分二亥一正義亥二釋煩惱不共建立今初癡障性故名世俗假法由彼現為諦能仁説名世俗諦所有假法唯世俗由此無明愚癡令諸衆生不見諸法實性於無自性之諸法增益為有自性遂於見真實性障蔽為體是名世俗此所説之世俗是明世俗諦為於何世俗前安立為諦之世俗非明總世俗也如楞伽經云諸法世俗生勝義無自性無性而迷亂許為真世俗此説於勝義無自性誤為有自性之心即是世俗世俗梵語有能障義此世俗即為能障此為障何事耶曰許為真世俗謂由障蔽真義故許為俗世或能障此非説正邪二世俗中之正世俗也初句所説之世俗與後句所説之世俗義全不同前者是自許諸法生等世俗中有之世俗後者是諸法於何世俗前為諦之實執世俗也由彼實執世俗之力青等虛偽諸法本無自性現有自性於諸衆生現為實有由此於前所説世間顛倒世俗之前為諦實故能仁説為世間世俗諦即如前經所説也由於三種人前不現為諦實而是分別假造虛偽諸法由於彼世俗前不諦實故名唯世俗釋論説如影像谷響等少分緣起法雖具無明者亦見其虛妄如青等色法及心受等少法則現為諦實諸法實性則具無明者畢竟不見故此實性與世俗中見為虛妄者非世俗諦此所言少法拏錯譯為有法較妥言影像等亦見為虛妄者是現似形質與彼質空二事相合之虛妄彼之實空亦是空無實質之義非影像自性空之義故雖知影像由實質空而彼影像於執有自相之世俗前現為諦實並不相違故彼仍是世俗諦以是當知論説影像非世俗諦者意説善名言者世間世俗所見影像現似形質已知為妄是觀待彼心已非世俗諦非不安立為所見虛妄名俗諦所説之世諦也若不如是凡於世俗不諦實法是世俗諦成相違者則論説於名言中亦無自相及名言中破除實有成立無實一切建立皆成相違是故有説世間常識亦知為錯亂之影像等境非世俗諦唯是世俗是於二諦決定及觀待世間之實妄并中觀師所立之實妄全未獲得正解之語也論言實性於具無明者畢竟不現者此許未斷盡無明之聖人亦皆現證真實義故是説現被無明障蔽之心至於有學聖人之後得智及異生之真實義見雖有無明及無明習氣所蔽不能現見然當許彼見勝義諦釋論云此由有支所攝染污無明增上之力安立世俗諦此説妄執諸法實有之無明人我法執是十二有支中之無明故不許為所知障言由彼實執無明增上安立世俗諦者是明待何世俗安立為諦之理非説瓶衣等世俗諦法要由彼實執安立以彼實執所安立者自宗於名言中亦不許有故由世俗諦待何世俗為諦實之世俗與安立瓶等為世俗有之世俗名相同故誤為一義者頗多當善分別若爾瓶等諸法為於未成佛一切有情之世俗前皆現為諦實耶為於少數有情之世俗前亦有不現為諦實者耶論曰安立為世俗諦之色聲等法此復於已斷染污無明已見諸行如影像等聲聞獨覺菩薩之前唯是假性全無諦實以無實執故此謂見非諦實之補特伽羅略有三類謂聲聞獨覺菩薩然非一切聲聞獨覺菩薩故説差別謂已現見一切有為諸法空無自性現有自性如影像等是一差別若唯此德七地以下菩薩及二乘有學聖人亦皆同有為遮彼故説彼三人中是已斷無明者故是清淨地菩薩及二乘阿羅漢於此三人前不現諦實為何法不實耶論曰此復謂內外諸法不實之理論曰無實執謂不執實有故實執無明已斷盡故此即成立內外諸法於彼三人之世俗前為非實有如是解釋並未成立於彼等則非世俗諦僅是成立非是諦實故有執為成立非世俗諦者是慧解太粗以自心垢污論師意也又如上成立亦非對彼三人成立是對吾等諸餘有情成立諸法於彼三人之前為非實有耳除彼三人之外餘諸有情由有俱生實執故於彼等任何世俗亦皆不能成立為非實有若不如上釋強謂是於彼等成立非世俗諦者則此能立太無關係謂於彼心成立某法為世俗諦時須先成立彼法為虛妄於彼以無實執為理由誠可笑故又於彼心成立某法為世俗諦時須先成立彼法為虛妄之理謂説瓶等為世俗諦安立此諦字有心境二義此非安立彼境為諦要於實執世俗之前乃能安立為諦若不加彼簡別則不能成立為諦實反應見為虛妄也亥二釋煩惱不共建立此宗明煩惱有不共理與大小乘對法俱不相符了知此理最為切要故當略説執法實有中有緣人緣法二種實執即許彼為二種我執前已説訖入中論釋與四百論釋皆説彼實執是染污無明又彼無明説是聲聞獨覺阿羅漢所斷四百論説是得無生法忍之菩薩所斷故染污無明是無我真實義明慧之違品非僅無彼明及離明之餘法明之違品即增益人法為有自性由是當知安立增益法我為染污無明及安立執我我所有自相為薩迦耶見皆與對法不合對法宗如俱言論第九品説執補特伽羅有獨立實體安立為我執薩迦耶見執我所有為彼實體補特伽羅之所自在安立為我所執薩迦耶見則與此宗極不相同執補特伽羅有獨立實體未學邪宗者雖亦可有然執補特伽羅異諸蘊相別有餘相則未學邪宗者決定非有如是邊見亦有二類也設作是念對許人法有自相之宗云何成立彼等諸執為染污無明及二種我執耶答先以破有自性之理破除人法有自性便能成立彼執是迷所著境之實執此若成者則亦能成立執人法實有為二種我執也若此等皆成則亦成立彼等實執為了達真實義明慧之違品故能成立為無明且能成立為薩迦耶見亦即成立為染污無明故了知煩惱之不共建立極為重要也其餘貪等煩惱皆從實執愚癡發起之理如四百論云如身根依身癡遍住一切釋論云癡於通達真諦極愚蒙故增益諸法諦實自性而轉貪等亦唯於愚癡所遍計之諸法自性增益愛非愛等差別而轉故非異癡而轉亦是依癡癡最勝故自性而轉以上明癡是實執貪等非異癡而轉者謂與癡相應乃轉離癡則不轉從貪等至而轉故即説明其理由於境增益悅意不悅之差意別者是生貪瞋之因非理作意非説貪瞋之行相言唯於癡所遍計者謂要依增益有自性之悅不悅意相乃有貪瞋轉故然此非説唯癡遍計之實有是貪等之所緣以二種俱生我執之所緣是有法貪等與癡相應即同一所緣故要於二種非理作意所引境上起希欲行相及厭背行相者乃是貪瞋唯執補特伽羅獨立實有所引之欲不欲相猶不安立為貪瞋故安立貪瞋之理亦不相同言亦是依癡者義謂執有自相之愚癡為先乃能引生貪等身根依身之喻謂如離餘四根別無可立為身根者如是餘一切煩惱要依愚癡乃轉不離愚癡而轉於是若能破除愚癡即能破除一切煩惱故於能治愚癡緣起性空之論應當恭敬也七十空性論亦説諸法實執為生死根本無明六十正理論亦云若得隨一處即被惑蛇咬若心無所住即不被彼咬謂若得隨一實執所緣之處即被煩惱毒蛇所咬又云若心有所住惑毒豈不生此即聖者所許後二句之徵起文云若見色等有自性而欲斷煩惱此諸煩惱終不能斷為顯此義故云釋文亦云若有法可得定生貪等無量煩惱必不可遮所以者何若彼法與意相順即隨貪著難以遮止若不相順則生憤怒亦難遮止釋論又説若境俱非悅不悅意則生無明凡是內心執境有自相轉或生貪欲或生瞋恚即俱非彼二亦生同類愚癡入行論云凡有所得心若稍有所住諸離空性心滅已復當生如無想等至關於此義此二論師與佛護論師解釋聖者意趣都無差別由此道理説無常等十六行相之道能得涅槃者是密意語依彼道增上所明煩惱亦非究竟慢等煩惱依彼等義亦可了知不共無明及薩迦耶見邊見當知皆分分別與俱生二種恐繁不録如是宣説執法實有之分別為上中下九品修所斷配九品能治修道者如説執著二取異體分別為上中下九品修所斷配九品修道當知是為不能圓滿通達粗細二種法無我之有情而説是不了義戊二三類補特伽羅見不見世俗之理又此諸法於凡夫前實無自性現有自性故成欺誑於前所説餘三人前唯現緣起假法故唯世俗都無真實又彼唯有所知障相不染污無明現行故要於有彼無明及其習氣所染有相行後得位之聖者乃能現起於住根本定無相行之聖者則皆不現若爾此宗立何為所知障釋論云此中無明習氣能障決了所知貪等習氣為身語如是轉因者亦爾又彼無明貪等習氣唯得一切種智成佛乃斷非餘能斷身語轉者謂如阿羅漢有身語粗重躍如猿猴呼他小婢大師雖遮仍不能改亦字明貪等習氣亦障決了所知故煩惱習氣是所知障習氣所起一切錯亂二取亦是彼攝又煩惱種子名曰習氣與非煩惱種子之習氣此立後者為所知障雖斷盡一切煩惱種子不復生實執然由習氣所染於所現境仍起錯誤之心又未成佛之聖者由未斷所知障無明故後得有相分別與根本無相智各別而起諸佛如來由於一切法勝義世俗相現正等覺故心心所行一切分別皆畢竟滅根本後得有相無相不各別起言畢竟者顯餘聖者唯根本位乃滅故後得根本各別而起言所知障無明現行故非是成立有相之理是成立根本後得有相無相各別而起心心所行謂諸分別顯句論云分別謂心行真實性義由離彼故是無分別如經云云何勝義諦謂尚無心行况復文字戊三觀待異生聖者成為勝義世俗之理論曰諸異生類所見勝義即諸有相行聖者所見唯世俗彼之性空即彼等之勝義前句義謂異生執為勝義有之瓶等即前所説三類聖者從根本定起後得有相智所見之唯世俗此僅遮彼前為諦實非遮世俗諦亦非説異生執瓶等勝義有即為聖者所見之世俗以彼非有故後句義謂緣起世俗之法性即聖者所見之勝義故有倒解論義説瓶等一事觀待異生為世俗觀待聖者為勝義是由未知於何心前為世俗諦即於彼心破除為諦也論曰諸佛勝義是自性性此復無欺誑故是勝義諦此是彼等各別內證言是自性性之性字是決定詞此簡餘諸聖者所見之勝義諦謂非如根本智位無相自性後得智位有相自性各別決定是恆時安住自性之法性也此復等義謂勝義諦之諦字非諦實義是於見真實義之智前無欺誑義酉二釋勝義諦分二戊一解釋頌義戊二釋彼妨難今初今欲宣説真勝義諦然勝義諦非言説境故非隨言識所緣境故不能直接顯示當為樂聞者以異生自能領悟之譬喻明彼體性此云非言識境義為不能直接顯示拏錯譯為不能現前顯示又真實義非從他能知如顯句論云如眩翳人見毛髮等顛倒自性無眩翳人雖為宣説然彼不能如無翳者了達毛等自性無可見如實了達此説無翳人雖為有翳者説無毛髮然彼不能了達如無翳人所見無髮聽者雖不能如是了達然非不知無髮也如此譬喻為彼宣説真實義彼終不能如離無明翳者所見而了達然非全不能了知真實義故勝義諦非詮深義之了義聖教及説彼義之語所不能説亦非隨順彼語之慧所不能知凡説真實義非言識境者應知一切皆爾頌曰如眩翳力所遍計見毛髮等顛倒性淨眼所見彼體性乃是實體此亦爾如有翳人由其眩翳損壞眼故見自手所持食器等中有毛髮蟲蟻等相妄計實有毛髮蟲蟻等事為除彼故遂將彼器數數傾覆無翳淨眼人行至彼前用目審視彼所見有毛髮等處毛髮等相都不可得更不分別毛髮等上差別之法若有翳人述自心意告無翳人曰見有毛髮爾時為除有翳人之妄分別故曰此中無髮對彼人前雖説如是破除之語然此説者無損減毛髮之過有翳人所見毛髮之真義是無翳人所見非有翳人所見也如彼二喻當知此法亦爾了知之理謂無明翳損壞慧眼不見真實義者見蘊界處時僅見蘊等世俗性如有翳人所見毛髮諸佛永離無明習氣所之知障如無翳人不見毛髮而見蘊等真實性境此即諸佛之真勝義諦也戊二釋彼妨難設作是念如無翳眼不見毛髮等相諸佛亦應不見無明染心所見之蘊等世俗法是則諸法皆應非有以凡有者佛必見故若無蘊等世俗法亦應無佛可成以初發心之補特伽羅有無明染故答曰無過佛智了達所知略有二理謂了達勝義諦所知及了達世俗諦所知初謂以不見蘊等世俗相而了達彼等真實義次謂諸佛不可有不見而知之疏知必是見相而知故盡所有智是現見心境二相而知也諸佛盡所有智非由無明習氣所染而見蘊等是由餘補特伽羅無明染識所現之相佛亦應見彼相既是世俗法則盡所有智亦必見也有翳人所見毛髮眼無翳人雖不可見然彼相不必非有此與佛不同也未斷盡二取迷亂習氣以來緣如所有與盡所有之現量不能同體根本後得各別緣慮故一剎那智不能雙緣彼二所知斷盡迷亂習氣之後每剎那智皆是二智同體相續不斷故於一時緣二所知不須各別有現不現也故論云雖一剎那智周遍所知輪又彼二智雖是一體觀待二境有二能知之相亦不相違是為諸佛世尊所不共法有説佛智唯一真實義智其盡所有智是所化相續所攝非佛心所有是謗諸佛盡有智有説如所有智亦非佛心所有是俱謗二智也更有餘義果位當説若作是念滅盡一切二取相之體性豈非無可見諸佛云何見勝義諦耶答真實見前二取皆滅實不以二取相見然無可見即名曰見此謂如所有智現見蘊等之真義蘊等於彼見前不成實義即是蘊等真義故不見蘊等乃見蘊等之真義也釋論云不觸所作性法唯現證自性由覺真實故曰佛陀此説諸佛見勝義智不觸有法唯覺法性與説不見蘊等乃見蘊等之真義同一道理經説無見是最勝見義亦非説全無所見名之為見是如上説不見戲論立為見離戲論故見與無見非指一事如般若攝頌云不見諸色不見受想無可見不見思若心意識都無見如來説此已見法有情自言見虛空觀彼虛空如何見佛説見法亦如是非見餘喻所能説此説不見者為五蘊見者為法此法即真實義如云誰見緣起彼即見法也虛空喻者謂唯遮質礙見知彼者謂若有所遮質礙理應可見然不可見此所見即虛空不見即質礙若謂非如是見如見藍色乃見真實義者是末句所破也為證以不見為見引入二諦經云天子若勝義中真勝義諦是身語意所行境性者則彼不入勝義諦數成世俗諦性天子然勝義中真勝義諦超出一切言説無有差別不生不滅離於所説能説能知所知前段經義謂勝義諦於見勝義智前若非以不見蘊等世俗相而見如蘊等是身語意所行境者則現見真實義智未離戲論故非勝義諦反成世俗戲論是證以不見之理而見第二段經義言現見勝義智前真勝義諦無差別者謂無衆多不同之差別超出言説不生不滅易知於彼見前離能所説亦易解現見真實義智雖可立為勝義智真勝義諦是彼所知然於彼智前離能知所知亦不相違以能所二相唯於名言識前乃安立故如比量理智雖可立為能知心真勝義諦亦可立為所知境然心境能所非就彼智而立也經又云天子真勝義諦乃至超過具一切勝相一切智境非如所言真勝義諦一切諸法皆是虛妄欺誑之法境字以上明勝義諦超過一切智境非如所言真勝義諦即明超過彼境之理如云此是勝義諦隨逐此言之分別便各別現起心境二相若一切智中如所有智有如是相彼必超過此境以一切二取相法皆是虛妄欺誑之法故唯見真實義之不欺誑智全無彼法也此等一切皆是現見真實義之智不見蘊等世俗法之左證也是故現見真實義之智前有事無事等一切二取法之戲論皆定非有以彼諸戲論自性皆不可得故由是當知説真實義時唯諸聖者乃是親證之量餘非聖者皆非親證之量故約聖者見勝義智破他生時全無世間妨難也申四明破他生無世妨難若於勝義破他生時欲舉世間妨難者則觀真實義時許世間見於真實義亦是正量頌曰若許世間是正量世見真實聖何為所修聖道復何用愚人為量亦非理世間一切非正量故真實時無世難若果許世間見於真實義是正量者世間常人皆已現見真實義故復是無始生死以來即已見故應許已斷無明則為現證真實義何用餘諸聖者亦復何用勤求聖道也然許世間通常愚夫於真實義為正量亦非道理故觀真實義時世間常見於真實義一切非量故觀真實義時無世間妨難也有説此宗既云世間一切非正量是全不許為量故非善宗有説此宗極為善哉二俱未解論師所許妄為解説徒自現醜論説世間常見於真實義一切非量誤為總説不許為量故又能量所量如顯句論破有自性安立觀待之能量所量下當廣説申五明世間妨難之理若爾何者有世間妨難頌曰若以世許除世義即説彼為世妨難若世間共許之義以世間共許破除即説彼有世間妨難譬如有云我物被劫餘人問曰為是何物告曰是瓶他若難曰瓶非是物是所量故如夢中瓶此等能破境乃有世間妨難若時依聖人勝義見以善巧勝義之丈夫為定量決擇真實義爾時全無世間妨難論曰智者當以此理觀諸餘事現在許為中觀之正理者如云我非瓶主天授非奪者又云若云我田上已生問曰何生若謂芽生當難云芽無有生是所知故又云如夢中人及芽此即顯彼皆有世間妨難也午二明世名言亦無他生釋世妨難如是已依世間許有他生釋世間妨難今當更説世間常見亦無他生故住世間見破除他生亦無世間妨難頌曰世間僅殖少種子便謂此兒是我生亦覺此樹是我栽故世亦無從他生如世間人指一男云此兒是我生然此男人非將彼男從自身出納入母腹是將此兒身之不淨種子注入母胎也由父僅注兒身之因便云生兒故世人不執種子與兒為自相之他此是世間共知之事故執種子與兒麥種與芽等為從他生世間亦無也若執為自性之他者應如他補特伽羅不可説此兒是我所生如是僅殖樹種種生樹後便覺此樹是我所栽是故世間亦無他生如上廣説所殖二種雖非彼樹彼兒然由殖彼二種乃生兒樹故指彼二可云是我所生如痛愈之手雖非補特伽羅然手痛愈可説彼補特伽羅痛愈也如是世間名言中雖無他生然世間常見不能破除他生以破因果有自性異體必待觀真實義之正理故他宗所計他生是有自性之他生非但有體之他以唯有此非是世間所不成故言故世亦無從他生者非謂世間常人於種芽等親因果法不執為有自性之他當知是説於名言中亦無他生如釋論破共生時云如上已説自生他生於世間世俗及勝義中皆不應理如是説是共生即以前理亦定非有此説名言中亦無他生顯句論中問曰若謂諸法自生他生共生無因生皆非有者云何世尊説無明緣行耶答曰此是世俗非真實義此説無明生行等是約世俗非於勝義問曰何為世俗建立答曰唯此緣性許為世俗非許四邊此説雖世俗中許依此緣有此法生然不許四邊生極為明顯故有説此宗世俗中不破他生是未善解此宗也巳三明破他生之功德由上所説諸法無自性顯示緣起離常斷門不墮常斷二邊之功德頌曰由芽非離種為他故於芽時種無壞由其非有一性故芽時不可云有種若芽是離種子有自性之他者則種芽二法不成因果芽雖現有種子亦必間斷無疑以種芽既無關係芽雖現有於種子間斷全無益故如雖有青牛於黃牛死已間斷全無少益雖有異生於聖人自斷生死無少益也由是因緣芽非離種子有自性之他而是因果全不相違故有芽時種子亦無壞滅間斷遠離斷邊論中數説芽時種滅故種子壞義釋論説為種子間斷又論破種子不滅故種子間斷是彼種類相續斷絶也由芽種二法非一性故非即種子轉變成芽破有芽時種子不滅故不可説芽時有種亦破常邊此如廣大遊戲經云有種芽亦爾非種即成芽非異亦非一法性非斷常此謂若有種子則以種子為因芽亦出生設有是念若有芽生應非離種別生故芽種應是一體曰芽雖非離種別生然亦非種子轉變成芽何以故以芽非是離種別有自性之他亦非一性故如是雙破二邊即顯彼芽性是離常斷之法性也前經更解此義云諸行無明緣行非真實有行無明俱空自性離動搖初句是明行依無明之緣起因二句是明行非真實有之宗三句是明因果俱空四句明空理動搖即作行離動即諸行行空言自性離者是明所破之簡別與真實中無義同中論亦解彼經義云若法從緣生非即彼緣性亦非異緣性故非斷非常釋譯若法從緣生不即不異因是故名實相不斷亦不常
