body:
  text: 宗喀巴大師造釋第六勝義菩提心之六巳二破成立依他起有自性之量分四午一破成立依他起之自證午二明唯識宗失壞二諦午三唯龍猛宗應隨修學午四明破依他起與破世間名言不同初中又四未一徵依他起之能立明其非理未二破救未三以餘正理明自證非理未四明依他起有自性同石女兒今初如是已説若離外境定無內識今當更破不加無外境之簡別依他起唯事是有自性頌曰若離所取無能取而有二空依他事此有由何能證知未知云有亦非理若謂離外所取亦無異體之能取異體二取空之依他起是實有者今當問彼此依他起之有是由何識證知耶若謂由彼自識證知自識不應道理自之作用於自體轉成相違故如刀不自割指不自觸輕捷技人不能自乘己肩火不自燒眼不自見許自識知自識之敵宗至下當説彼識亦非餘識能知唯識自宗相違故唯識教説未得轉依果之前若有他識能為此識所見境者即失壞唯識宗也以是若依唯識宗義則彼能知畢竟非有識未知者而説境有亦非道理中觀師如是破已唯識師曰雖無餘識能知然有自證唯由自證知有依他起故此得有破彼頌曰彼自領受不得成若謂即彼自識領受自體亦不成立今當略説唯識宗自證之依據如分別熾然論云唯識師説識見二事謂見自及見境見境之識變似外境相已復為見自識之境答曰除見境所餘如何見自心此説除見境所餘謂離彼之外未見有能見自體者故唯識師説向內觀識全無二相復説彼識自見自體為之自證然不許彼識有能證所證之異相二諦論釋破自證時亦云遠離識二性要有能證者乃能知無彼若不爾者亦不應理故此説唯識師成立依他起為異體二取遍計執空時其依他起識遠離二取之自性要先以能知之自證成立乃可以彼為所依事知彼無有異體二取若先未以自證成立彼所依事則不可以彼為所依事成立遍計執空此是破云如汝所許須以離二取相之自證成立依他起然彼亦不成也有説由破如是自證故亦破諸瑜伽師各別內證之自證及破世人名言義云我自見之自證者實屬愚談未二破救分二申一敘計申二破執今初此中唯識師許經部計為成立自證故作如是言如火生時非漸照自體及瓶等是頓時俱照説瓶聲時頓緣彼聲及所詮瓶如是識生時亦非各別漸知是頓了自體及境故定有自證也其不許自證者亦定當許有自證若不許彼則後時憶念境謂先見此事及憶念能領受境者謂我先見皆不應理何以故先未領受念必不生念心唯緣曾領受境汝既不許自證如前見青識當時不曾有領受故後時有念則不得成此是以後念為因成立前見青識有能領受若成立前見青識有自領受之自證者則不得他極成之同喻故不作如是成立也若已成立見青識有能領受者則此領受不出自領受與他領受之二類初非汝宗所許次為自宗所破既破領受之能遍則領受亦不成也此破即是成立自證最有力之正理又此見青識由餘識領受亦不應道理此有二過一應成無窮謂若見青識由後起之餘識知者則彼後識須否更由餘識證知若不須者前識亦應爾若更須者彼識亦應更須餘知故成無窮過成無窮者初見青識便有領受不成之過也二應不見餘境謂若前識由後識知則應不知餘色等境不於後轉以識相續唯緣前識為境故此非不定以前前識為後後識知則以前識為所取義而生後識爾時不應捨內近所取義而趣外遠事故若謂能證前見青識之後見青識與觀青色之見青識同時生起無不於境轉之過者則一補特伽羅身中應有同類異體之二眼識同時生起若許爾者經説諸有情類各一識相續則成相違釋論云諸識次第起者如刺青蓮百瓣由速轉故現似頓起疏論解云如入舞場觀舞人面聽歌樂聲等頓緣五境云何五識不能頓起曰緣五境之諸識雖次第生起由速轉故現似頓起此極不應理成立有自證之經部師及唯識師解經説諸有情類各一識相續之義如釋量論云彼等從同類功能成決定是許一補特伽羅諸同類識不能頓生非許異類識不能頓生也藏人多説如觀彩縀時緣赤色白色等多識豈非頓生曰彼諸識實是次第生而似頓生此是不知經説各一識相續意説同類心王復不知一眼識能緣多色更不知有緣雜色之眼識也故應解為他問同類識應頓生答曰彼等由速轉故雖次第生現似頓生然説成立有自證之二宗以速疾轉為誤認頓生之因釋量論中已廣破斥則此論文難以立為彼二宗義似是梵本有誤諸有智者更當觀察為免無窮過與不見餘境過故決定當許有自證分由境心俱能引生後念故能比知前見青時有領受境時與領受心者既有自領受之自證由此自證亦能成立有依他起汝中觀師問此有由何能證知故如上答申二破執分三酉一正破他宗酉二自宗不許自證亦有念生酉三釋難今初頌曰若由後念而成立立未成故所宣説此尚未成非能立若依有自相説由後念成立所念境之前識有自證者則為成立所未成立之自證故汝所宣説有自性之念此於敵者尚未極成非是自證之能立如為成立聲是無常云眼所見性若依世間名言而説亦無自證之果念何以故如火先成立方知煙是彼果如是要先成立自證及念從彼生之關係乃能由念比知自證為有今彼自證於敵者宗尚未成立寧得有念為自證之果此關係不成之喻謂如見有水火不能比知定有水珠火珠即無彼珠由降雨鑽木等亦有水火故如是雖無自證亦有念生下當廣説此非説念與自證如煙與火從因果門由念比度自證是如前説由念比度前識有能領受此復定為自領受與他領受二門破他領受成立為自領受然許識為能證之經部師與唯識師所立二門實不決定如燈不自照仍不失其為能照如是內識雖不如敵宗所計能自領受亦不失其為能領受也若謂燈能自照者暗亦應能自蔽若爾如瓶在暗中不可見暗亦應不可見矣如中論云若燈能自照亦能照於彼暗亦應自蔽亦能蔽於彼即不作如是推察亦不應理頌曰縱許成立有自證憶彼之念亦非理他故如未知身生此因亦破諸差別縱許內識能自證及了境然説念心憶彼心境亦不應理汝許後時念心與前領受境之識是有自性之他故如慈氏識之自證與領受境近密之識先未領受不能憶念如是自身後時所生識亦應不能念未曾領受之心境是自性他故如先未知未曾領受者身中所生之識若謂一相續所攝者是因果法故有可念者亦不應理以此是自相他故之因亦能破彼一相續所攝及因果等諸差別故此於前如依慈氏近密法時已廣論訖酉二自宗不許自證亦有念生分二戌一此論所説戊二餘論所説今初汝既不許自證生念之理云何頌曰由離能領受境識此他性念非我許故能憶念是我見此復是依世言説由離前能領受境之識説此能憶念識是有自相他者非我宗所許有如上已説如種芽等親因果法其執為自相之他者世人通常心中無有此執亦如前説故前領受境與後憶念之因果世人俱生心亦不執為有自相之他非但不執且於後時憶念前緣境識所見之境時并可説言我先亦見此境故領受與念及彼時二境世間常心不執為名言有自相若不爾者則他人所領受自亦應能念也由前領受青識所受所了後憶彼之識非不受不了故能生念心謂我先亦見此此復是世間之言説也不可唯以假名猶覺不足必要推求假名立義觀察而立以推求假立都無可得虛妄之義即世間名言故釋論於破自相實者之自證與念後又云若依世間名言增上亦無以自證為因之念此説不但勝義即於名言亦破自證又云無自證分念如何生至下當説是指此段雖無自證然由領受即能生念之理也若念云我見是憶能見若念云見此青等是憶彼境若念云以前我自見者我自憶念此是特殊憶念他宗意謂若有此種念心則如見慈氏之識應自領受以念心是隨領受境起故自宗雖許世間之憶念然説能如是憶念者非由前領受境識能自證故而起是因前領受所了者後念亦能了別由境是一故起念心謂我以前亦曾見此慈氏也以是當知如云我自見者我自憶念此類名言自宗亦許然此與所破之自證全不相同他宗安立領受與念及彼時二境皆是有自相之他彼雖亦説領受與念同緣一境及許彼二為一相續然實不能如是安立前已廣説又雖念云見此慈氏然非執此時此處所差別之慈氏是先所見是緣總慈氏而説反觀內心便可了知戌二餘論所説説無自證能生念心之兩大派中靜天論師意如入行論云若無自證分云何能念識此敵者宗如前廣説於敵者宗所出之過答云不定自宗既無自證念云何生耶曰由念餘相連能念如鼠毒由能取心領受餘所取境事即由領受境識引生憶識之念也若謂由領受餘境能引生憶內心之念不應道理太過失故答曰無過言由領受境引生憶內心之念者非離識而念如念昔見此色是由心境相連憶念相連也如於冬季身被鼠咬中毒只覺被咬不知中毒後聞雷聲毒發雖亦能憶念是被咬時中毒然非前時已覺中毒也此中鼠咬喻緣青識領受青境咬時中毒喻緣境時有能領受心爾時自心不自領受如被咬時不知中毒後時憶被咬喻憶領受境昔能緣心雖不自證然由憶念領受境時即能憶念如由憶念被咬之力即能憶念昔時中毒也此是論師證明無自證分而能生念之最妙道理然諸解入行論者似皆未能如實闡明也他難後憶識之念應非道理前識不能自領受故此既總答不定故有説入行論於名言中不破自證者非此大論師所許也酉三釋難分二戊一釋餘現量及比量難戊二釋餘意識難今初問自宗既亦許有緣青等識如破他時説此有由何能證知未知云有亦非理自宗亦應犯過以此青識若自知為有應許自證若由餘識證知亦非理故答此是最難解處若以憶念心境為喻則易了知如由憶境之力即能憶內心不須別憶內心如是由成立青境之力即能成立有能緣之心離成立青境不須別成立能緣青之心也此復由青色境於緣青識印現有自相之力成立青色為有與他宗相同其不同者為成立此緣青內識他宗説是由離二取相純能取相之自證成立復説一切識皆同自宗則如中觀心論與二諦論本釋所説如斯單純之能取相決定非有故彼青識非由自證成立是由成立青境之力即成立彼青識如由憶境即能憶心非如他宗所許要彼前心能自證之力乃能憶念也此如顯句論云能量之數是由所量增上決定唯隨所量行相安立能量之體性故此説能量決定為二者是由所量決定為二增上之力而安立故及説能量由現所量行相增上之力安立能量自體為有唯字是遮如唯識與經部所許由能量心隨所量行相轉故成立所量次成立能量時捨棄前理別説能量自體由離二取相純能取相之自證成立義説唯由成立所量即能成立能量也聖者亦云若量自成者則應汝能量不待所量成皆不待他成此謂若如他宗成立能量時唯由成立所量猶嫌不足必要能量自成立為量者則應不待所量成立為能量若許爾者一切諸法皆應不待因緣各自成立此亦反顯唯由成立所量即能成立能量也以是當知青識非如他宗由自證成立是由根現量成立由緣青識成立所量即能通達有彼識故故一切量皆是由成立所量即各自成立也戌二釋餘意識難問此宗既如上説影像與谷響等亦是色聲等處所攝顯句論亦説第二月等待無翳識非是現事待有翳識唯是現事此宗於説明現字為色聲等境之實名為緣彼心之假名時説第二月等待世常人雖有是否現事之別然自宗則許第二月等亦是所量現事故諸根識不論待世常人為錯不錯亂但由成立各自所量即能成立為內心也然則不許自證者應不能安立因位於所見境及所著境之錯亂意識以彼諸識不能由成立各自所量而成立內心故答此宗離六識外不許更有異識故除依止色根與唯依止意根之二種量外亦不許餘量顯句論説現比二量與聖教量譬喻量之四量者是依回諍論本釋而説其後二量亦比量攝四百論釋云非一切法皆是現識所了亦有比量所通達者又現量中他宗説有四種現量自證現量是此所破意識現量亦與因明中所説者不同四百論釋中解釋對法所説色等五處各為根識意識所了時云非由二識共知一境是先起一識親了境相次第二識非親知彼相由根識之力起如是分別即安立彼識為了知彼境此説先起根識親了色等境義由根識力意識亦了然非如根識親了也説念亦爾四百論釋又云非如受等領納行相亦非如色聲等由諸根親知此説量度現事僅有二種一如根識親見色等二如受苦樂等由內心領納而知此後者因位亦許有但離四現量外此宗未説更有現量然不可立為瑜伽現量與根現量及自證現量故當立為意現量攝雖説意現量與因明論者不同然非不許意現量也如是受字可通作者作用作業如云此人受由此受受此事其第二種屬於能量即受心所第三是所量有苦樂捨此是依意識增上而説根識之三受則能親知色聲等境成立之理如上已説若意識受能現知苦樂等寧非自證耶曰不然所破之自證是一切識唯向內緣永離能證所證之異相係單純之能取相此是經説以領納為相之受心世間名言亦説受苦樂故此有能受所受之異相故與自證不同由能成立受苦樂等即能成立能受心也又如意識見骨鎖等法處色時由於意識現彼等相即由意識成立彼等成立緣彼之識與前理同彼境亦與意識各異又如二種我執之意識成立之理如顯句論云隨是所相自相共相凡世間所有者一切皆是現可得故非不現事故與彼能緣識同安立為現事此説能相所相一切皆是現可得者是明四量中之現量時説故非是説由一切種智現前可得又云緣不現境從不錯因所生之識是名比量故亦非説一切自相共相唯是現事無不現事也以是當知若識緣於自相共相彼識即有二相之相現其所現相即彼識之現境安立彼境與彼識俱為現事故許現字為彼境之實名為彼心之假名若於此識有彼相現即説彼相為此識現境彼現境於此識為現見事此識於彼境為不欺誑識世間共許不欺誑識為能量故此識亦是能量爾時彼所量相即由此識而得成立其成立此識之理亦同上説故二種我執亦是現見二種我相彼所量現相即由此二執成立等亦同上説其餘於所著境錯亂之內識皆當如是了知如是諸識雖於所現境同是現量然於二我二無我及色常無常等是量非量則大有差別故內心是量非量之建立亦皆能成立也如上所説於所現境為能量之意識當知是於彼現境之意現量以是餘量皆已遮故不可説是自證現量以於彼境有二取相故根本無漏智離二取相而與法性有能證所證與一切諸識唯向內觀離二取相仍有能證所證者全不相同後者唯是宗派假立之能證所證即以觀慧審諦觀察終不見有能證所證之二相前者不然只要用意觀察能證之智與所證之法性境即各別現故由根本無分別智成立所量之法性時即由此力便能成立能緣之智此智離能證所證之二相與他宗所説一切諸識唯向內觀永離二相純能取相之差別後果地時當廣説自破他云此有由何能證知等所説衆過他反難時其不知各宗微細建立者復不能以自宗了義聖教最精微義及最難通達之深細正理而釋他難唯樂狡辨云我宗無所許故不犯過者實不需知如斯精微建立然諸聰睿智士若不見以精細正理簡擇得失之正道便不能信受吾為此輩故略示安立此宗無過之門徑也問其念我見青色此我是補特伽羅與緣青識相違如是念時如何是念緣青識耶答緣青眼識與見青之補特伽羅雖屬相違然以彼識見青為緣即可安立是我見青并不相違如是由念緣青眼識見青為緣云我先見青説此補特伽羅即念緣青眼識何違之有未三以餘正理明自證非理由是因緣頌曰是故自證且非有汝依他起由何知作者作業作非一故彼自證不應理是故自證且非是有汝唯識師所説依他起性為由為識證知為有耶又由能斫木之作者與所斫之木及斫木之作用三非是一故説彼識能自證知不應正理此違害之理如二諦論釋云於識自體不見有諸極微及離二相之體性不可見者即無言説安立諸識唯向內觀離二取相領受體性自為能證所證然以觀慧任何觀察終不見有能證所證若於彼上能安立能證所證者則餘作者作業作用皆應成一也故智藏論師説唯識宗之自證與小乘部之無方分極微有無相等以無方分極微亦必有所在處見彼相時離諸方分則無可見故説彼二之能證所證與無方分純屬宗派之假立也若説彼二是見而不定法亦不應理如二諦論釋云若謂此是見而不定如是亦無言説縱言可見不可信故唯可飲誓水此謂唯有盟誓成立為可見又以楞伽經所説道理亦能證明自證非有經云如劍不自割指亦不自觸如是應知心不自證亦爾未四明依他起有自性同石女兒頌曰若既不生復無知謂有依他起自性石女兒亦何害汝由何謂此不應有依他起性不從自他生既如前説今復宣説無有能知彼之自證若既不由自性生又無量能知而謂依他起事是有自性則由何道理謂石女兒不應有此石女兒於汝唯識師復有何害汝今亦可許彼為有謂石女兒離一切戲論唯聖智所行是離言自性也午二明唯識宗失壞二諦又汝前説是假有法所依因若依他起是有自性雖可應理頌曰若時都無依他起云何得有世俗因若時依他起都無少分自性則説名言世俗錯亂之因為實物云何得有也此明由計依他起勝義有故即失壞勝義諦故唯識師所説世間名言之因非有自性頌曰如他由著實物故世間建立皆破壞嗚呼可嘆如他唯識師由無簡擇究竟了義之慧力執著依他起物以為真實矩知依他起法如未燒之泥瓶非理觀察如注以水由智慧惡劣故例如觀待世間共許之建立坐去作等及諸外色與從外境所生之受等皆被破壞故唯識師唯護衰損不能證得增上勝道由破外境乃破去坐等諸外事乎此明唯識宗失壞世俗諦午三唯龍猛宗應隨修學如是由師倒説不了義為了義不得佛意隨自分別妄造宗派入彼道者頌曰出離龍猛論師道更無寂滅正方便出離龍猛菩薩所開之軌道更無能得寂滅涅槃之正方便何以故頌曰彼失世俗及真諦失此不能得解脫由出此外者決定失壞世俗諦及勝義諦失壞二諦者至未捨盡彼執決定不能證得解脫何以故頌曰由名言諦為方便勝義諦是方便生不知分別此二諦由邪分別入岐途由不顛倒名言諦之建立即是如實通達勝義諦之方便如實通達勝義諦是從上説方便生起之果故不知此二諦之差別者即由邪分別誤入歧途此明未知無過失之名言建立必不能如實通達真勝義諦故唯當隨學龍猛菩薩所開闢之軌道也如見真實三摩地經即寶積經見實會云世間智者於實法不從他聞自然解所謂世俗及真諦離此更無第三法此明佛自力宣説二諦及明一切所知決定唯二諦所攝次云衆生為求安樂故於善逝所生信心如來悲愍於一切為利世間説俗諦此明説世俗諦之所為又云人中獅子設世俗顯示衆生為六趣地獄畜生及餓鬼阿修羅趣與人天下賤種姓高貴族大富家庭與貧舍奴僕之屬及婢使男女等類并二根所有衆生諸差別佛無比者為世説智者了知世俗諦佛為利人故宣説此明宣説世俗諦相又云衆生著此淪生死不能脫離世八法所謂利衰及毀譽所有稱譏并苦樂得利即便生欣喜失利便起瞋怒心餘未説者皆應知八病恆損於世間此明樂著世俗為實有者便恆追求世間八法為彼所惱流轉生死及明八法中初二法餘未説者亦當例知又云誰説世俗為勝義應知彼人慧顛倒此明若誰説世俗六道等法為勝義實有當知彼是具顛倒慧者故説自教如是計者亦是錯謬宗派又云不淨苦中説淨樂於無我性説有我無常法中説是常住此相中而愛著彼聞如來所説法恐怖誹謗不信受誹謗如來正法已墮地獄中受劇苦凡愚非理求安樂轉受無量百千苦此明串習四倒及被成立四倒邪宗所迷之外道輩聞佛聖教憎背誹謗由此力故墮地獄中及明彼等以非理方便求解脫樂非但不得反受無量大苦又云若有於佛正法中如實觀察不顛倒超出諸有入涅槃如蛇脫去其故皮一切諸法自性離空無有相第一義若聞此法生愛樂必得無上大菩提佛見諸蘊皆空寂諸界及處亦復然諸根聚落咸離相能仁皆悉如實知此明無倒通達甚深教義便能解脫生死次問如何通達謂聞一切諸法皆離自性之教心生愛樂了達其義必當證得大菩提也前明世俗此明勝義界謂地等界處謂色聲等處故諸不知世俗假立與勝義諦無自性者寧得解脫故唯識師皆是轉入歧途者也此説名言諦為方便者如三摩地王經云無文字法中何説何可聞於不變增益故有聞有説初二向明勝義無文字於彼勝義無文字之法中以分別心增益假立故有聞有説字之梵語為阿乂囉通字與不變二義此處若譯為無字尤妥增益雖多釋為於無計有於非計是然不限於彼義凡由分別假立者皆可謂增益也唯依世俗諦始可宣説勝義諦由此乃能通達勝義而得勝義涅槃如中論云若不依俗諦不得第一義不得第一義則不得涅槃午四明破依他起與破世俗名言不同若汝於我等極不顧忌我今於汝亦不容忍汝僅善破他宗謂以正理觀察不應理故破依他起自性我今仍以破自他生等道理破汝所許之世俗曰如無始以來經百千艱苦所積財寶被他奪去詐現親善授以毒食還奪其財深心慶喜我等奪汝依他起性實執之境實為饒益若汝於我以怨報德深心歡喜者可隨汝欲我等自得勝善利益也頌曰如汝所計依他事我不許有彼世俗果故此等雖非有我依世間説為有如汝唯識師計依他起事是有自性三十論云非不見此彼是聖智所證是自力許是汝自宗許有如是有自性之世俗非我所許也此蘊等諸法皆無自性唯由世間共許為有故我唯依世間説彼為有也此中世俗蘊等依世間名言安立有二道理一中觀師自宗所安立之世俗是依名言量安立非依理智安立二有時為化導增上安立蘊等有自性者是唯就他力而立非是自宗所許故破此二各有不同唯就他力而立者論曰果故是有所為而立者為令所化捨棄邪宗漸次通達真實義之方便也此文非説一切建立皆就他立自宗不許由所引教證亦可了知如引三律儀經云世間與我諍我不與世間諍世間説有者我亦説有世間説無者我亦説無七十空性論云生住滅有無以及劣等勝佛依世間説非是依真實此説安立有無等皆是依世間共許之名言增上而立也頌曰如斷諸蘊入寂滅諸阿羅漢皆非有若於世間亦皆無則我依世不説有如諸阿羅漢永斷諸蘊入無餘依妙涅槃界則一切世俗法皆悉非有若此世俗法於世間亦如是無者則我依世間名言亦不説為有故我唯依世間名言增上許有世俗法非不依世間名言由自力許有也又此唯由世間先許為有汝應唯待世間而破不可待餘中觀師而破也頌曰若世於汝無妨害當待世間而破此汝可先與世間諍後有力者我當依我等為遣除自身之錯亂世俗境故設大劬勞而修諸道若世間於汝無妨害者汝當唯待世間破此世俗若汝之道理能破世俗我亦當相助然以世間實相妨害故我等不能助汝唯當旁觀汝可先與世間諍辨諍辨之後誰強有力我即當依止之如果汝勝我願依汝若汝為世間所敗則當依止有強力之世間如是若無外境則違害名言量故不能成立外境非有問諸唯識師以無無方分之極微破彼極微所合成之外境此理豈不能破無方分之外境耶答非説正量不能破彼等然破彼等不必無外境由此當知雖破無時分之內識及彼識所續成之相續然亦不必破內識也他宗意謂若能破無方分之外境則亦能破於所見境不錯亂之根識錯亂根識既不能安立其境為有故亦破其外境也此宗則謂錯亂根識雖不能安立其所量為真實有然安立其所量為虛妄適成相宜此亦是提婆菩薩之意趣如四百論云謂一有一無非真非世間此説分別心境有無俱非二諦之建立故如是分別亦非龍猛菩薩所許也巳二明説唯心非破外境分三午一解釋地經説唯心之密意午二明外境內心有無相同午三解楞伽經説唯心之密意初又分三未一以釋地經成立唯字非破外境未二復以餘經成立彼義未三成立唯字表內為主今初問若汝怖畏世間妨難雖無觀察真實正理成立而許有世俗者亦應怖畏聖教妨難而許唯識如釋地經云如是三界皆唯有心答佛所説經如琉璃寶地汝不知彼是琉璃體迷為實事識水今欲取彼實事識水汝之智慧如未燒瓶試為汲浸必當碎成百片徒為知彼體者之所恥笑此經密意非如汝慧之所解也若爾經義云何頌曰現前菩薩已現證通達三有唯是識是破常我作者故彼知作者唯是心經説第六現前地現證法界由有思得一切種智菩提之心故名菩薩彼能通達三界諸有唯是識者是令破除常我作者通達世俗作者唯是心故彼菩薩能通達世間作者唯是一心如釋地經云隨順行相觀察緣起如是但生純大苦蘊純大苦樹其中都無作者受者彼復作是念由執作者方有作業既無作者於勝義中業亦無得彼復作是念如是三界皆唯有心如來分別演説十二有支一切皆依一心而立乃至廣説此經但成立無作者受者解釋唯心之義則説十二有支皆依一心故此經之唯字但遮離心之作者不遮外境此之敵宗是如攝大乘論云此中教者如釋地經薄伽梵説如是三界皆唯有心由教理比知唯識中引此為教證二十唯識論亦引彼教謂心字意取相應心心所法唯字遮遣外境如上破者清辨論師曾先破月稱論師亦隨破未二復以餘經成立彼義如是已説釋地經義唯心之唯字是破餘作者更以餘經顯示此義頌曰故為增長智者慧遍智曾於楞伽經以摧外道高山峯此語金剛解彼意由此唯字破餘作者是釋地經義故復為增長諸能通達真實義智者之慧故佛一切智於楞伽經中曾以如下所述此語金剛摧壞外道身中執我及自性等為世間作者之惡見高山解釋餘經宣説唯心之密意其語金剛如楞伽經云餘説數取趣相續蘊緣塵自性自在作我説唯是心此謂餘人説補特伽羅乃至大自在天以為作者我説彼等皆非作者作者唯是自心今為解釋此經義故頌曰各如彼彼諸論中外道説數取趣等佛見彼等非作者説作世者唯是心各如外道自宗彼彼論中説補特伽羅等以為作者等取相續及蘊等佛見彼等皆非作者故説世間作者唯是自心頌言外道意取多分以內道佛弟子亦假立補特伽羅及相續等為作者故或凡計補特伽羅等為作者者即非內道佛弟子數如同外道不能無倒通達佛經之義故外道言能遍一切也寶鬘論亦云凡説人蘊者世間數論師鵂鶹徒無衣問彼離有無故知唯佛教宣説甘露法離有無甚深是正法殊勝此説凡説補特伽羅與諸蘊為實物者雖似宣説雙離有無二邊之義應當問彼彼必不能解説其義是故當知永離有無二邊之教義唯是正法差別是為他宗所無之勝法由此生死無始故諸惡分別何所不有何不當有即現在世白淨斷等亦計實有蘊等而為作者有本作白淨乞等疏中譯作苾芻白淨等釋彼義謂諸露形苾芻然斷是靜慮之名故是內道説諸蘊實有為作者之一派名白淨靜慮者也
