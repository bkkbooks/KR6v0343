body:
  text: 宗喀巴大師造釋第六勝義菩提心之十壬三說彼所成空性之差別分二癸一略標空性之差別癸二廣釋彼差別義今初今為宣說空性差別頌曰無我為度生由人法分二佛復依所化分別說多種如是廣宣說十六空性已復略說為四亦許是大乘諸法無自性之無我佛說為二謂人無我及法無我此二分別之理非由人法上所無之我有所不同故分為二以所無之我同是有自性故是由所依有法有蘊等法與補特伽羅之差別而分也何故宣說彼二為度二乘衆生解脫生死故說人無我為度菩薩衆生得一切種智故說二無我如前所說聲聞獨覺雖亦能見緣起實性然彼不能由無量門經無量功圓滿修習法無我義僅有斷除三界煩惱種子之方便亦可說彼等圓滿修習補特伽羅無自性之人無我雖無以無邊道理破除補特伽羅實有之智慧然圓滿修煩惱種子之對治未圓滿修所知障之對治如是二種無我世尊復依所化種種意樂分別說為多種如般若經中已廣宣說十六空性之差別復略說為四種亦許彼等即是大乘如是略分為二中分為四廣分為十六種如經云復次善現菩薩摩訶薩大乘相者謂內空外空內外空空空大空勝義空有為空無為空畢竟空藏文為離邊空無際空無散空本性空一切法空自相空不可得空無性自性空廣說十六空已復說四空如云復次善現有性由有性空無性由無性空自性由自性空他性由他性空又說此諸空性名為大乘若空不空都無少許自性如是空性行相各別唯約世俗而說如中論云若有不空性則應有空法實無不空法何得有空法空則不可說非空不可說共不共叵說但以假名說前數句明有自性品皆不可說末句明可說世俗假有癸二廣釋彼差別義分二子一廣釋十六空子二廣釋四空初又分四丑一釋內空等四空丑二釋大空等四空丑三釋畢竟空等四空丑四釋一切法等四空初又分二寅一釋內空寅二釋餘三空初又分二卯一正義卯二兼明所許本性今初由本性爾故眼由眼性空如是耳鼻舌身及意亦爾非常非壞故眼等六內法所有無自性是名為內空眼等六內法無自性是為內空此復眼由眼自性空以眼之本性即自性空故如眼所說耳鼻舌身意當知亦爾如是空之理由謂眼等諸法於勝義中非常非壞故此中跋曹譯為此中非常謂不捨本性此復暫住即滅非全壞故此謂若法有自性定非常住及非壞滅此譯錯誤若如是者因應遍於宗異品故拏錯譯為若法有自性則應是常或永失壞極為善哉故前譯為遮詞定有誤也疏中將頌譯為由是常住性及非不壞故解曰若眼等有自性自性無變無壞彼等亦應無變無壞然彼不爾故彼等法皆無自性亦不應理若如是者言應無壞則成有壞經說非壞則成相違又此中非常謂不捨本性句應如拏錯所譯常謂不壞之性若謂既破常住則眼等法本位暫住後即壞滅當是實有為破此執故云非壞總謂若常無常皆非實有二萬光明論更有異解諸法本性如中論云性從因緣出是事則不然性從因緣出即名為作法性若有作者云何有此義性名為無作不待異法成卯二兼明所許本性龍猛菩薩論中所說不從因緣生之本性如是本性是菩薩所許否曰如薄伽梵說諸佛出世若不出世諸法法性恆常安住所說法性可許是有此法性為何等曰即眼等之本性眼等本性為何曰即眼等之不造作不待因緣唯是離無明翳之淨慧所通達性有計此論師不許勝義與法性者及計離無明染全無智者此文已善破訖有此法性耶曰誰云此無若無此性則諸菩薩復為何義修學波羅蜜多道謂若無勝義諦則無由通達彼諦而到究竟若無究竟則修彼道徒勞無益然諸菩薩實為通達法性與到究竟故而勤修習百千難行此即顯示若計法性勝義諦都非任何智慧之境而復修學無量難行乃最鈍根此如寶雲經云善男子當知勝義不生不滅不住不來不去非諸文字所能詮表非諸文字所能解說非諸戲論所能覺了善男子當知勝義不可言說唯是聖智各別內證善男子當知勝義若佛出世若不出世為何義故諸菩薩衆剃除鬚髮彼著法服知家非家正信出家既出家已復為證得此法性故勤發精進如救頭然安住不壞善男子若無勝義則修梵行徒勞無益諸佛出世亦無有益由有勝義故諸菩薩名勝義善巧不可言說與非諸戲論所能覺了者是說如無分別智親見勝義言說分別不能覺了非說全不能知既無勝義諦有諸妨難則反顯為有前文亦說是有故妄分判無與非有之差別是自顯智慧太薄弱也跋曹譯本多作若佛出世若不出世為何義故拏錯譯本則作若佛出世若不出世勝義不失與釋論前文引經若佛出世若不出世諸法法性恆常安住極相符順故為善哉外曰嗚呼噫嘻既不許少法是有自性忽許無所造作不待他成之本性汝誠可謂自相矛盾者答曰是汝未了中論意趣此中意趣謂若愚夫所取眼等緣起性即眼等之本性實際由顛倒心亦能現證彼本性故則修梵行徒勞無益由此眼等緣起性非本性故為證彼性而修梵行所破自性是破眼等即是實際所許自性是許眼等之法性為本性故破諸法性有自性與許諸法之法性本性全不相違如是法性亦是依世俗諦唯名言有說為無所造作不待他成說愚夫通常心不能見之法性名為本性甚為應理唯許此世俗有非是勝義有事亦非真實之無事以彼即是自性寂滅故非但龍猛菩薩自許有此法性本性亦能令敵者許有此義故辨論究竟即立此本性為自他共許也有計熱等為火等本性者畢竟非理以熱等是緣生性是造作故待因緣而生故則說眼等本性無所造作不待因緣皆不應理次跋曹譯云言彼中者謂無勝執法故於世俗中明如是行相義故拏錯譯云此中謂無勝執性故於世俗中如義成立故譯為此中謂較為妥善餘義謂無實執所著之境事於世俗中則明有造作及觀待他之行相義故由此所說龍猛菩薩許有本性則法界讚中盡其佛所說顯示空性經皆為滅煩惱非失壞此界說顯示空性之經唯是滅壞實執煩惱之所緣非說失壞破彼所緣而顯之空如來界亦可了知此言眼等由眼等空者是顯眼等由自性空非說眼等由離作者我故空如聲聞部計亦非如唯識謂眼由異體二取空計眼等自性不空由此一法無彼一法說名空性寅三釋餘三空由本性爾故色由色性空聲香味及觸并諸法亦爾色等無自性是名為外空相續不攝之色等六境由自性空之無自性名為外空外色由色自性空即彼色之本性故聲香味觸法性空之理當知亦爾此空及餘空經說非常非壞如前內空時所說應當了知又頌曰二分無自性是名內外空內識相續所攝之根依處由是識相續所攝諸根不攝故是內外法此法之無自性名內外空餘義如上又頌曰諸法無自性智者說名空復說此空性由空自性空空性之空性即說名空空為除執法者執空故宣說內外諸法如前所說是無自性善巧真理之智者說名空性本性內外諸法之本性空性復說由空性之自性或實有而空如是所依空性上之空性即說名空空說空性由實有而空者是為遣除執實法者執空性法性為實有之妄執故般若經宣說空空出世讚亦云為除諸分別故說甘露空若復執著空佛說極可呵有說唯遣除實法名勝義諦然執彼為實有有說非唯遣除所故要如青黃各自成就乃是法性復是實有此文即說彼二種執俱是佛所呵責也丑二釋大空等四空由能遍一切情器世間故無量喻無邊故方名為大離東西等方別無情器世間由方能遍一切情器世間故又修慈等四無量時緣十方所遍一切有情而修由所緣門立為無量故喻如十方無有限量如是修行亦無邊際無有限量故十方名大又頌曰如是十方處由十方性空是名為大空為除大執說如是東西等十方即由十方自性空此名大空是為遣除執諸方大為有自性之大執而說邪執諸方者如勝論外道執方為常住實法又頌曰由是勝所為涅槃名勝義彼由彼性空說名勝義空為除執法者執涅槃實有故知勝義者宣說勝義空勝義之義字有於所為說名義者如云此中有義有於所知說名義者如五義此中是說涅槃法身涅槃是此勝所為故即此法身由自性空名勝義空是為遣除執實法者妄執涅槃法身為實有之妄執故了知勝義之佛陀說勝義空又頌曰三界從緣生故說名有為彼由彼性空說名有為空由從緣生故說三界名為有為即彼三界由彼自性空說名有為空又頌曰若無生住滅是法名無為彼由彼性空說名無為空若法無有生住異滅是名無為即彼無為由彼自性空說名無為空丑三釋畢竟空等四空若法無究竟說名為畢竟彼由彼性空是為畢竟空若執常斷一邊即墮險處說名究竟非執無為法常與阿羅漢斷絶業力生死相續亦為究竟故當分別所治品險處之常斷與常斷之差別也若於何法墮邊執見之常斷二邊都不可得即說名畢竟即彼畢竟由畢竟自性空是為畢竟空如三摩地王經云斷除有無與淨不淨二邊亦不住中間斷除二邊執中間實有為除彼執故說此空如唯識師遠離自宗所說常斷二邊許彼中道以為實有又頌曰由無初後際故說此生死名無初後際三有無去來如夢自性離故大論說破名為無初際及無後際空如云此前非有自此乃有是為初際如云此後便無是為後際由生死無彼二際故說生死名曰無際即彼三有無自性往來猶如夢事由彼三有自性遠離故般若大論說彼名為無初後際空又頌曰散謂有可放及有可棄捨無散謂無放都無可棄捨即彼無散法由無散性空由本性爾故說名無散空散謂有放自棄無散謂無可捨者以彼自體任於何時都無可棄即不可棄捨之大乘彼無散法由無散自性空之空性說名無散空以彼空性即無散法之本性故又頌曰有為等法性都非諸聲聞獨覺與菩薩如來之所作故有為等性說名為本性彼由彼性空是為本性空有為等之法性說名本性以彼有為等之法性都非聲聞獨覺菩薩如來所作本來如是安住故即彼本性由本性自性空是為本性空問於空空時豈非亦說此義曰前所說者是為破執內外諸法空性由是理智所成計為實有此中說者是為破執都非由他所作之本性而為實有故無重復之失若能了知於法性上雖有此二疑難然能破實有都不相違則計勝義諦都非任何智慧所能通達之邪分別皆可息滅也丑四釋一切法空等四空分三寅一一切法空寅二自相空寅三不可得空與無性自性空今初十八界六觸彼所生六受若有色無色有為無為法如是一切法由彼性離空一切法謂眼等所依六根界眼識等能依六識界色等所緣六境界眼觸乃至意觸等六觸六觸為緣所生六受及有色無色有為無為等諸法如是一切法即由彼自性遠離而空是為一切法空寅二自相空分三卯一略標卯二廣釋卯三總結今初變礙等無性是為自相空色蘊自相謂有變礙等字等取乃至一切種智一切染淨種法各各自相此等無自性是為自相空寅三廣釋分三辰一因法自相辰二道法自性辰三果法自相今初色相謂變礙受是領納性想謂能取像行即能造作各別了知境是為識自相蘊自相謂苦界性如毒蛇佛說十二處是衆苦生門所有緣起法以和合為相何為色等之自相謂變礙是色自相如經云諸苾芻由有變礙名色取蘊此諸自相是舉能表各各本性者非說各別定義受是苦樂捨三種領納性想則能取青黃等外像與苦樂等內像像為形狀分齊行即造作謂除四蘊諸餘有為各別了知色聲等境是識自相五蘊之自相謂苦諸界之自相體性謂能令有情攝取生死如同毒蛇捉持於他而作損害佛說十二處能生衆苦是苦生門此三約生死中之蘊界處而說緣起之自相謂因緣和合辰二道法自相施度謂能捨戒相無熱惱忍相謂不恚精進性無罪靜慮相能攝般若相無著六波羅蜜多經說相如是四靜慮無量及餘無色定正覺說彼等自相為無瞋三十七覺分自相能出離空由無所得遠離為自相無相為寂滅第三相謂苦無癡八解脫相謂能解脫布施波羅蜜多自相謂身財善根皆能放捨之心尸羅自相謂無煩惱之熱惱獲得清涼忍奪自相謂不瞋恚即能忍耐心精進自相謂攝持無罪善法勇悍為性靜慮自相謂為攝一切善法故於善所緣心一境性般若自相為不貪著為趣涅槃於任何法都不貪著破實執故上來所述六波羅蜜多之自相是經中作如是說也初靜慮等四種靜慮慈無量等四種無量及餘空無邊處等四無色定正覺佛陀說彼等之自相為無瞋恚由離瞋恚乃能得故三十七菩提分法之自相謂能獲得出離解脫空解脫門之自相謂實執所得諸分別垢不能染故以遠離為自相無相解脫門由相不可得故寂滅為相第三無願解脫門之自相謂於行苦性正觀為苦更不希願三有盛事及以真實慧觀察諸行本性於出世果位亦不執為實有而生希願故以苦及無癡為相八解脫之自相謂能解脫諸等至障八解脫謂內有色想觀外色解脫內無色想觀外色解脫此二是變化障對治釋論本多將第二作內有色想文有誤失淨解脫第四靜慮相是為第三此是樂變淨色不樂變不淨色雜染心之對治現法樂住之道有二一住順解脫道謂四無色等至解脫二住寂滅道謂想受滅等至解脫辰三果法自相經說善决擇是十力本性大師四無畏本性為堅定四無礙解相謂辨等無竭與衆生利益是名為大慈救護諸苦惱則是大悲心喜相謂極喜捨相名無雜許佛不共法共有十八種由彼不可奪不奪為自相一切種智智現見為自相餘智唯少分不許名現見下文所說之十力當知以善决擇為自相由善决擇諸境於諸境上無礙而轉故名為力自稱於一切所知成正等覺自稱我已永盡諸漏并諸習氣自稱我說貪是是障解脫法自稱我說勤修地道能盡衆苦不見有一人能依法立難謂非如等佛此四無所畏以極堅定性為自相任何敵者不能動故法義詞辨諸無礙解以辨等無竭無盡為相與諸衆生利益安樂是大慈相救護一切苦惱有情是大悲相大喜以極歡喜為相大捨謂於此不貪於彼不瞋遠離貪瞋無雜為相許佛不共法有十八種以不被他奪為自相由佛無有不共法之所治品誤失等事無隙可乘不能映奪不能屈伏故十八不共法有三六聚身常無誤失語無粗暴音意無忘失念無不定心生死涅槃無種種想無不擇捨是初六聚志欲精進意念等持般若解脫皆無退失是第二六聚一切事業語業意業智為前導隨智而轉於過去世未來世現在世無著無礙正智見轉是第三六聚不共之訓詁謂彼諸法唯佛身乃有餘身非有故身不共此等廣釋如釋論中引陀羅尼自在王請問經應當了知一切種智智以現見一切所知為自相一切餘智唯於少分境轉故不許為現見一切所知也如是所說從色乃至一切種智所有諸相唯是能表彼諸法之自體與所破之自相有大差別卯三總結若有為自相及無為自相彼由彼性空是為自相空若有為法之自相及無為法之自相彼等自相即由彼自性空是為自相空寅三不可得空與無性自性空現在此不住去來皆非有彼中都無得說名不可得即彼不可得由彼自性離非常亦非壞是不可得空此現在法自生以後不能安住過去已生其生已滅未來當生現未尚生故三世中皆非是有已生當生及現在法如其次第於已滅時未生時及自生以後都無可得故說名不可得彼不可得由彼自性遠離非常非壞故名不可得空頌曰諸法從緣生無有和合性和合由彼空是為無性空諸法由是因緣生故無有因緣和合所生之自性即說彼等名曰無性此和合生法由自性空是為無性自性空如是所說之十六空非因破除實執之正理不同而分以彼一切皆由非常非壞之正理而成立故亦非由一補特伽羅成立無實而分以於眼等內法之上若以正量成立為無實則觀餘法時不須更立別因即依自因便能斷疑故以是當知是依一補特伽羅及依於各別法實執偏盛之各別補特伽羅而分也子二廣釋四空應知有性言是總說五蘊彼由彼性空說名有性空應知有性空之有性言是說五蘊非分別說是總略而說即破五蘊由彼自性空經說名有性空頌曰總言無性者是說無為法彼由無性空名為無性空若不分別總言無性者是說虛空與涅槃等諸無為法即彼無為法由無性之自性空名為無性空頌曰自性無有性說名自性空此性非所作故說名自性言自性者謂諸法之本性由此自性非聲聞等所作諸法本性如是住故由此法性自性無有自性說名自性空頌曰若諸佛出世若佛不出世一切法空性說名為他性實際與真如是為他性空般若波羅蜜廣作如是說若諸佛出現世間若佛不出世間一切法之自性空即說名為他性他性梵語可通三義謂勝他彼岸初謂勝真實義殊勝之義謂常不違越真實義之自相第二他者謂除世間是他出世無分別智性謂此智所證第三彼岸所有名為他性由超出生死故名彼岸即是實際此中際者謂永盡生死之涅槃由不改變真實義之自相故名真如即此他性由他性之自性故空是為他性空自性空等前雖已說此中復說亦無重復之過以此是依中分而說此後二空廣中二時數數宣說者因有疑云若許法性是諸法本性常時而有是無分別智之所量則應實有為除彼疑而說故不相違此中所說空性之差別與空性之道理是如般若波羅蜜多經中廣作如是宣說也庚四結述此地功德今當宣說信解般若波羅蜜多菩薩不共功德結述般若波羅蜜多品頌曰如是慧光放光明遍達三有本無生如觀掌中菴摩勒由名言諦入滅定此地菩薩以如前所說行相如是觀察發生慧慧光放大光明灼破障蔽見真實義所有黑暗遍達三有本來自性無生如觀掌中菴摩勒果復以名言世俗諦力入滅盡定如是雖能入滅盡定然不棄捨救衆生心頌曰雖常具足滅定心然恆悲念苦衆生此上復能以慧力勝過聲聞及獨覺第六地菩薩雖常具足滅定光明意樂然於無依苦惱衆生悲心轉增由是當知此菩薩之加行是生死攝意樂則是涅槃所攝又此第六地菩薩從此以上復能以智慧之力勝過一切如來語生之聲聞及中佛獨覺又頌曰世俗真實廣白翼鵝王引導衆生鵝復承善力風雲勢飛度諸佛德海岸第六地菩薩猶如鵝王成就世俗廣大道次第與真實義甚深道次第如同雙翼潔白豐廣引導所化衆生猶如羣鵝復承往昔所修善根之力勢如風雲即能飛度諸菩薩功德大海之彼岸也是故欲學此菩薩者亦須具備二種道次第之雙翅若全無翅或僅一翅安能成飛故不應自滿當修具足方便智慧二品之道而趣佛地釋第七勝義菩提心己三釋遠行等四地分四庚一第七地庚二第八地庚三第九地庚四第十地今初此遠行地於滅定剎那剎那能起入亦善熾然方便度住第七遠行地菩薩於第六地所得滅定此時剎那剎那能入能起入滅定者謂入實際此說真如名為滅定以聖根本定時能於此真如滅盡一切戲論相故如十地經云佛子菩薩從第六地來能入滅定今住此定能念念入亦念念起而不作證又此地中方便善巧波羅蜜多亦善熾然最極清淨清淨之理如前諸地所說道理應當了知唯由般若波羅蜜多行相差別安立後四波羅蜜多以擇法時即是慧度非餘相故安立為方便善巧波羅蜜多之方便善巧菩薩地中說二六種初謂依內修證佛法六種方便善巧一者菩薩於諸有情悲心俱行顧戀不捨二者菩薩於一切行如是遍知三者菩薩恆於無上正等菩提所有妙智深心欣樂四者菩薩顧戀有情為依止故不捨生死五者菩薩於一切行如實遍知為依止故輪轉生死而心不染六者菩薩欣樂佛智為依止故熾然精進次謂依外成熟有情六種方便善巧一者菩薩方便善巧能令有情以少善根感無量果二者菩薩方便善巧能令有情少用功力引攝廣大無量善根三者菩薩方便善巧於佛聖教憎背有情除其恚惱四者菩薩方便善巧於佛聖教處中有情令其趣入五者菩薩方便善巧於佛聖教已趣入者令其成熟六者菩薩方便善巧於佛聖教已成熟者令得解脫共有十二方便善巧釋第八勝義菩提心庚二第八地分二辛一明此地願增勝及起滅定之相辛二永盡一切煩惱辛三證得十種自在今初數求勝前善根故大士當得不退轉入於第八不動地此地大願極清淨諸佛勸導起滅定第七地菩薩數數為求勝前善根故當得不退轉入第八不動地此地勝過七地以下衆善之理如十地經云佛子譬如乘船欲入大海未至於海多用功力排牽而去若至海已但隨風去不假人力以至大海一日所行視未至時設經百歲亦不能及佛子菩薩摩訶薩亦復如是積集廣大善根資糧乘大乘船到菩薩行海於一念頃以無功用智入一切智智境界本有功用行經於無量百千萬億那由他劫所不能及此中未到大海喻七地以下到大海已喻得八地所行之道昔生第一出世心時廣發百萬阿僧祇等十種大願至此地中皆得清淨故此地中願波羅蜜多最為增上又立此地名童真地第九地時名法王子位第十地時得佛灌頂如轉輪王又不動地入法性滅定時諸佛勤導令起滅定如十地經云佛子此住不動地菩薩由本願力故住此法門流諸佛世尊與彼起如來智作如是言善哉善哉善男子此勝義忍隨順佛法然善男子我等所有十力四無畏等不共佛法汝今未得汝應為欲成就此法勤加精進勿復放棄如此忍門又善男子汝雖得是寂滅解脫然諸凡夫未能證得種種煩惱常現在前種種尋伺常相侵害汝得愍念如是衆生又善男子汝當憶念本所誓願普大饒益一切衆生皆令得入不可思議智慧之門又善男子此諸法法性若佛出世若不出世法界常住所謂一切法空無所得諸佛不以得此法故名為如來一切聲聞獨覺亦皆得此無分別法性又云若諸佛世尊不與此菩薩起一切智智門者彼時即入究竟涅槃棄捨一切利衆生業此說八地菩薩於無分別智獲得自在住彼定時勸令起定為得諸佛十力等因於後得位修集資糧即二乘人亦得親證法性之無分別智有說通達真實義已不須修餘資糧可專修真實義者是愚人妄說也辛二永盡一切煩惱淨慧諸過不共故八地滅垢及根本已盡煩惱三界師不能得佛無邊德八地菩薩為諸佛勸起滅定已由無著淨智與貪等煩惱不共存故八地菩薩無分別智如同日光其如黑暗三界所行能招生死諸煩惱垢及彼根本種子皆悉消滅如是菩薩雖已永盡一切煩惱成為三界之師範然當其盡煩惱時猶不能得諸佛無量無邊如同虛空之功德為求證得彼功德故八地菩薩更當勤加精進也如何得知此地菩薩已盡一切煩惱十地經說彼時即入究竟涅槃故知此地已離三界欲若未離欲定不能證究竟涅槃故辛三證得十種自在此地菩薩已離三界欲則生死永滅如何能圓滿一切成佛之因耶頌曰滅生而得十自在於三有普現身此八地菩薩既已永滅由煩惱業力流轉生死當其證此地時即得智自在等十種自在故此菩薩能如勝鬘經說受意生身普於三有一切衆生之前現種種身故此菩薩圓滿資糧都不相違十自在者一得壽自在於不可說不可說劫加持壽量故二得心自在已於無量無數等持智觀入故三得財自在已能示現一切世界無量莊嚴具莊飾加持故四得業自在應時能現業果加持故五得生自在於一切世界示現受生故六得願自在於隨所欲佛剎時分示現成佛故七得勝解自在已能示現一切世界佛充滿故八得神通自在諸佛剎中皆能示現神通遊戲故九得智自在已能示現佛力無畏不共佛法相好正等覺故十得法自在已能示現無邊無中法門明故如十地經廣說釋第九勝義菩提心庚三第九地第九圓淨一切力亦得淨德無礙解第九地菩薩一切力波羅蜜多皆得圓滿清淨力波羅蜜多中說有力如十經云得善住意樂力遠離一切煩惱現行故得善住增上意樂力不離於道故得善住大悲力不捨利益有情事故得善住大慈力能救一切諸世間故得善住總持力無忘失法故得善住辨才力於一切佛法選擇分別得善巧故得善住神通力於無邊際諸世界中行善差別處得善巧故得善住大願力不捨一切菩薩所作故得善住到彼岸力普集一切諸法故得善住如來加持力一切種一切智智現在前故原論轉引莊嚴能仁密意論中經文條文有誤今依經改正如已圓滿力波羅蜜多如是亦得四無礙解清淨功德所謂法義詞辨四無礙解釋論云以法無礙解了知一切諸法自相以義無礙解了知一切諸法差別以詞無礙解善能無雜演說諸法以辨無礙解能知諸法次等相續無間斷性餘處則說法謂了知諸法異名義相了知所詮諸義詞謂了知訓詁辨謂辨說無盡釋第十勝義菩提心庚四第十地十地從於十方佛得妙灌頂智增上佛子任運澍法雨生長衆善如大雲十地菩薩從十方諸佛得大光明勝妙灌頂謂此菩薩證得百萬阿僧祗三摩地已最後名為一切智智最勝灌頂大三摩地而現在前此三摩地才現前時有大寶王蓮花出現其花量等百萬三千大千世界以滿百萬三千大千世界極微塵數蓮花而為眷屬菩薩身相與其蓮花正等相稱此三摩地現在前故示坐寶王蓮花座上適坐已十方一切佛剎諸佛衆會皆從眉間白毫相中出大光明入此菩薩而為灌頂廣如十地經說又此菩薩十波羅蜜多中智波羅蜜多最為增上智波羅蜜多與慧波羅蜜多之差別如菩薩地云於一切法如實安立清淨妙智當知名智波羅蜜多今於此中能取勝義無分別轉清淨妙慧當知名慧波羅蜜多能取世俗有分別轉清淨妙智當知名智波羅蜜多如是名為二種差別如雲降雨生長世間一切稼穡如是十地菩薩亦為生長所化衆生善根稼穡任運澍濡法雨是故此地名法雲地
