body:
  text: 宗喀巴大師造釋第六勝義菩提心之五辰二別破唯識宗分三巳一破離外境識有自性巳二破成立依他起有自性之量巳三明說唯心非破外境初中分二午一敘計午二破執今初諸唯識師於上述中觀宗心不忍可不依佛意唯隨自分別建立宗義欲顯自教所說宗旨頌曰不見能取離所取通達三有唯是識故此菩薩住般若通達唯識真實性安住增勝般若波羅蜜多勤修真實義之六地菩薩由何正理能不增益異體二取無倒通達見悟真實是為通達唯識真實性謂由了達都無外色諸心心所唯緣起性故名通達唯識實性又此菩薩如何通達唯識實性謂此菩薩以下所說從內習氣成熟而生色等之理於自心上由無異體所取亦不見有能緣異體境之能取即便了知三界唯識善了知已復長修習二空真實由久修習乃以內智現見真實不可言說二空自性六地菩薩由先如是次第修習故得通達唯識實性若無外境唯有識者既無外境帶境相之唯心云何生起頌曰猶如因風鼓大海便有無量波濤生從一切種阿賴耶以自功力生唯識譬如波濤所依大海因風鼓蕩原如睡眠安穩不動之波濤互相競起奔馳不息如是內外一切法種子阿賴耶識與貪等信等俱生俱滅各將自隨順功能薰習阿賴耶識由此習氣成熟之力便有不淨依他起性之唯識生愚夫於此執為內外分離之能取所取然離內識實無少分異體所取此如說大自在天等為因者云蛛為蛛綱因水晶水亦爾根為枝末本此是衆生因說大自在天等為衆生之作者如是說有阿賴耶識者說彼識是一切法之種子依名一切種子唯大自在常住阿賴耶識無常是其差別以是多生習外道見者要說有阿賴耶識方能調伏也若爾釋論敘唯識宗時多云無外境又云離識實無少分異體所取此於所無之色等所取上加離識異體之簡別又妄執名為色根眼句之釋云實無離識之眼根為於所破加如上簡別是唯識宗所許耶為不加簡別直云無色等五境及五色根是彼所許耶曰此釋論中實有加不加簡別之二類如破生時多於所破加簡別語其未加時亦皆例加此亦應爾敵宗所依攝大乘論云何緣此識亦復說名阿陀那識執受一切有色根故一切自體取所依故所以者何有色諸根由此執受無有失壞盡壽隨轉又云共相者謂器世間種子不共相者謂各別內處種子共相即是無受生種子此說阿賴耶識上器世間種子即是無受法之種子攝决擇分亦如是說緣起經釋說由阿賴耶識為緣成就名色說名為餘四蘊說色為大種及大種所造色又說彼色無色界無下二界有故唯識宗許有色者無量無邊若不爾者則唯識宗色蘊上所有色聲等名不加修改皆不可用已見彼名皆不可用猶稱彼宗為善者印度佛徒曾無是事又彼宗亦名所知屬內宗義為不許色聲等所知為外事說是內識事設作是念若唯識宗亦許色聲等者則破外境僅是名字之諍以現為外境之色有即立為外境故此與說中觀師破有自相之色而安立色者既現為有自相等色即立為有自相故辨自相有無僅名字之諍者全無差別實是兩宗最難了解之處不但中觀道理難知即於唯識宗此義亦覺若破外境則色等非有若立色等亦應安立外境故此等難處雖應解釋恐繁不述聖教建立作如是說頌曰是故依他起自性是假有法所依因無外所取而生起實有及非戲論境此依他起性定應許是有自性以是執有異體能取所取假有法等一切分別網之因故如以繩因緣誤以為蛇無繩為依則必不生及以地等因緣誤以為瓶等無地等為依於虛空中亦必不生如是既無外境誤認青等為外境之分別為以何等亂事為因故定應許現似異體二取之不淨依他起為誤認外境分別之因以彼所依是雜染清淨繫縛解脫之因故中觀唯識任於何宗如諸有情現所見境若能顯示如彼所見執為實有之所依由彼所著境而空者即說通達此空是為正道若不以通達能破一般有情實執境之空性為道而別立一實有空性則於無始傳來粗細實執俱不能對治徒勞無果於是當知此現似二取之依他起雖現似有異體能取所取而執有彼之遍計所執境實無所有即正觀此所依由彼所破為空又空所依及此空性即是所餘即正知此是真實有如是名為善取空義此中敵宗即是菩薩地及辨中邊論釋中謂由於此彼無所有等義寶性論釋解若此於彼無等義時作中觀理解與上二論全不相同恐煩不述又此依他起無外所取唯由自內習氣而生是自性有此宗勝義全非一切言說分別戲論之境以內外名言皆不取實相故總之依他起性有三差別一無外境而生二是自性有三於勝義中非一切戲論之境是假有法之因義亦攝在自性有法之中不異三差別言依他起有者非泛說有是特殊有如安慧論師云虛妄分別有謂由自性是語之餘此簡別於後文至為切要午二破執分二未一廣破未二結破初又分三申一破無外境識有自性之喻申二破由習氣功能出生境空之識申三明如是破與修不淨觀不相違初又分二酉一破夢喻酉二破毛髮喻初又分三戌一夢喻不能成立識有自性戌二夢喻不能成立覺時無外境戌三夢喻成立一切法虛妄今初頌曰無外境心有何喻汝唯識師說無外境心有自相當先推察有何譬喻而相比况若唯識師曰若謂如夢當思擇譬如有人眠極小房中夢見狂象羣然彼房中决定不能有狂象羣故如彼夢雖無外境定應許此有自性識為顯此說無心要故汝此譬喻當更思擇也云何思擇頌曰若時我說夢無心爾時汝喻即非有若時我宗說如夢中象境非有則見狂象羣之有自性心亦非是有以不生故若無有自性之識爾時汝所說兩宗極成之喻亦即非有故離外境非有內識此非是說如夢中無所見之象亦無內識是說無有自性之識以說前唯識宗許無外境之依他起是許有自性之依他起故又此破總結時總如所知非有故應知內識亦非有釋論明說當知帶所知相之內識亦不自性生又本論釋論此等破時多於所破加簡別故又云何故如來於彼經說心從無明業生說無明生行以行生識是自宗故故有智者不致疑此宗是說無識以是當知凡說所知能知有無相等者皆是依所破差別而說設作是念若謂夢中無亂識者則彼覺後不應憶念夢中所受此是以為識無自性識便全無而難此難非理頌曰若以覺時憶念夢證有意者境亦爾若以睡覺之時猶能憶念夢中領受便謂夢中意識有自性者則夢中所見象等外境如彼意識亦應是有何以故頌曰如汝憶念是我見如是外境亦應有如汝以睡覺時追憶我於夢中見有憶能緣之念便證有意識者如是追憶夢中見此亦有憶外境之念則外境亦應有或識亦應無也若爾自宗亦許憶念夢中之心境彼二有無如何許耶曰釋論說有憶念夢中領受及憶念夢中領受境以是當知夢中見象等時如醒位見本質之影像其見彼影像之眼識雖非領受本質境然可說是領受影像境如是夢中雖無所領受象境然有所領受現似為象之境故雖云念境實是憶念領受彼境所緣與領受除一二處外多不須如是分別也由是决不能安立外境所空有自相之依他起既無親喻如成立前世後世雖無親喻而有以餘因明式成立之疏喻此中亦無故當知此是破唯識宗最有力之正理戌二夢喻不能成立覺時無外境設曰若睡夢中有象等色則亦應有緣彼之眼識此不應理頌曰設曰睡中無眼識故色非有唯意識執彼行相以為外如於夢中此亦爾由睡夢中睡眠昏亂無眼識故眼處所取象等色境决定非有唯有意識雖無外色處然由意識現似外相即執彼相以為外境如睡夢中全無外境唯有識生如是覺時應知亦爾此謂前喻縱不能成立識有自性然以夢喻必能成立覺時無有外境唯有內識也破曰不然夢中意識亦不生故此謂夢中無色處其無色處之有自性意識夢中亦非有故彼夢喻亦不能成立全無外境而有有自性之意識頌曰如汝外境夢不生如是意識亦不生眼與眼境此生心三法一切皆虛妄如汝所說外境夢不生如是意識亦自性不生如醒覺位見色時有眼色意三法和合如是夢中了別境時心亦見有三法和合如夢中眼與眼之色境二俱非有如是此二所生之眼識亦定非有故夢中之眼色意三法一切皆是虛妄又頌曰餘耳等三亦不生如眼等三法其餘耳等三法亦無自性生此中等字等取聲及耳識乃至意及法處意識此謂耳根至身根之四根聲塵至觸塵之四塵耳識等四識如前所說眼等三法夢中雖無彼體而現彼相故是虛妄其意等三法則謂夢中雖有然無自性現有自性故是虛妄以是當知彼以為此師許夢中有根識而相攻難如云敵者之天未曉難者之日已出慧太粗陋故應棄捨藏中亦有自矜智者於此善巧宗義尚未知其粗分便謗為非福之田令諸衆生多造非福尤應慎焉若此設曰睡中等作為唯識宗義清辨論師為出喻不成過云意識所取法處所攝色夢中亦有故離外境全無內識此亦不應理夢中三法畢竟非有故若謂為破他宗故如是許者是則夢喻應全無用以夢非虛妄不能顯示所喻之法為虛妄故此謂有自性之根境識三法夢中亦畢竟非有故說法處所攝色於夢中離識實有不應道理然自宗亦許有彼色且許夢中有彼亦不相違故知說夢無彼色者是因清辨論師許彼色有自相也若謂因唯識宗說無外處所攝色時以夢喻而破今為破彼宗故許色有自相者則中觀師成立無實立如夢喻應成無用以夢非虛妄是有自相不能成立彼所喻之法為虛妄故以未破有自性以來成立無實之因法皆不隨彼喻轉故以是自宗前說夢中所見一切皆無自性最為善哉若爾夢中所見色自宗許是法處所攝色不曰以夢中無根識故夢中所見五境唯是意識所現夢中雖不可安立色等五處然可立為法處所攝色如意識所見之骨鎖立為法處故此復是法處五色中遍計所執色由此道理如斯多處皆當了知戌三夢喻成立一切法虛妄由夢中所見根境識三皆非實有則以極成不實之夢成立其餘未極成法亦非實有故能成立醒覺位中一切諸法皆無自性頌曰如於夢中覺亦爾諸法皆妄心非有行境無故根亦無如夢中之根境識等皆是虛妄如是醒覺位諸法亦皆是妄故彼內心非自性有如是諸根所行之色等境亦皆非有諸根亦皆無自性生是故經云猶如所見幻有情雖現而非真實有如是佛說一切法如同幻事亦如夢又云三有衆生皆如夢此中不生亦不死有情人命不可得諸法如沫如芭蕉皆成善說言不生等當如前云非真實有於所破上加簡別言此等經典皆以夢喻詮一切法非真實有於中觀宗極為應理於唯識宗則不應理故云善說頌曰此中猶如已覺位乃至未覺三皆有此世間固有無知睡眠又由暫離通常睡眠名曰醒覺如此醒位諸法雖本無自性生然以無明睡眠正作夢故見三法有如是乃至未離睡眠未醒覺位根境識三就彼心前皆可云有頌曰如已覺後三非有癡睡盡後亦如是如睡覺後夢中三法皆非是有如是諸佛斷盡愚癡睡眠親證法界則彼三法亦皆非有故無離外境之內識也此復應知如所有智前三法皆不現盡所有智前雖不由內心無明習氣之力而現三法然因他有情識以彼染力所現者諸佛亦顯現了知也酉二破毛髮喻他曰有翳之眼毛髮非有而有可見故雖無外境而識有自性此亦不然頌曰由有翳根所生識由翳力故見毛等觀待彼識二俱實待明見境二俱妄有翳眼根所生眼識由彼翳力見毛髮時若觀待彼人內識所見眼識與毛髮行相之境二俱是有若觀待明見境義無翳眼之所見則所現毛髮與見彼之識二俱虛妄不生無所現境說有彼識極難知故此義定應如是許若不爾者頌曰若無所知而有心則於髮處眼相隨無翳亦應起髮心然不如是故非有若謂有翳人雖於無所知毛髮而能生見毛髮行相有自性之心者則有翳人隨於何處見有毛髮若無翳人亦相隨逐審視其處亦應生見毛髮之心如有翳人無境相同故如從有自性之他生則應從一切他生如是若有一有自性之識生以無毛髮之境相同有翳眼既生見彼之心無翳眼不生見彼之心則不應理能難彼心不待有翳以全不相關故然無翳眼不生見毛髮之心故離外境有自性之識决定非有申二破由習氣功能出生境空之識分三酉一破說由習氣成未成熟生不生見境之識酉二重破說無外境而有內識酉三明破唯識宗不違聖教初又分二戌一敘計戌二破執今初設作是念若以現似毛髮之境為生識之因者則無翳者亦應生見毛髮識然今不爾是由往昔所薰能生識之習氣成未成熟為生不生識之因若有往昔見毛相識所薰習氣由此成熟乃生見毛相之識其無翳障清淨見境者由彼無有見毛相識之功能習氣成熟故無翳者不生見毛髮之識非由離所知毛髮境故不生彼識也戌二破執分三亥一破現在識有自性功能亥二破未來識有自性功能亥三破過去識有自性功能今初頌曰若謂淨見識功能未成熟故識不生非是由離所知法彼能非有此不成若有所說自性功能方可說由彼功能成未成熟生不生識若實無有自性之功能則此義不能成立如何不成頌曰已生功能則非有未生體中亦無能若計有功能為屬現在識為屬過去識為屬未來識且現在已生識中定無自性之功能未來未生體中亦無彼功能若計現在識有彼功能識與功能應同時有若於功能與有功能作六囀聲名功能之識則說彼二法無別體故功能之識即彼功能不應道理若不爾者則離果外應無別因芽已生時種應不壞若於功能與有功能作五囀聲名從功能識則彼識生是從同時之功能中生不應道理以於因位果已有故故現在識中功能非有亥二破未來識有自性功能若謂未生識有彼功能者頌曰非離能別有所別或石女兒亦有彼若云識之功能功能是所別事識是能別法其未來未生識不能表示其所立體性云是識亦不能表示其所破體性云非識其未來識現在尚無識體汝以何法簡別功能云此功能是彼識之功能耶如是既無能別之識則以彼所別之功能亦定非有若不爾者則石女兒亦應有彼功能也若謂心想某識當從功能生便云此是彼識之功能從此功能出生彼識於是即成能別所別世人亦云煮飯及云此線織布心想當來之飯布作如是說俱舍亦云前三種入胎謂輪王二佛是於當來之輪王等入胎說名彼等入胎如是心想當生之識說名識之功能此亦全無心要頌曰若想當生而說者既無功能無當生若法有時生者乃可說當生彼果其恆時决定不生者如石女兒等及無為虛空等則現在後時皆定不生若自性之功能是有者乃能生識若現在未來皆無有自性之識者則定無生彼識之功能既無生自性識之功能則自性識之當生亦定非有如石女兒等中觀師破芽自相生時多出難云若種時無芽而生芽者亦應生兔角等此中關要是因自相之芽一是無有則終非有便與無法無別非總破種時無芽而有芽生便云應生兔角等此理亦釋煮飯等喻以若如自性生者則飯等亦無當生故復次頌曰若互相依而成者諸善士說即不成若觀待當生之識立彼識之功能觀待識所從生之功能而立識者則是互相依待而成也若許此者諸善智者皆說有自性之識即不成立矣釋論復說如長短彼此觀待成者皆是假有無自性成故非泛破彼等成立當知是別破自性成立也若如是許則當隨順吾等而說故未來識亦無功能亥三破過去識有自性功能今當明過去識亦無功能頌曰若滅功能成熟生從他功能應生他若謂已生正滅之識為生自類果故於阿賴耶識薰成習氣功能差別從已滅識之功能成熟力故出生當生之識者則後他自性功能應生其他果識何以故頌曰諸有相續互異故由有相續諸剎那法次第生者如汝所許前後體性互相異故相續之字界云達努謂增廣施以字緣成展轉義名曰相續猶如河流相不斷因果相續轉時由於生死展轉無間無斷是三世諸行剎那之能取此說是諸剎那分之有分非僅說前後無間也由此遍於諸相續分剎那中有故相續支分之諸剎那名有相續由諸支分是有分相續之支分故說相續是彼之能取如瓶是瓶嘴瓶項等之能取也此前後諸剎那更互相異為自相之他是敵者所許故應是從有自性之他功能而生他識也若謂許者頌曰一切應從一切生是則一切法應從一切法生也頌曰彼諸剎那雖互異相續無異故無過此待成立仍不成相續不異非理故設作是念彼前後剎那次第轉時其有相續諸剎那法自性互異雖有他性然遍於彼前後剎那上之相續則唯一無異故所說應一切法從一切生此過非有此說前後相續是一者即答他生太過之根本釋難若前後自性異法同一相續已極成者可容無過然相續是一尚未極成故一相續仍是所立之法也所以者何以前後自性各異諸法是一相續不應理故頌曰如依慈氏近密法由是他故非一續所有自相各依法是一相續不應理喻如慈氏與近密身中所攝諸法由補特伽羅是各別他故非一相續所攝如是自相各別前後剎那說是一相續攝亦不應道理如是於他生出太過時他宗答曰稻之種芽是一相續彼與麥之種芽非一相續故非一切從一切生破他此答不能釋難之關要是因他宗許有自相之他非凡許他即為出難極為明顯以是有人或作同類攻難而破或由未知所破之簡別是自相他棄捨月稱論師所說他宗不能釋難之理由說所未說之理由實是正宗之污垢也酉二重破說無外境而有內識分二戌一敘計戌二破執今初如是說已諸唯識師復欲申述自宗成所樂義頌曰能生眼識自功能從此無間有識生即此內識依功能妄執名為色根眼由前眼識正滅時於阿賴耶識中無間薰成能生眼識之功能習氣從此習氣成熟便於後時有前識行相之眼識生起眼識無間所從生之功能剎那是眼識之所依世間愚人即執彼功能名有色根之眼實離內識眼根非有餘有色根應知亦爾其能生眼識之習氣因是因緣眼根是眼識之增上緣此中說眼根是眼識之親因者意說能生眼識之習氣已成熟位非說眼根皆爾如辨中邊論云識生變似義有情我及了此境實非有說變似色等義與有情五根之識生是阿賴耶識安慧論師亦說諸有色根是阿賴耶識之所緣故許阿賴耶識之唯識師是說阿賴耶識變似之有色根為眼根等已說無有離識之眼根等當說色等亦不離識頌曰此中從根所生識無外所取由自種變似青等愚不了凡夫執為外所取於此世間從五根所生之五識實無所取青等外境是由前識於阿賴耶識中薰成自種由此種成熟變似青色等相由彼凡愚不了此義遂於內心所變之青等相執為所取外境故離內識別無外境更有異說頌曰如夢實無餘外色由功能熟生彼心如是於此醒覺位雖無外境意得有喻如夢中無餘色等唯由自心習氣功能成熟之力而生帶彼色聲等行相之心如是此醒覺位中亦無外境而有意生也戌二破執此皆不然頌曰如於夢中無眼根有似青等意心生無眼唯由自種熟此間盲人何不生如夢中無眼根有變似青等意識之心生如是無眼根唯由自識種子成熟而生則此醒覺盲人何不生見色等之意識如不盲者以夢覺二位無眼根相同故此亦是因無外色等而有自性識生則夢醒二位都無差別也若作是念盲人醒覺時不生明見色等之意識如夢中者其原因非由無眼根是因無有生如是意識之功能成熟故唯有功能成熟者乃有如是意識生此復是以睡眠為緣故唯夢中乃有覺時則無也此不應理頌曰若如汝說夢乃有第六能熟醒非有如此無第六成熟說夢亦無何非理若如汝說夢中乃有第六意識之功能成醒覺時非有則說如此醒覺時盲人無有第六意識明見色等之功能成熟如是夢時亦無云何非理若汝全無正理僅憑口說吾等亦可如上說也頌曰如說無眼非此因亦說夢中睡非因夢中見境應無眼識行相相順意識功能成熟所起之意識由識所依根無作用故如醒時之盲人如說無根非醒時盲人見境習氣成熟之因如是睡眠亦非夢中見境習氣成熟之因以無外境識能自性生者不須觀待習氣成熟也頌曰是故夢中亦應許彼法眼為妄識因由虛妄習氣生夢中見境之虛妄識故夢中亦應許如醒覺位見如是色等境法之識是虛妄及夢中眼為彼識之所依因如釋論云夢中所見境亦有三法和合可得又云夢中無色處眼根并彼二所發之識當知是說夢中雖無眼識等前五之根境識然就夢人前有彼三法可得故應許有夢中眼夢中眼識及夢中色非許彼三是真眼等如許有幻象馬及幻人不必許彼是真象馬及真人也頌曰隨此如如而答辨即見彼彼等同宗如是能除此妄靜如是隨此唯識師對中觀師作如何如何之答辨即見彼彼所答等同所立不極成宗如是即能除遣此唯識師之妄諍也如中觀師說醒時之根境識三皆自性空是所緣故如夢唯識師則云醒時內識由外境空是識性故如夢中識又云醒時所緣境是虛妄性以是境故如夢中境如是更云若無染淨所依之依他起性應無染淨無所依故如龜毛衣翳喻亦如是說其中前二比量喻不極成犯能立等同所立過夢中亦有離意識之法處所攝色故第三比量是欲成立染淨法有自相所依其無所依因犯不成過若謂無自相所依則犯不定過酉三明破唯識宗不違聖教如是破唯識宗非但不違正理亦不違聖教頌曰諸佛未說有實法諸正等覺於自宗經中不曾說有實法故如楞伽經云三有唯假立全無自性法於假立分別執為法自性無體無了別無賴耶無事凡愚惡分別如尸妄計度初句明三有唯由心假立第二句明假立義謂無自性法是說無自性非說法全無後二句明未通達真實義之惡分別者於如是唯心假立法計為有自性之法初頌總明無自性次頌別釋梵語茹巴通自體與色二義此處當作色解以與了別相對故無事句之事字上句已說無色事心事故此處當作餘自性事解是無破實有時所說之自性事如死尸之理謂無觀察真實義之心力此經即破計三界依他起為有自性也若謂此經是說依他起性由異體二取之遍計執自性空無故過失計此是真空不應道理楞伽經說大慧於一法無一法之空性是一切空之性最下者釋論云由牛非馬故說牛非有不應道理自體有故於此一法無彼一法之空與此喻相同之理謂世尊宣說離自性之空性者是因衆生無始以來於色等法執為實有為破此實執而說對彼當說所見之色等依他起非是實有若不作是說而說此依他起異體二取非是實有則與無牛之理由云牛非馬故相同也以是當知中觀唯識無論何宗說衆生執著之所依即此所見內外諸法無所不同明彼空者是遣除於所依上所生之執著亦無不同所不同者謂執著之相唯識師說現見二取內外分離若如所見執為二取異體是此執著相其能對治謂以此現見之依他起為有法破除二取有異體故是破彼所依事是此所破性也中觀師說若執現見法非由名言心安立是實有者即此執著相其能對治謂以此現見法為有法破無斯實有故亦是破彼所依事是此所破性以有情之執著非於彼所依事執有異體之所破性是執彼所依事即是彼所破性故宣說空性亦須如彼所執即明如是空故故有人說現在所見諸所依事以實有空為斷滅空棄此不用別以餘所見法為空所依事亦不說由是彼所破故空而說以有事故空俱非中觀唯識宗義即衆生身中無始傳來之執著有無執如斯所破之心當自向內反觀法稱論師曰於此亦隨說故惡暗周遍智者當知現在正是此類最多之時也釋論此處引父子相見經决擇二十二根無自性曰但有假名於勝義中眼與眼根俱不可得又曰如是一切諸法自性皆不可得此說諸法但有假名於勝義無及自性非有故於所破加簡別時此二僅是異門安立自宗皆云但有假名又說夢中共相娛樂之境夢中尚不可得况於醒時如此者甚多故說夢中人與醒時人是人非人無差別者極不應理以經說夢中共相娛樂之有情夢中亦不可得醒時有情有可得故以是當知有說此宗許夢中有眼識等五識實乃大錯故唯識宗無通達究竟了義之慧力其所立宗義恆應破斥也申三明如是破與修不淨觀不相違設作是念若無外境即無明見色聲等之自性識者則依師長教授修不淨觀之瑜伽師見有骨鎖充滿大地云何應理以雖無骨鎖而有自性之識故頌曰諸瑜伽師依師教所見大地骨充滿見彼三法亦無生說是顛倒作意故修不淨觀之瑜伽師依師長教授所見骨鎖充滿大地者今見彼中根境識三法亦皆無自性生經說彼定是顛倒不實作意故若見骨鎖之心是有自性彼心所見亦應有自性是則彼作意應成真實境作意故定應如是許也若不爾者頌曰如汝根識所見境如是不淨心見境餘觀彼境亦應見彼定亦應不虛妄如汝觀戲劇等時多人共觀彼境如一人所生具彼境行相之眼識餘觀戲者亦皆生具彼行相之眼識如是餘非修定者於瑜伽師見骨鎖處審諦觀視求其骨鎖等境亦應生如修不淨觀瑜伽師見骨鎖之識如緣青等之眼識若依釋論似應譯為如汝所觀根識境如是如修不淨心餘觀彼境亦應生彼定亦應不虛妄此定亦應非是虛妄顛倒義之作意也此出是非瑜伽師理應相等之過者亦因識有自性則不應觀待修骨鎖之教授也如是頌曰如同有翳諸眼根鬼見膿河心亦爾如有翳眼根若引幻事影像等喻答辨之理應亦爾又說餓鬼於江河處起膿血心亦應知同前此中法處之五種色非實事師宗假立是經中所說自宗亦許有故雖無骨鎖而明見之骨鎖如同影像當許為有色然此唯是意識所見故非色處攝亦非餘九有色處故是法處之遍計所起色眼識所見毛髮則如影像是色處攝餓鬼見河為膿血者是彼眼識所見故亦當立為色處攝大乘論亦云鬼傍生人天各墮其所應等事心異故許義非真實其等事為何及各別見之理攝論中俱未明說無性釋云於一河事自業變異增上力故餓鬼所見充滿膿血等處魚等傍生即見宅舍遊從道路人類即見甘清冷水沐浴飲渡入空無邊處定諸天即見虛空壞色想故若作是念此諸衆生所見是名言量若於一事有量成立諸相違事則膿血與非膿血應不相違量所成立亦不可信若彼論義作如是解如是安立許量不可憑信此實非理當如何釋此是智者之疑問也答若執彼解即是論義說量所成立不可憑信者則不可說吾於此義亦如是了解是即毀謗一切正量極不應理今先說喻如有善持明咒者雖觸熾燃鐵丸而不燒手將彼鐵丸取於手中身識雖亦緣彼鐵觸然不生感覺極燒熱相之識是因用咒水洗手為緣也其無彼咒力者則生覺彼鐵丸為極燒熱相之識也如是燒觸與不燒觸但應許是彼一鐵丸之觸塵二身識量此一量所成立之觸塵非彼一量所成立者故雖許彼二俱是量然非此一量之所成者即彼一量之所破也如是於一河處河之一分由鬼昔業增上力故見為膿血河餘一分由人昔業增上力故不現膿血現為可飲可浴之水彼二俱是河之一分由餓鬼眼識量所成立義與人眼識所成立義事體各別故非一量所成立義餘量即成立為彼相違事親友書云諸餓鬼趣於夏季覺月亦熱冬日寒亦說餓鬼由昔業力夏季覺月光觸塵為極燒熱冬季覺日光觸塵亦極寒冷人則覺日光為熱相月光為涼相全不相違此二亦非一量所量之熱觸即餘量所量之寒觸此二亦俱可立為日月光之觸故論中亦云等事故不應不審觀論義略得粗解便以為足也未二結破總如所知非有故應知內識亦非有總結上來廣說諸義謂如所知自性非有如是應知具所知行相之內識亦無自性生此說能知所知俱無自性同也若謂毛髮非有即無見彼相之識及無於幻所執之象馬即亦無執彼之心實非此師之正宗也出世讚亦云不知非所知彼無知亦無是故佛宣說知所知無性又云諸識同幻化是日親所說彼所緣亦爾决定同幻事此謂若不可說云是此識之所知則不能安立為所知境若不可說云此知如此境亦不能安立為能知故無所知能知亦無由能知所知觀待立故佛說彼二俱無自性以是彼二於二諦中不可分別一有一無即是聖者意趣釋菩提心論云由知知所知離所知無知與前所引讚義相同故亦是心境有無相同之根據也
