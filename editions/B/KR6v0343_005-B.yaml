body:
  text: 宗喀巴大師造釋第六勝義菩提心之二丑二明執彼違品之寔執一切唯由名言增上安立為有若執非如是有即是執實有勝義有真有自性有自相有自體有之俱生執此執所執之境即是假設寔有之量於所破上所加勝義簡別有二種勝義此派亦同中觀自續派雖於所知不許寔有等三然自性等三則許名言中有此於暫時未能通達最微細之真寔義者寔為引導證彼之大善方便也如是當知諸法體性若不依名言分別非由分別增上安立說彼體性即所破之我此我於補特伽羅上非有即補特伽羅無我於眼耳等法上非有即法無我由此可知若執彼體於補特伽羅及法上有者即二種我執如四百論釋云所言我者謂諸法體性不依仗他由無此故名為無我此由法與補特伽羅之差別分為二種謂法無我與補特伽羅無我本論亦云由人法分二故二無我不由所破分別乃以所依有法而分俱生我執薩迦耶見本論破他以諸蘊為所緣釋論說緣依蘊假立之我故起我覺之所緣乃唯我及唯補特伽羅其行相釋論云我執於非有我妄計有我執此是寔此謂執彼我為寔有釋論又云薩迦耶見執我我所行相而轉是染汙慧此說俱生薩迦耶見之所緣任運能起我覺故執他補特伽羅為自相有之俱生執雖是俱生補特伽羅我執然非俱生薩迦耶見執我我所行相而轉者非顯我我所執行相之境是說於彼二自相有起執即為行相俱生我所執薩迦耶見之所緣謂我所法非以我之眼等為所緣其行相謂緣彼所緣執我所為自相有若爾何故釋論解我所云次念云此是我所謂除我執境外貪著餘一切事此豈非說計着眼等事為我所即是我所執耶彼論意說於眼等見為我所執我所為寔有非說眼等是我所之所相事若不爾者則薩迦耶見與法我執應無差別俱生法我執之所緣謂自他相續所攝之色蘊等眼耳等及非相續所攝之器世等行相如前說此二種我執即繫縛生死之無明七十空性論云因緣所生法分別為真實佛說是無明彼生十二支此說緣諸法執為真寔即生死根本之無明從法我執引生補特伽羅我執之無明故說從彼生十二有支破此無明必須見彼所執為空及無彼所執之我七十空性論云見真知法空無明則不生此即無明滅故十二支滅法界讚亦云若執我我所即妄計外法若見二無我三有種當滅又云最上淨心法是為無自性四百論亦云若見境無我三有種當滅又云故一切煩惱癡斷故皆斷若見諸緣起愚癡即不生是故於此中勵力宣此說此所說癡是三毒中之癡故是染污無明此說滅彼無明必須通達空即緣起之甚深緣起義釋論解故瑜伽師當滅我謂由破除我執之境通達無我故若未能破我執境但於彼境攝心不使散亂不可說為通達無我此謂心於境轉總有三相一執彼所緣為寔有二執為無寔三都無彼二差別相如未執無寔時非即執為寔有故未緣二我時亦不定緣二無我有無量心住彼第三類中是故要於自身認識二種我執次於自所誤執之事抉擇非如執有若不爾者唯於門外破立全不得要領如賊逃林中於林外追尋也若能善知寔執則知有無量分別非二我執彼妄執凡分別心所取之境皆是觀察真義正理之所破等邪執皆可斷除也壬二以理成立聖教真義分二癸一以理成立法無我癸二以理成立人無我初又分四子一就二諦破四邊生子二釋妨難子三以緣起生破邊執分別子四明正理觀察之果初又分三丑一立無自性生之宗丑二成立彼宗之正理丑三破四邊生結成義今初前說十種平等性中此以正理成立自性無生平等性則餘平等性亦易知之故聖者於中論初云非自非從他非共非無因諸法隨於何其生終非有終謂畢竟隨於何謂任於何此所依聲於何明無生之所依謂時處宗派於彼三事中何法不生謂能依之內外諸法由是非自等論義應如是配釋內外諸法於任何時處宗派自生決定非有餘三宗亦應如是配釋顯句論雖譯為從自諸法然以今譯為善或念不生為處所增上如有處不生鬱金花時間增上如有時不生五穀耶今云隨於何時何處即破彼執故論置終字非全無義或念依中觀宗增上雖是無生依寔事宗增上應是有生今云隨於何宗即破彼執非但於寔事宗無生也釋論云此中非字與有之能立自生相連非與有相連破有義亦成立故此謂論義不可如彼以後二句為宗前二句為因者所釋當釋為從自生終非有餘三宗亦爾若有自性生則必須許成立彼之四生隨一故云有之能立末句破有義亦成立故之義謂若能破四邊生則亦成立破自性生故彼量式無不成立無自性生之過故不可如中觀明論所說以破四邊生為因成立無自性生又諸法隨於何時處宗派從他生决定非有顯句論云唯由此因緣許世俗有非許由四邊有應說諸法有自性故故他生二字非聖教之名言乃餘宗之名言意指有自相之他若許彼者即應許有自性故此宗於名言亦不許有他生雖名言中許因果異體然彼非是他生之義如名言中說一一法各有二體然不許彼體即自性生之體生顯句論說諸法無自生之宗是無遮餘三宗亦爾故决擇無自性時之所立即唯遮所破之無遮如顯句論云世間所有言無事無所有此等為顯無遮故無事即無自性義釋論亦云已說四宗為以正理成立故下文亦以破四邊生為因說諸法離自性生顯句論破四邊生之後云故生非有是所成立故非不許成立諸法無自性生顯句論云諸比量唯以破他宗為果此說諸比量式唯破他人自性有之宗不更成立別法然非遮成立彼破故彼又云吾等非成立有無唯破他人增益之有無破除二邊成立中道此說唯破他人所計之有邊無邊此外不成立餘法然非不成立破除二邊以說破除二邊成立中道故若謂亦非無自性者則應成有自性離此更無第三品故如廻諍論云若即無自性遮於無自性由遣無自性即成有自性雖許有如是能立所立然非自續派如餘處已廣宣說二種遮遣之相云何凡言遮者謂由內心正遣所遮而得通達若僅於有事法遮非自如云非自體此猶非是遮又如法性及勝義之名雖未正遣所遮然心中現起彼義時必現起遮遣戲論之相此乃是遮遮有二種一曰無遮謂心遣所遮法已不更牽引或更成立餘法如問云婆羅門可飲酒否曰不可此語僅遮飲酒不更成立可飲餘物二曰非遮謂心遣所遮法已更牽引或成立餘法如欲明某人是首陀種姓曰此非婆羅門此語非但遮婆羅門亦成立離婆羅門外之首陀種人於引餘法中又分勢引直引時引三種初如云胖祠授晝日不食此語義飲餘法二如云有無我此語能遣所遮及直引餘法上二是別引亦有一語俱引者如云胖祠授晝日不食而不瘦三如已知某人非剎帝利種即婆羅門種然未决定究為何種若於爾時云此非婆羅門此語雖未明說而意已顯般若燈論大疏引頌云其遮由義顯一言而成立彼俱不自顯非遮餘是餘有說若與所立事合即非無遮此不應理如婆羅門雖是所立事然說婆羅門不應飲酒仍不礙其為無遮如聲是現見境而聲無常不妨其為不現見境也有說若與所依合即牽引餘法此亦不應理如婆羅門是觀察引不引餘法之所依非彼即所引之餘法也如是聖者四宗本論成立頌曰彼非彼生豈從他亦非共生寧無因此謂彼果法非從彼自性而生豈從有自相之他因而生亦非從自他共生寧復有無因而生者若有自性之事則定從四邊隨一而生以自性生中定屬有因無因二類其有因中又定屬或從自他各別因生或從共因生之三類故四宗足矣丑二成立彼宗之正理分四寅一破自生寅二破他生寅三破共生寅四破無因生初又分二卯一以釋論之理破卯二以中論之理破初又分三辰一破自許通達真寔之邪宗辰二明未學宗派者之名言中亦無辰三結如是破義初又分二巳一破從同體之因生巳二破因果同一體性初又分三午一從同體因生成無用午二從同體因生違正理午三破彼救難今初諸法不從自生由何理而知頌曰彼從彼生無少德彼有生作用之芽若從彼芽自體而生者彼生毫無必須出生之增上功德以芽之自體於前因位已成就故數論外道見有互異諸因共生一果故說因中若無一同一體性之自性隨轉則不應理故說大麥親因之體性即是水糞等眾緣之體性如是芽之體性與因緣之體性亦同體相即一切果法之體性皆爾彼雖許種芽互異不許芽從芽生然說芽從種子及彼體性生時以彼二法體性是一理亦應許從自體生即是從因位已有明顯之芽生此即彼計自生之理數論別派不說為生但說因中不明顯者後乃明顯然義仍相同彼宗許總別同體義亦如是與佛弟子說瓶與有為同體之理極不相同如是若芽之體性已於種子位具有者離芽之體性外非別有明顯之芽則應因位非僅有芽之體性應已有芽若芽已有而更重生者寔屬無用也午二從同體因生違正理生已復生亦非理若計生已復生者此應不得生芽等盡生死際唯種生已生而復重生者非是正理亦顯非但計從自體性生者為無用即計果顯者顯果既於因位中有亦自宗相違若謂因中無者應觀果顯與果之體性為一為異而破之其破彼之理謂若計種子生已復更生者復以何理能遮種子復生而許生芽復生種子有何障碍既無障碍則芽苗莖等於此世間應皆不得生復有餘過應彼種子盡生死際無間而生以已生者復生故此舉應不生同類果應唯無間生同類因之二過斥其違正理也午三破彼救難若作是念由水時等能生芽之助緣令種子變壞令芽生起芽與能生之種子同時安住成相違故是種滅芽生故無違正理之二過又種子與芽體性非異亦非不從自生此不應理頌曰云何彼能壞於彼種子與芽二性畢竟是一云何彼芽能壞彼種應不能壞如芽不壞芽彼見斯過而不救者以彼愚昧以為芽能壞種是果位上事與自壞自體云何相同耶然一切體性既更互相即則說果位與因各別亦不得成故不能擇難也巳二破因果同一體性分三午一種芽形色等應無異午二破其擇難午三二位中應俱有俱無今初復有餘失頌曰異於種因芽形顯味力成熟汝應無汝宗應離芽之能生因種之形色顯色外無別芽之長短等形色青黃等顯色甘酸等味及勢力成熟等以種芽體性於一切種無差別故由此能破量反顯彼二體性非一非都無所異故此宗反顯與反顯自續有大差別言勢力者如治痔良藥近身即病除飛行神藥手執即騰空成熟者謂由別緣轉成異物如以乳灌橄欖蓽茇等則味轉甘美午二破其釋難設作是念捨種子位轉成芽位種芽僅是分別差別故即種子體性轉變成芽頌曰若捨前性成餘性云何說彼即此性若許全捨前種子性轉成餘芽位體性則說即種子體性是芽體性云何應理以彼位體性即是彼性離彼位體性外別無彼性也故說種芽體性一切無異不成若謂種芽雖形色等有別然物體無別此亦不應理以若不取形色等別無種芽物體可取也午三二位中應俱有俱無復有過失頌曰若汝種芽此非異芽應如種不可取或一性故種如芽亦應可取故不許若如汝說種芽體性於此世間非有異性者則於芽位應如種子亦不可取或因種芽體性畢竟一故如於芽位有芽可取種子亦應為根識所取欲離此二失故不應許種芽體性全無異也若善解此諸正理者則於妄計一切諸法雖異而彼法性更互為一及妄計前位之法性即後位之法性等一切邪執皆能遣除辰二明未學宗派者之名言中亦無自命通達真寔義之數論宗離佛教別計之自生已破訖今顯未學宗派世間常人之名言中若妄計自生亦不應理頌曰因滅猶見彼果故世亦不許彼是一種子因已滅猶有彼果可見故世間常人亦不許種芽體性為一也辰三結如是破義自生於勝義世俗二品皆違正理頌曰故計諸法從自生真實世間俱非理故汝妄計內外諸法從自生隨於真寔勝義與世間世俗俱不應理以是聖者破自生時不加勝義世俗簡別直云非自生而總破之清辨論師云諸法勝義非自生有故如有情所加勝義簡別誠為無用卯二以中論之理破復有過失頌曰若計自生能所生業與作者皆應一非一故勿許自生以犯廣說諸過故若計果從自生則所生果與能生因所作業與能作者皆應成一然彼等非一故不應許自生以犯此論與中論廣說諸過故其初過者如中論云因果是一者是事終不然若因果是一生及所生一謂因果若是一性則父與子眼與眼識皆應成一第二過如中論云若然是可然作作者則一他雖救云若謂父與子作者與業體性應一此是我所許若謂總應成一則犯不定過然如前說若計體性是一則果相亦應是一故不能釋難也以是若怖所說眾過欲求無倒通達二諦者不應妄計自生又有自生與無自生相違既遮除一品則於餘品决定故無自生定是所許寅二破他生分二卯一敘計卯二破執今初自教寔事師言自生無用故自生非理由無自生故共生亦非理無因生乃最下計亦應破惟云豈從他而破他生不應正理以諸經說由他自相之四緣能生諸法雖非所欲亦須許由他生何等為四緣有說因緣是五因性除能作因如俱舍云因緣五因性所緣緣謂六識所緣境一切法如云所緣一切法等無間緣謂除入無餘依涅槃心其餘已生心心所法如云等無間非後已生心心所增上緣謂能作因如云增上即能作六因如俱舍云能作及俱有同類與相應徧行並異熟許因唯六種又有說云能生者謂因此約體相而說謂若有法為彼法之能生住種子性此法即是彼法之因緣如年老人依杖乃起正生心心所法要依所緣乃生此法即是彼所緣緣因滅無間即生後果此因是果之無間緣如種滅無間即能生芽釋論云如種滅無間為芽之等無間緣顯句論破無間緣時亦破芽之等無間緣佛護論師亦如是說此是許色法亦是等無間緣之宗派若有此法彼法乃生此法即彼法之增上緣顯句論說前生俱生後生諸緣亦皆攝於四緣中釋論除初句餘亦如是說般若燈論譯為餘部所計先生有無諸緣其義相同譯文較善入中論疏解此義云上座部所說先生緣者謂諸根現識之先生所緣緣有緣者謂因緣與增上緣無緣者謂無間緣此等唯名字略不同察其體相仍四緣中攝由大自在天等非是緣故當知更無第五緣如俱舍云心心所由四二定但由三餘由二緣生非天次等故卯二破執分二辰一總破他生派辰二別破唯識宗初又分五巳一正破他生巳二釋世間妨難巳三明破他生之功德巳四明全無自性生巳五明於二諦破自性生之功德初又分三午一總破他生午二別破他生午三觀果四句破他生初又分二未一以太過破未二破釋妨難初又分二申一正明太過申二决擇彼過今初此他生義不能安立違教理故教如稻稈經云此名色芽非由自生非由他生違此等眾多破他生教故今當說違理失頌曰若謂依他有他生火燄亦應生黑闇又應一切生一切諸非能生他性同若謂他有自性之因能生有自性之果者如是則從能破闇之火燄亦應生所破之黑闇又應從一切是因非因生一切是果非果何以故以凡一切非能生彼果之法與汝許為因果者同是有自性之他故此是依他許之因出二種太過之失解釋此二過謂如能生之稻種異於自果稻芽是有自性之他諸非能生稻芽之火炭麥種等亦是異於稻芽有自性之他既許二種他義相同則從他性之稻種能生稻芽亦應從火炭等能生稻芽又如他性之稻芽從稻種生則瓶衣等法亦應從稻種生如中論云因果是異者是事亦不然若因果是異因則同非因申二决擇彼過分二酉一明他生犯太過之理酉二許太過反義亦無違今初此計他生犯太過之理藏人有云因果定須前後是他必須同時極不應理如是則破他之過自亦同犯故若強抵謂自無所許者則推求彼理徒勞無義又藏人多云如因明師成立有煙决定有火及成立所作性决定無常是為成立一切時處皆决定無誤然成立時要先於灶及瓶等少分法上成立决定次以彼時處與餘時處二種决定相同為因乃於一切時處之上成立為决定無誤如是今者亦以同是他故之因出太過之失此即同類推比之因也此乃未解論義復不善因明之亂說若於有煙及所作性不加時處簡別能總成立有火及無常决定無誤者則於非有火及非無常以為可有煙及所作性之疑惑皆能斷除然此二法雖非因果而是他者寔無量無邊故彼二事不能相同二事謂因明中决定與此處之破他生此所說之推比實乃不善正理之能破也餘處已廣說若爾云何如顯句論云許世俗中唯眾緣生非許四邊生以諸法應有自性故然彼非理若許唯眾緣因果亦是互相觀待而有非自性有故非說諸法有自性此說自宗所許生與不許生之差別理由謂若許四邊生即須許有自性故亦顯說許他生則須許自性生許唯緣起生則不須許自性生故知所言他生之他非泛說他乃有自性之他是對許彼義者出太過之失非說凡許他者即犯太過之失也下破許前後剎那互異而是一相續云所有自相各異法是一相續不應理亦說若異是由自相而成則計前後是一相續不應道理與此處難道理相同此復若是有自相之他則能破其觀待關係若成無關係之他則此一果既從此因生亦應從一切非因生又此一因既能生此果亦應生一切非果之法太為過失其未善了解如斯正理者是因未善分別齊何為所破之量齊何是所許之緣起建立致有彼失故當憶前說所破之量齊也酉二許太過反義亦無違若許前說二太過之反義者則顯句論說太過反義亦唯屬他非是我等自無宗故又云說無性者為說有性者出太過時何能成為太過反義又云成立太過唯以破他宗為果故非有太過之反義復如何通答無過彼等唯約破自生說破自生之二過應爾非中觀師所出一切能破皆如是也彼能破之法後陳非說生便無用無窮是說復生無用無窮其反義為復生有用有窮唯是數論所許因為自無彼宗故無違犯許彼宗之過失此是初段論義佛護亦云又生無用加一又字顯句論亦說又字本論則云若計生已復生者故有與復生雖犯相違然有與生則不相違如是有與復生有窮雖成相違然有與生有窮則不相違第二段論義謂說無自性之中觀師對說有自性之數論出前所說二太過時自並未許彼反面義自不許彼非不能自由故自不許彼二太過之反義第三段論義謂雖不能以彼二能破法之反義復生有用有窮為因成立無自生然彼能破非全無果以彼成立數論所不樂之復生無用與無窮便能破數論所許之自生即以此為果故今此二太過之反義則自宗亦許故當知能破之反義有自許不許之二類也未二破釋妨難分二申一釋難申二破救今初他釋論云因果二法雖是有自性之他然非一切能生一切現見因果各別决定故頌曰由他所作定謂果雖他能生亦是因從一相續能生生稻芽非從麥種等若法由他法所作定說此法為彼法之果故果决定若彼因法能生此果則彼雖是有自性之他亦是此法之因故因决定以是當知唯特殊之他乃可立為因果非凡是他者皆可立為因果復次稻芽要從與自是一相續所攝之稻種乃生非從相續不一之麥種等生縱一相續攝如後剎那不能生前剎那猶非能生要前剎那生後剎那乃是能生是故稻芽不從麥種等生非從一切能生一切也申二破救當問計因果有自性者稻種稻芽由何因緣各別决定耶若謂見彼决定故當更詰問何故見其决定耶若僅說云由見彼决定故說見彼决定不能說明决定之理由則不能救前說之過由未說明有自相之他與見彼决定不相違之理由故終不能釋前難也復次既是有自相之他則世所共知遍通一切是否因果都無差別即此亦能違害敵宗頌曰如甄叔迦麥蓮等不生稻芽不具力非一相續非同類稻種亦非是他故如麥種蓮子甄叔迦花等由是他故非稻芽之能生不具生稻芽之能力非一相續所攝非同類前剎那如是稻種亦非具觀待稻芽之四種差別以是有自性之他故此理是說既同是無關係之他則不能安立具不具四種差別之不同也午二別破他生分二未一依前因後果破他生未二依同時因果破他生初又分二申一正破申二釋難今初如是依敵者所許有自性之他已破訖今當宣說因果二法决無自性之他頌曰芽種既非同時有無他云何種是他芽從種生終不成故當棄捨他生宗如現有彌勒與鄔波笈多互相觀待乃見此異於彼而是別法然芽與種非同時有種未變壞定無芽故以種子中無異於芽之自性他他尚非有云何可說種子是異於芽之他耶既無自性之他則計有自性芽從種子生决定不成故當棄捨諸法從他生之宗此說若種與芽異而有自性有自性者終不可改於種子位亦應與芽異若果爾者則彼二法理應同時然此非有故彼二法無自性他非於名言亦破彼二法有異也當知此與所破有關申二釋難上說芽種既非同時有不應道理如秤之兩頭一頭昂起即一頭低落現見同時非不同時如是所生之芽與能生之種如其次第生滅二事亦是同時故種芽二法亦同時有以有他故無上過失頌曰猶如現見秤兩頭低昂之時非不等所生能生事亦爾雖作是計然非正理頌曰設是同時此非有若以秤喻便計種芽之生滅二法為同時者此不應理設秤兩頭同時有故昂低二事可是同時然種與芽非同時有故不應理如何非有頌曰正生趣生故非有正滅謂有趣於滅此二如何與秤同此生無作亦非理正生謂現在趣向於生則芽之自體尚在未來故現在非有正滅謂現有趣向於滅故現在仍有芽趣向於生時種子是現在芽是未來爾時此種芽二法如何能與秤之低昂相等耶定不相等以秤之兩頭俱是現在故低昂二事可同時有然種芽二法同時非有故他以生滅二事同時故說種芽二法亦是同時以秤低昂為喻此是顯彼法喻不合非說若二作用同時則彼二法亦必同時也若作是念種芽二法雖不同時然彼二之作用生滅是同時有此亦非理以彼敵者離法外不許有彼作用故此是破二作用有自性復有過失觀待生起作用名能作者之芽於趣向生時猶是未來故於爾時尚屬非有爾時既無所依作者之芽則能依作用之生亦非有體由生與滅非同時有故計二作用同時不應道理若謂稻稈經云如秤低昂之理於何剎那種子謝滅即彼剎那有芽生起豈非以秤為喻耶故破種芽如秤低昂不應正理釋論曰雖舉是喻然非說他生亦非說自相生由是當知論言此生者唯破有自相之生非破芽從種生也若經非說種芽同時如秤低昂之理者則彼譬喻意說何等同時耶釋論云是為顯示同時緣起無諸分別如幻事故此所說同時緣起者當是二種作用同時而有以經中如秤低昂之喻必顯同時有法然不可說種芽二法同時有故以是當知前破二種作用同時者是破有自相之作用非總破二種作用同時故凡許有生則應許因趣於滅與果趣於生二事同時也許此與許有生及名言生雖無過失然許勝義生及自相生則成相違以前者說因果之生滅雖是同時然因果二法不必同時後家則說若作用同時則因果亦必同時也又生果之作用必曰此生依芽等作者而立故成為能依所依但能依所依若勝義有則不應成為他性一切時中皆須有所依故芽等趣向生時亦應有生起作用所依之芽則因果二法犯同時有等過失不應道理其名言生能依所依雖同時轉非一切時皆必如是故不相同又與種子同時之生芽作用是芽趣向於生之作用雖此與芽亦是能依所依但於彼時芽尚未有而有作用亦不相違如遣所依處亦遣能依法是通常規但種子是所依處芽是能依法於生芽時種子雖遣芽固存在亦不相違同體係者無所依則無能依因果係者因滅果猶存也若善了知以如是理破除他宗而自宗無犯能正安立無過之中觀宗者乃是中觀師若破他時專說似能破至他反難時則以抵賴為能事即顯句論所說吾等不與瘋狂辯也未二依同時因果破他生有作是說若種與芽非同時有以無自性之他故他生寔不應理若因果同時有以有他故則有他生如眼識與俱有受等眼色俱有受等唯同時者乃生眼識如是眼等與心亦唯同時者乃是受等之緣破彼頌曰眼識若離同時因眼等想等而是他已有重生有何用若謂無彼過已說若汝妄計與眼識同時之眼及俱有想等為能生因者觀待想等縱使有他然因位已有重生復有何用既無少用故他生非有若欲避免無生之過謂因位無彼果者則前後法中無自性之他過失如前已說此理是說所計因果縱使有他然無自性之生故他生非有前理是說所計因果即使有生然無自性之他故他生非有汝所言他生但有其名空無實義也午三觀果四句破他生生他所生能生因為生有無二俱非有何用生無何益二俱俱非均無用若謂此能生生他所生即是因者當觀彼因為生已有之自性果為生無果為生亦有亦無之二俱果為生非有非無之俱非果耶若謂已有自性果者則復何用彼能生之緣若生已有自性者則成生已復生此不應理前已說故若無果者則彼生緣亦有何益如兔角非有故亦有亦無者緣有何用有無二俱定非有故非有非無者緣亦何用俱非有無定非有故
