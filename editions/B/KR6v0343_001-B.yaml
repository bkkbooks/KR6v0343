body:
  text: 宗喀巴大師造翻經沙門釋法尊謹譯敬禮皈依恩師妙音與聖者父子足釋第一勝義菩提心之一一切深廣善說藏普為世間不請友啟示三地善道眼牟尼法王常照護遍於無央佛會中演唱最勝甚深處作獅子吼無能等妙音恩師恆加持三世諸佛心中心緣起中道離二邊佛記龍猛如理釋至心敬禮哀攝受由前教授登高位以自所見示眾生演說善道得自在敬禮吉祥聖天足奉行至尊妙音教開顯龍猛究竟意證得悉地持明位頭面敬禮佛護足微細難測大仙道龍猛不共諸關要圓滿開顯月稱師及靜天足我敬禮龍猛提婆所成宗三派大車廣解釋我以無垢淨慧眼不共要義皆善見此間欲宣彼宗者我為除其惡說垢因眾請故以淨語當即廣釋入中論今依月稱論師入中論釋解說無倒決擇深廣二義大入中論分四甲一一釋題義甲二釋禮敬甲三釋論義甲四釋末義今初摩陀耶摩迦阿波達囉拏摩此論於印度四種語中雅語為摩陀耶摩迦阿波達囉拏摩藏語名入中其所入之中是中觀論如云為入中論故又釋論於引根本慧時每曰中觀云云故知是根本慧論也雖般若燈論依摩陀耶摩迦字根謂中觀論與中觀宗皆名中觀然此言中觀當知唯是龍樹中觀論勿作餘中觀論及中觀義解由此論入根本慧者有謂彼論未廣說世俗勝義自性此論廣說故能入彼然決擇真寔義之正理異門根本慧中較入中論尤廣故彼說未善自宗謂由甚深廣大二門能入根本慧論初如自釋云智者當知此宗是不共法又云不通達真寔義故謗此深法今欲無倒顯示論真義故造此入論入中觀論此說為顯自宗所決擇之中觀義不共餘中觀師及顯中論不可順唯識釋故造入中論顯句論說依緣假立之理如入中論應知又根本慧論與顯句論皆未廣破唯識宗惟此中廣破故依此論二種所為乃能善解根本慧論之義是為此論入中觀之第一理門二由廣大門入中觀者聖者宗不以有無通達甚深真實義慧而判大小乘但根本慧論除甚深品外未別說有廣大大乘法此論說彼以無邊理門廣說法無我義故於大小兩乘中唯為大乘所化而造如自釋云又為光顯法無我故宣說大乘亦應正理欲廣說故聲聞乘中則唯略說此說最顯後當廣釋是故若於彼論所說道中別以聖者所說大乘廣大道而滿足之極為善哉為滿足彼故宣說異生地三法聖位有學十地及果地又於五地六地次第宣說依止靜慮自性修正奢摩他以觀察二無我真寔義之妙慧修毘鉢舍那故於思惟根本慧論義時若不憶及此論所說諸法而思惟甚深廣大和合之道次者則知彼人失於造入中論之二種所為故依此論由廣大門入根本慧論之道即是入中觀之第二理門甲二釋禮敬頂禮曼殊室利童子頂禮妙吉祥者是法先王之遺制以此論為勝義阿毘達磨宣說慧學為主故甲三釋論義分四乙一造論方便先伸禮供乙二正出所造論體乙三如何造論之法乙四迴向造論善根初又分二丙一總讚大悲丙二別禮大悲今初為令悟入中觀論故月稱論師造入中論非但不得以餘論所禮聲聞獨覺為禮供之境即較之諸佛菩薩亦應先讚諸佛最初勝因救護生死牢獄所繫一切無依有情為相因立果名號稱佛母之大悲心為顯此故頌曰聲聞中佛能王生諸佛復從菩薩生大悲心與無二慧菩提心是佛子因悲性於佛廣大果初猶種子長如水常是受用若成熟故我先讚大悲心此中有二丁一明大悲心是菩薩之正因丁二明彼亦是菩薩餘二因根之本初又分三戊一明二乘從佛生戊二明諸佛從菩薩生戊三明菩薩之三種正因今初從他聞正教授修行證得聲聞菩提果能以此義令他聞故名聲聞令他聞者如經說所作已辦不受後有無色界聲聞雖無此義然不為過以有彼名者不必定有彼義如陸生蓮華亦得有水生之名也又聲聞之梵語薩囉波迦亦訓聞說從諸佛德聞成佛妙果之道為大乘種姓求彼道者說故名曰聲聞如法華經云我等今者成聲聞聞佛演說勝菩提復為他說菩提聲是故我等同聲聞此二義雖菩薩與聲聞相同然聞說之義正屬聲聞有說第三句中無勝字故前句是大乘菩提後是聲聞菩提但疏意不然前是大乘菩提次是往菩提之道若謂何者菩薩雖亦從佛聽聞佛道為所化宣說然經說聲聞意取但說彼道而自身全不修者中佛之佛釋說佛之真實於三類補特伽羅處轉有謂此說達朵佛陀之聲於三類補特伽羅處轉此說甚善如云達朵為真實佛陀為覺悟以取覺悟真實為佛陀時則三類補特伽羅皆有其義覺悟真寔之聲亦詮辟支佛但今誤譯為佛佛陀之聲雖可通譯為佛但於此處則失當以佛陀聲亦詮華開及夢覺非必須譯為佛也中者謂諸獨覺輩由百劫中修集福智勝進故勝出聲聞然無福智二資糧一切時徧一切有情之大悲及一切相智等劣於正覺故名曰中有謂此智慧勝聲聞之義如云離所取分別彼說非理此宗說聲聞獨覺亦能通達一切諸法無自性故即彼說者亦許彼義故故知釋論說智勝進為勝出言勝進者謂所修道漸進漸妙此復於百劫中勤修福智非若聲聞不耐久修雖諸福智皆可名為資糧然資糧之正義乃無倒修行無上菩提之方便能攝受自果者如顯義論說大悲心等正行以能攝取大菩提故乃名資糧故具此義之福智乃資糧正義不具此義者乃通常資糧且就資糧之梵語三跋羅之義訓而譯由福智之行勝出聲聞故於欲界最後生時不依他教能自發阿羅漢智後以唯為自利而得覺悟成阿羅漢故名獨覺亦曰自覺能王者二乘阿羅漢雖亦可名能然非能王唯諸佛乃稱能王以得勝出聲聞獨覺菩薩之無上法王彼三人亦依佛語而得法故聲聞獨覺從佛生者謂由佛力之所植生以諸佛出世必無倒宣說甚深緣起二乘種姓於此聽聞思惟精勤修行即能隨其信樂滿足聲聞獨覺所希願果故說彼二由佛植生若作是念聲聞種姓雖有眾多從佛聞法即於現生而證菩提然獨覺種姓必不於現生趣證說彼等於佛所說義聞思修行乃圓滿自果似不應理無失設有一類獨覺種姓聞佛所說甚深緣起已善通達真實義諦雖不即於現生證獨覺涅槃然彼獨覺行者由修佛所說緣起力故於他生中定得涅槃如造定業雖不於造業生中即受其報然於他世則定受也前說亦爾由於佛所說法聞思修行能滿所願亦非依現生說也此如四百論云設已知真實現未得涅槃他生決定得猶如已造業中論亦云若佛不出世聲聞已滅盡諸辟支佛智無依而自生釋論設有一類等義有謂此答若說緣起而非即得聲聞等果應說緣起不能滿足聲聞等希願之難有謂此答修緣起無生義應無間能生彼果然無此事故後亦應不生彼果之疑彼二家俱未了達文義以於諸佛植生獨覺最疑難處理應別為斷疑者皆未能斷故戊二明諸佛從菩薩生若聲聞獨覺從諸佛生諸佛復從誰生曰諸佛世尊從菩薩生若作是念豈非菩薩從佛教而生名佛子乎是佛子而又說諸佛從菩薩生云何應理如說彼子之父從彼子生答雖諸菩薩是佛子然有二緣菩薩亦得為諸佛之因初依分位差別說如釋說以如來是菩薩之果故此謂一切證佛位者皆先由學地菩薩位來約佛果之同類因故說菩薩是諸佛因次依勸令發心者說如契經說文殊室利菩薩勸吾等大師及餘諸佛最初發心此約菩薩與餘菩薩所成之佛作俱有因成立諸佛從菩薩生有難敵者與諸菩薩是佛子故應說菩薩從諸佛生不應作相違說諸菩薩是佛子自既許之則應解說彼與諸佛從菩薩生互不相違之理今置彼不說而別成立諸佛從菩薩生云何應理以縱能成此事而前疑猶在不能斷故此無失釋論於解說佛從菩薩生之第一緣時謂學位菩薩由修道而得佛果是則彼菩薩非即彼菩薩所得佛果之子蓋亦可知豈說是彼佛子又如從吾等大師所生之菩薩是此佛之子非謂此佛亦從彼菩薩生敵者未能辨此理而起疑釋論已為解答則有智者於此疑難已渙然冰釋矣然猶有多人妄於此義而作無關之攻難何哉由菩薩是成佛之要因故諸佛讚嘆菩薩讚義有四一菩薩為諸佛之圓滿主因故極應尊重二說因位菩薩是應供養則果位諸佛之應供養自可知故三如藥樹能與無量樂果則於彼樹初生之嫩芽應尤為愛護如是可知諸佛樹王能滿一切眾生所願則於如佛嫩芽之初業菩薩亦應勵力而愛護之四契經稱讚菩薩為令會中三乘有情決定趣入大乘道如寶積經云迦葉如初月為人禮敬過於滿月如是若有信我語者應禮敬菩薩過於如來何以故從諸菩薩生如來故此是以教成立諸佛從菩薩生前二因緣是以理成由是當知餘論所禮之聲聞獨覺諸佛菩薩今此論中未禮供者為欲禮供彼等之根本因聲聞等二句顯示彼四為次第因果者為抉出彼等之究竟根本因也菩薩雖亦從佛教而生然不於說能王生時如二乘釋者以說彼二從能王生為顯彼二究竟根本亦是大悲菩薩根本是大悲心論後當別說故戊三明菩薩之三種正因若聲聞獨覺從諸佛生諸佛復從菩薩生者是諸菩薩之因復云何謂大悲心與通達遠離有事無事等二邊之慧及菩提心此三即是諸菩薩佛子之正因菩提心者釋論引經云如自所違法性願諸有情皆能了達此所發心名菩提心此僅緣菩提心所為之一分釋論又云應發如此心願我拔濟一功世間皆令出苦決定成佛此未緣所得菩提亦僅是相之一分當如釋論於說依大悲心生菩提心處所說正法甘露妙味之因永離一切顛倒分別為相一切眾生親友體性正欲求得如是佛果此文顯說緣所得之菩提故應許為利一切有情欲得無上正等菩提乃為圓滿發心之相本論疏亦作此說現觀莊嚴論所說亦同安立此三為菩薩正因是寶鬘論意彼云若自與世間欲得大菩提本謂菩提心堅固如山王大悲徧十方不依二邊智此但說為菩提之根本未直說為菩薩之根本然根本即最初義以彼以三種正因為最初故知即是菩薩之正因又說三法為菩薩因者在觀察聲聞獨覺既從佛生諸佛從菩薩生則菩薩復從何生故知非是能建立因乃明菩薩之能生也如是立此三法為菩薩因其最初得名菩薩者是否指最初入道者而言是則不應安立大乘發心為彼之因以初發彼心者即立彼為菩薩數故亦不應安立不依二邊智為彼之因以諸菩薩要先發世俗菩提心而後乃學菩薩六度行要學般若波羅蜜時乃學不依二邊之智故若謂否則與所說如初月及如藥樹嫩芽之菩薩皆成相違答不許後說雖許初說然無前二過以菩薩前導之發菩提心意在修學發心非謂修成之真寔發心此如嘗蔗皮及皮內之汁味若但發宏誓為利一切有情故願當成佛此乃隨言作解如嘗蔗皮之味雖此亦名為發心然非真發心若依修菩提心之教授而修發生超越常情之勝證如嘗蔗漿之真味即真發心勸發增上意樂會即依此義密意說云愛樂言說如蔗皮思惟寔義若真味利根菩薩種姓先求真寔正見次乃發心故亦無後過所言無二慧非無能取所取二乃釋論所說之離二邊慧此亦不妨於菩薩之前有之有謂此是勝義菩提心極為不可以所言無二慧是初入道菩薩之因慧也丁三明彼亦是菩薩餘二因之根本三因中以大悲為主由大悲心亦是菩提心與無二智之根本為顯此故說悲性等一頌大悲心於豐盛廣大之佛果為初生要因如種子中間令增長如水潤後為眾生常時受用之處如果成熟故我月稱於聲聞獨覺諸佛菩薩及餘二因之先或造論之首先讚大悲心此非入後文方讚即此所說於生佛果初中後等即是讚嘆也性者顯佛果三位中之心要唯一大悲不如外穀初中後三位之要因別有三事為最初宗要如種子者謂具大悲心者見有情受諸苦惱為欲救一切苦有情故便緣所為事而發心曰我當度此一切有情出生死苦令成佛道又見要自成佛道乃能滿彼願故復緣菩提而發心言我為利益諸有情故願當證得無上菩提又見不修無二慧所攝施等諸行則彼誓願終不能成辦乃進修智慧等行是故大悲心為一切佛法種子寶鬘論依此義云若大乘經說大悲為前導諸行無垢智有智誰謗彼此說大悲為前導菩提心所引諸行與離二邊無垢淨智此三行攝一切大乘義盡為中間要因如水潤者謂大悲種子發生菩提心芽已若不時以大悲水灌溉之則不能修習二種廣大成佛資糧定當現證聲聞獨覺涅槃若以悲水時加灌溉則必不爾為末後重要如成熟者謂成佛已設離大悲心則必不能盡未來際為諸有情作受用因亦不能令聲聞獨覺菩薩聖眾展轉增上若於果位有大悲相續者則一切皆成如是解釋悲性等四句之義應知即是顯示樂大乘者應先令心隨大悲轉次依大悲至誠引發眾相圓滿大菩提心既發心已則學菩薩諸行尤應徹了甚深正見丙二別禮大悲分二丁一敬禮緣有情之大悲丁二敬禮緣法與無緣之大悲今初頌曰最初說我而執我次言我所則著法如水車轉無自在緣生興悲我敬禮由我執薩迦耶見故引生我所執薩迦耶見故有情類於生我所執薩迦耶見之前先起我執薩迦耶見於無自性之我妄謂有性乃於所說之我執為寔有次由我所執薩迦耶見離於我執所緣境緣餘眼色等法謂是我所有乃於我所着為實有由是流轉生死如水車之旋轉不已不得自在緣此眾生而興大悲者我今敬禮此即敬禮緣有情之大悲諸眾生類如水車者諸有情與水車輪是能同所同之總體其相同之理釋論別說若喻若法各有六義今且合說之一此有情世間為惑業繩索所繫二由識推動之如旋轉水車之人三於上自有頂下至無間深邃生死大井中無間旋轉四墮惡趣時不待功力任運而墜升善趣時要極大勤勇方得上升五雖有無明愛取煩惱雜染及行有業雜染餘七支生雜染然前後次第則無一定六恆為苦苦壞苦行苦之所逼惱故諸眾生迄未有出輪轉之時此六門法喻合說非僅令了知有情流轉之理而已前雖說樂大乘者應先發大悲然未說如何修習悲心乃發今說有情無有自在流轉生死即顯由此修習乃能引發大悲心此復應思由誰令其流轉謂最不寂靜未善調伏之心於何處流轉於上自有頂下至無間流轉不息何因如是流轉由惑業增上力故謂由非福業及煩惱力則墮惡趣由諸福業不動業及煩惱力則升善趣墮惡趣者不待功力而任運自墮升善趣者非極大勤勇修集彼因難得上升如阿笈摩說從善趣惡趣死墮惡趣者如大地土從二趣死而生善趣者如爪上塵又於某一緣起中三種煩惱隨一生時其他緣起之餘二雜染亦相續不斷又時時為三苦之所逼惱如水浪之滾滾而來此復應知初發業者若未思自我流轉生死而令心厭離則於思惟他有情時不忍其受苦之心必不能生故當如四百論釋所說先於自身思惟已次緣他有情而修修他有情於生死中受苦為即此能引生大悲心耶抑須餘法助成之曰現見見怨家受苦者非但無不忍心且心生欣幸見非親非怨者受苦則多捨而不問是於彼無悅意相之所致也若見親屬受苦則心多不忍其悅意愈重不忍受苦之心亦轉增故欲引生大悲心者於餘有情務須心生最可愛樂悅意之相此悅意相由何方便得引生諸大論師略有二規一如月稱四百論釋說思惟一切有情從無始來皆是父母等眷屬為度彼等故能入生死大德月及蓮華戒論師亦如是說二靜天論師之規如餘廣說應知若能於有情思惟最可悅意及於生死受苦之理而修大悲心則月稱論師作此不共禮敬方為有義若不能者雖自矜聰智直與鸚鵡誦經等耳此為緣有情大悲心之理至下當釋丁二敬禮緣法與無緣之大悲緣法與無緣之大悲亦由所緣而顯頌曰眾生猶如動水月見其搖動與性空由見眾生如水中月影為風所動剎那動滅緣彼而起大悲心者我今敬禮此即敬禮緣法之大悲由見眾生如水中月影似有自性而性寔空緣彼而起大悲心者我今敬禮此即敬禮無緣大悲釋論略緣生而僅引上句興悲我敬禮者意謂後二所緣中已說有眾生矣此謂如澄淨水微風所吹故波浪遍於水面水中月影與彼所依之水同時起滅如有彼月自體顯現可得然諸智者則見彼月剎那無常及所現月自性本空如是菩薩隨大悲心者見諸有情墮薩迦耶見大海無明大水流注其中令極增廣非理作意邪分別風鼓動不息往世所造黑白眾業如空中月今世有情如彼月影剎那生滅為諸行苦之所逼迫而自性本空緣此便有大悲心生此亦由思有情悅意及流轉生死而後能生已如前說此中薩迦耶見即是無明而復別說無明者意取能引薩迦耶見之法我執無明釋論不以行相而以所緣境分別三種大悲則知彼三皆以欲令有情離苦為行相雖亦同緣有情為境而所緣不同初大悲時說緣生興悲後二悲時亦說眾生猶如此即顯示同緣有情若爾何別應知緣法大悲非但緣總有情乃緣剎那起滅之有情即緣剎那無常所差別之有情也若能解有情剎那起滅則必已遣除常一自在有情之想故亦能解定無離蘊異體之有情爾時便知有情唯是五蘊和合假立即緣蘊等法上假立之有情故名緣法此說無常有情僅是一例即緣無寔主宰之有情亦是緣法所攝實緣法上假立之有情而但云緣法者是省略之稱也無緣大悲亦非但緣總有情乃緣自性本空之有情所謂無緣者謂無執實相心所著之境也實是緣非實有所差別之有情而但云無緣大悲者亦是簡略之稱藏人註疏多謂第二大悲緣剎那生滅第三大悲緣無自性蓋是未解悲心所緣行相之談此二大悲亦以欲令有情離苦為行相若以剎那生滅與無自性為行相則於一大悲中應有不同之二行相矣以是安立彼二義所差別之有情為大悲之所緣成就此二大悲心者由先知有情是剎那生滅及無自性便能現起二差別相剎那相與無自性相非大悲心直緣彼二也本論釋論皆說後二大悲緣上述差別相所別之有情第一大悲則非緣彼所差別者但緣總相有情依此說名緣有情大悲以是應知或說第一大悲要緣常一自在之有情者所說非理以未得無我見者之大悲多有僅緣有情總相者即得共同人無我及真理見者之大悲亦多有未緣差別相所別之有情喻如能遣瓶上常執已達無常者非凡緣瓶心皆緣無常所別之瓶即未達瓶無常者亦非皆緣常相所差別之瓶也此三大悲隨緣某一所緣皆以救拔一切有情出苦為相故與二乘之悲心有大差別若已發起諸大悲心便能引大菩提心我為利益一切有情願當成佛禮供文中所讚之大悲雖以最初大悲為主但菩薩身中餘大悲心亦是所讚故此處釋論中說發大悲心之菩薩亦不相違若爾最初入道菩薩正因之大悲中為有三種大悲否曰不定大乘種姓隨法行者則有彼先決擇勝義之正見次乃緣有情發大悲心依大悲故發菩提心學菩薩行能仁禁戒若大乘種姓隨信行者則無彼不能先達真理待發心已方能求真理正見及學菩薩行如中觀莊嚴論云先求真理智勝解勝義已緣惡見世間遍發大悲心精勤利眾生增長菩提心受能仁禁戒悲慧所莊嚴諸隨信行者發大菩提心受能仁禁戒次勤求真智本論伸禮供已雖未立誓願然亦無失如中觀論與六十正理論亦有但立誓願無禮供者如觀友書此入中論為造論而伸禮供應亦兼含立誓之義使他趣入之因謂所為繫屬等本論所詮即甚深廣大二義其不共所為如前已說所為之心要暫時者謂由了解論義如法修行進趣四道究竟者謂證果地所為心要依於所為所為依於論即是繫屬也乙二正出所造論體分二丙一因地丙二果地初又分三丁一總說此宗修道之理丁二別釋異生地丁三廣明菩薩聖地今初若謂此論隨順龍猛決擇菩薩甚深廣大之道未知龍猛宗於趣入佛地之道次第如何曰應先以聞思力決擇龍猛菩薩等宗義於修行之真實道獲大信解不為諸餘似道所引若於諸大論師之論典專精研習而於修道之理心無定解則彼聞思未見扼要雖於大乘多施劬勞終難得真寔之果故於修道之次第當勤求了知龍猛菩薩說道之一分者多說道之全體謂依深廣二分者現有三論一寶鬘論本謂菩提心及大悲為前導等前已引訖論中又云菩薩諸功德今當略宣說謂施戒忍進靜慮慧悲等施謂捨自利尸羅則利他忍辱離瞋恚精進長白法靜慮專無染慧決擇實義悲於諸眾生一味大悲慧施富戒安樂忍悅進有威禪靜慧解脫悲修一切利此七能盡攝一切波羅密得不思議智世間依怙尊此即說六度與勝利及大悲之助伴皆應修學論中又說諸行以菩提心為前導及由諸行進趣菩薩十地等二法界讚說皈依次發菩提心修習十度增長界性及十地等此即道體之攝頌三集經論廣釋彼道體之攝頌時復說暇滿難得聖教難信發菩提心尤為難能又謂普於一切有情發大悲心甚不易其能斷除毀傷菩薩輕懱菩薩諸魔事業謗正法等障則為尤難此論所說雖較前二論為明顯然修道之次第猶難了知受持此宗之靜天論師造集學入行二論尤以集學論所說顯而且廣彼謂先思暇滿難得於現生中取堅攝義次修淨信尤應思惟大乘功德生堅固信發願菩提心次受行菩提心之律儀次緣自身資財善根總修惠施守護清淨增長等又四百論亦說甚深廣大之道體中觀心論中觀莊嚴論中觀修次第三論等略說道體亦復相同故住持龍猛宗之諸大論師所說之道體皆相同也初修業者於此等法易生定解之方便然燈智於菩提道次第論中已顯了宣說如彼應知丁二別釋異生地若此論中決擇菩薩甚深廣大二道及彼果者則於菩薩道極關重要之異生地諸道次第應於禮敬後宣說今未說彼而即說聖地何耶答已於禮敬時說前明修三種因乃成菩薩即是顯示欲入大乘者須先修彼三法故此處不復宣說又彼三法非僅道前須修即成菩薩亦應修習其不依二邊之智尤為諸行之上首以彼為例則施等餘行亦皆須學如集經論云菩薩若無善巧方便不應修學甚深法性以方便智慧雙運乃是菩薩之正行此說當學二種資糧雙運之道僅有智慧或方便一分不應知足若全無殊勝方便智慧僅修心一境性尤不可恃未知觀察真義正理所破之界限而妄破一切者現世大有其人誤以一切分別皆是寔執謂一切名言安立皆唯就他而立佛果唯有智慧觀空之真如法身佛色身是所化相續中攝若爾則以教理成立聲聞獨覺從諸佛生諸佛從菩薩生等一切皆非入中論之自宗彼謂修三法乃成菩薩亦非中觀師自宗唯就他而立總之凡自宗所應修之道悉皆毀謗與論說自性本空之有情有六法如水車流轉生死等悉成矛盾應知彼等始從禮供乃至論終皆是倒說也聖地所說修學施等多有為異生地所應學者故於現在即應精勤修學丁三廣明菩薩聖地分三戊一十地總相建立戊二諸地各別建立戊三明十地功德今初此中說極喜等十一地者如寶鬘論云如聲聞乘中說聲聞八地如是大乘中說菩薩十地今依彼論所說十地及佛地略說為根本并依十地經彼說極喜等十地為十種發心者意取勝義發心建立為勝義發心之十地釋論以地之體性何法攝持得名及其名義四義而釋如云菩薩無漏為悲等所攝持各別分位名之為地是功德所依故其體性之無漏智有說如俱舍漏不隨增者名為無漏是未解此宗安立無漏之義自宗謂實執無明與彼習氣隨一所染即為有漏離染之智乃是無漏如顯句論云離無明翳障諸智非觀待無漏境性此復應知未得佛地以來其未為無明習氣所染之智唯聖根本無分別智彼亦是暫時從根本定起仍生習氣為彼所染乃至七地以來有無明染八地以後與阿羅漢斷盡能染之無明則無彼染然仍為無明習氣所染又釋論說初地始名無二智者是約無心境別異之二相而說非謂遠離二邊之智又此論師多說離無明翳之智慧故有說無明及彼習氣盡時智慧亦滅以為論師宗者如觀行派外道妄計垢盡心亦盡是大斷見有說聖根本定中無智者亦與彼同寶鬘論云見彼則解脫為由何法見名言說為心此問由何法能現見真理答以於名言中由心現見法界讚亦云猶如火浣衣為眾垢所污投於猛火中垢焚非衣損如是光明心為貪等垢染智火燒其垢非彼光明性此說如石綿衣若有垢染投入火中火能燒垢而不損衣如是心垢用智火燒僅燒其垢非光明心亦隨之而盡菩薩聖根本智雖與二乘聖根本智俱無明習氣所染現證法性然安立為菩薩聖地者在是否隨大悲轉有無十二類百種功德等增上又如上說於資糧加行道中是否以無量理門觀察二無我之真義即從彼智現證真理亦與二乘有大差別各別分位者謂即一無漏智就義別立前後諸分位即各別諸地名為地者以是功德依處猶如大地故立是名此等是說勝義十地皆依無分別智安立雖是一智略以四門差別各別立為極喜地等一由功德數量展轉增長之差別謂初地中有十二類百功德第二地中有十二類千功德等二由殊勝神力展轉增長之差別有說此謂能動百佛土千佛土等然彼已攝入功德數量增長之內此中似說各地淨垢之力與進道之力展轉增長三波羅蜜多各別增上之差別謂初地布施波羅蜜多增上二地持戒波羅蜜多增上等四受異熟生展轉增長之差別謂初地作瞻部洲王二地作四大洲王等以是當知各地無分別智成就功德數量之功能勝劣有大差別故各別安立為地各地後得位之功德亦各地所攝故非唯說根本智德諸地差別雖如上說然勝義地之所緣行相則無不同如十地經云如空中鳥跡智者難思議菩薩地亦爾難說能聞況此說如鳥雖於空中飛翔然彼鳥跡世間智者語所不能議心所不能思如是如飛鳥之勝義地雖於如虛空之法性中行然彼行相即彼聖者亦不能如自所證而說聞者亦不能如彼所現見而聞
