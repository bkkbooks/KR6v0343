body:
  text: 宗喀巴大師造戌三明十地功德分二己一明初地功德己二明二地至七地功德己三明三淨地功德今初菩薩時能見百佛得佛加持亦能知此時住壽經百劫亦能正入前後際智能入起百三昧能動能照百世界神通教化百有情復能往遊百佛土能正思擇百法門佛子自身現百身一一身有百菩薩莊嚴圍繞為眷屬菩薩發勝義菩提心得初地時一剎那頃能見百佛得彼百佛加持皆能了知又住初地時能住壽百劫亦能正入前際後際各至百劫此義謂智見能入前際後際百劫之事又此大智菩薩能入起百三摩地又能動百世界及能照百世界又此菩薩能以神通教化成熟百有情復能往遊百佛世界又能正思擇百種法門又此佛子自身復能示現百身於一一身有百菩薩莊嚴圍繞而為眷屬己二明二地至七地功德如極喜地諸功德如是住於無垢地當得功德各千種餘五菩薩得百千得百俱胝千俱胝次得百千俱胝量後得俱胝那由他百轉千轉諸功德如極喜地菩薩所得十二類功德各有一百轉入第二無垢地時彼十二類功德當得一千其餘三地四地五地六地七地菩薩如其次第則得百千百俱胝千俱胝百千俱胝俱胝那由他百轉千轉即百千俱胝那由他十二類功德也己三明三淨地功德八地以上所得功德計算俱窮當以微塵而數頌曰住不動地無分別證得量等百千轉三千大千佛世界極微塵數諸功德住第八不動地菩薩於人及法都無實執分別證得百千三千大千世界極微塵數十二類功德頌曰菩薩住於善慧地證得前説諸功德量等百萬阿僧祗大千世界微塵數菩薩住於第九善慧地證得如前所説十二類功德量等百萬阿僧祗三千大千世界極微塵數頌曰且説於此第十地所得一切諸功德量等超過言説境非言説境微塵數於此第十地中所得如前所説之十二類功德量等超過言説境非言説境即不可説不可説轉佛剎極微塵數也言且説者謂十地菩薩之功德猶不止如此所説者故下文更述諸餘功德頌曰一一毛孔皆能現無量諸佛與菩薩如是剎那剎那頃亦現天人阿修羅又此菩薩能無分別示現化身於自身一一毛孔剎那剎那能各別示現無量諸佛菩薩各有無量菩薩而為眷屬如是一一剎那頃亦能於一一毛孔示現其餘天人阿修羅等不相雜亂亦字攝未説者謂應以帝釋梵王護世人王聲聞獨覺如來等身教化之有情即能任運示現帝釋等身而為説法廣如十地經説應當了知丙二果地分五丁一初成正覺之相丁二建立身與功德丁三明變化身丁四成立一乘丁五成佛與住世初又分二戊一正義戊二釋難今初如淨虛空月光照生十力地復勤行於色界頂證靜位衆德究竟無與等譬如月光於淨虛空中能照耀一切衆生如是已得第十菩提心之菩薩淨治能障佛法之冥暗了知自身能得佛法於能生十力佛地之前第十地時為得佛地故復更精勤修行爾時世尊唯於色界頂摩醯首羅天宮證得最極寂靜無上智位此位一切功德皆到究竟以念住等一切功德至此為極最勝妙故此智復無與等以無同此者故更無過上者故言唯於色界頂者顯先未成佛最初成佛者必是色究竟天身若先已成佛後示現成佛者則欲界身亦可此是波羅蜜多大乘規諸佛世尊於色界頂初成佛時唯於一剎那頃得一切種智頌曰如器有異空無別諸法雖別性無差是故正知同一味妙智剎那達所知如瓶盤等器雖有無量差別然遍於一切器皿之虛空同是遣除障礙之所顯故無餘差別如是色受等法從因緣生雖有無量差別不同然彼等上自性不生之真實義則無少許差異是故當知此真實義唯是一味此一味真實義唯以一剎那智而正了知故妙智世尊一剎那頃證得通達一切所知之妙智也戌二釋難分二己一敘難己二解釋今初若靜是實慧不轉不轉而知亦非理不知寧知成相違無知者誰為他説汝既安立自性不生為色等之真實義又安立智慧能知於彼若時安立自性不生之寂靜是真實義者則於彼境應許智慧不轉若於自性不生之真實義智慧能轉則彼智慧為見彼境是何行相由全不見境之行相故於真實義智慧不轉若時智慧於境不轉則説智慧知所知境亦不應理何能遍知此真實義由不遍知云知真義不應道理故不遍知境者寧是能知成相違故若能知真實義之心都無有生則亦無有能知真實義之人誰復為他所化説我了知真實義行相如是耶己二解釋分二庚一釋不證真實義難庚二釋無能知者難今初不生是實慧離生此緣彼相證實義如心有相知彼境依名言諦説為知於此世間若識隨彼境相而緣即説此識了知彼境如心生時具青境相即説此心了知青境如是若能緣智生具真實義之行相依名言諦亦可説為了知真實義內識隨緣真實義行相之理謂如自性不生是境之真實義其能緣慧亦具離自性生之行相如水注水中由緣彼境之行相立為證真實義故無所難之過失釋論云故由假名立為通達真實義實無少法能知少法能知所知俱不生故假名之義如頌云依名言諦説為知謂非由自性説為了知是由假名立為了知非説了知真實義唯是假説也言實無少法等義謂若唯現離戲論相不立為知要現如青黃等相乃立為知則定非有如所緣境真實義是不生其能緣慧亦具自性不生之行相也如敵者説慧不能現真實義之行相若慧不現境相則不於境轉若不於境轉則不知彼境若不知境則説心能知彼成相違失其慧不現境相則不轉等自宗亦許不須解答故唯破其慧不能現勝義諦相説彼行相慧能現起由現彼相立為通達彼境並舉喻為證有説此宗無有通達勝義諦之無分別智者當知是謗最勝聖智此云剎那達所知説證得一剎那頃能達一切所得之智又説如所有智不現能知所知各別二相而知故於諸佛了達如所有性與盡所有性之理應善了解茲當略説未成正覺一剎那慧不能雙達各別有法與彼法性彼二必須各別了達若已斷盡實執習氣成正等覺恆常安住親證勝義諦之根本定中永不起定根本後得不復別起如二諦論釋云以一剎那智周遍所知輪離根本智更無異體知盡所有性之後得智是故當許唯以一智能知二諦一切所知若時觀待法性成如所有智則此智前一切二相皆悉寂滅是故此智如水注水一味而轉若時觀待有法成盡所有智則有心境二相顯現由已拔除錯亂二相之習氣故是於所見境不錯亂之二相非錯亂二相此不錯亂之理餘處已廣説又佛地中具有根本後得二智如寶性論云慧智及解脫光明照耀淨無異故如日光明照耀等疏云佛身出世無分別慧能破除所知勝真實義之黑暗故如同光明其後得見一切所知之智遍一切種所知事轉故如同照耀出世無分別慧即根本智彼是觀待真實義而立即破除等義言後得之後非從根本定起時間前後之後是由根本定力所得或所生之義言遍一切種所知等義謂彼後得智是由遍緣一切盡所有性而立也故觀待有法則非如所有智觀待法性則非盡所有智若能善解此義則於二諦論云由離遍計性所現唯緣生一切種妙智現見此一切又云若能知所知自體皆不見爾時相不生堅住故不起此説諸佛現見一切盡所有性又説能知所知以二相理皆無所見餘諸大論師亦多作是説不須強解謂能知所知都無所見是依佛本分而説現見一切所知是就衆生分上而説無有佛地所攝之智即佛一智觀待二境有二了達之相無少相違也若爾前云由於諸法見真妄等所明二諦之相與此建立應成相違曰無違前説二諦相是依總義而立此説佛智見境之相與十地以下皆悉不共是依別義而立也諸佛見境之相總略言之若是見真理智正量所得要待彼境方成理智正量者是勝義諦相世俗諦相由此可知若是如所有智所得要待彼境方成如所有智及是盡所有智所得要待彼境方成盡所有智如是觀待各別境界立為見勝義世俗之相亦當了知復當憶念前文觀察自證分應不應理之自宗也庚二釋無能知者難分二辛一正義辛二明理今初又汝説云若無知者誰復為他説真實義行相如是耶今當解釋佛地親證真實義智與境自性不生勝義雖是一味而轉然諸世間亦非不能了知真實此中難義是謂智與真實恆一味轉則無具説法分別之説者既無説者則不説法下文答云雖無分別説法亦應理故為答此難頌曰百福所感受用身化身虛空及餘物彼力發音説法性世間由彼亦了真諸佛住何色身親證法界法身佛此色身是由無量福德資糧之所感得具足不可思議種種妙色是諸菩薩受用法樂之因名受用身由此色身發出法音演説諸法真實義世間衆生是聞法之法器即能無倒了知真實也不但百福所感之報身能作是事即此報身加持之化身及由化身之力從虛空中及餘草木壁崖等無心之物亦能發出法音演説諸法真實令諸衆生了知真實義也辛二明理諸無分別心心所法於説法時現前既無發起作用云何能為説法作用之因當舉外喻以明此義頌曰如具強力諸陶師經久極力轉機輪現前雖無功用力旋轉仍為瓶等因如是佛住法性身現前雖然無功用由衆生善與願力事業恆轉不思議譬如世間具有強力之陶師由經久時極力旋轉其機輪次彼陶師雖現前不起轉動機輪之功力亦見彼輪旋轉不停成為瓶等之因如是諸佛住法性身成正覺時如摩尼珠及如意樹現前雖無分別功用然由衆生善根成熟應從佛所聽聞是法及由諸佛昔為菩薩時發廣大願牽引之力故佛事業恆轉不息極不可思議也發願之相謂如諸佛隨順機宜利益衆生安住法界剎那不動調伏衆生而不失時願我亦當能如是也拏錯譯本中於此處引有經證丁二建立身與功德分二戊一建立身戊二建立十力功德初又分三己一法身己二受用身己三等流身今初今當説法身頌曰盡焚所知如乾薪諸佛法身最寂滅爾時不生亦不滅由心滅故唯身證佛智本性身由智慧火盡焚一切如同乾薪之二相所知境即如所知自性不生行相而轉故智慧自性不生行相之寂滅真實義即是諸佛之法身能斷金剛經依此義云應觀佛法性即導師法身法性非所識故彼不能了此説諸佛於一切時安住法性即是導師之勝義法身又此法性亦非二相之理所能識也爾時此真實義法身不生不滅經依如是義云曼殊室利當知不生不滅即是如來增語如是佛地妙智所緣真實義中分別心心所畢竟息滅不轉無分別智與真實義如水注水無可分別故世俗安立唯由報身證彼佛果也拏錯譯本引不退轉輪經心滅之義顯句論云經云云何勝議諦謂尚非心所行況諸文字此謂無分別此説無心之行為無分別此處釋論解寂滅義謂離心心所已雖是寂滅然亦能作利衆生事舉如意樹及摩尼珠喻其後又云此身雖無分別如如意樹及摩尼珠亦明顯説是離分別心心所法故引此文證佛無智慧實乃未達論義妄興毀謗也己二受用身此寂滅身無分別如如意樹摩尼珠衆生未空常利世離戲論者始能見此親證法身之受用身由離分別心心所故是寂滅身此身雖無分別然亦能作利衆生事如如意樹及摩尼珠雖無分別亦為成辦衆生欲樂之因又此報身為利一切衆生故盡未來際常久住世是故當知世界未空虛空未盡諸佛唯為饒益有情安住世間又此報身唯諸久修二種資糧已得離諸戲論無垢慧鏡之地上菩薩始能現見餘有戲論諸異生類則不能見歸依七十頌云諸佛妙色身相好極熾然衆生隨自解執為種種身無量福資糧所生彼色身十地諸佛子始能快先覩此身受法樂則是諸佛行己三等流身分三庚一於一身及一毛孔示現自一切行庚二於彼示現他一切行庚三隨欲自在圓滿今初由佛法身或由上述色身之力離前受用身外起餘化身即是法報等流果身此身唯以調伏衆生因緣而起為顯此身威力差別亦不可思議頌曰能仁於一等流身同時現諸本生事自身雖已久遷滅明了無雜現一切能仁於一法報等流色身為欲示現無始生死以來一切本生事故自本生事雖久已遷滅然能同時明了無雜任運示現一切本事如明鏡中現衆色像頌曰何佛何剎能仁相諸佛身行威力等聲聞僧量如何行諸菩薩身若何等演説何法自若何如何聞法修何行作何布施供佛等於一身中能普現如是持戒修忍進禪定智慧昔諸生彼等無餘一切行於一毛孔亦能現又佛世尊昔行布施波羅蜜多時為於何佛所作何供事於何等佛剎如吠琉璃寶等為地縱橫相等其土有情如何莊嚴能仁於彼如何示現出胎等相諸佛身相勝行勢力復若何等諸佛眷屬聲聞僧伽若干數量彼於正法如何修行成為僧伽又彼佛土諸菩薩衆相好嚴身如何受用衣服飲食房舍等事演説何法為説三乘抑説一乘自於彼土為生婆羅門等何等種姓成就智慧在家出家復若何等聞正法已受何學處若滿非滿修習何種菩薩大行於諸佛所及諸菩薩聲聞等所衣服飲食珍寶等物作何布施經幾許時供何數量如是一切於一身中能普示現如現修行布施波羅蜜多本事如是往昔修學持戒忍辱精進禪定智慧波羅蜜多時昔諸本生事一切無餘於一身中亦能普現又非但能於一身普現一切本生事迹即於一毛孔中亦能普現一切諸行也庚二於彼示現他一切行諸佛過去及未來現在盡於虛空際安住世間説正法救濟苦惱衆生者從初發心至菩提一切諸行如已行由知諸法同幻性於一毛孔能頓現諸佛世尊若已過去若尚未來若現在世盡虛空際安住世間演説正法救濟苦惱諸衆生者從初發心至證菩提三世諸佛一切諸行如已所行於一毛孔皆能頓現通常幻師以咒藥力尚能於自身中示現情器種種行相何況諸佛菩薩已知諸法本性與幻事性全無差別復經多劫修習彼義豈不能現彼諸幻事是故智者誰仍不了是義或似了知而反生疑當由此喻增上信解如自諸行與諸佛行於一毛孔皆能頓現頌曰如是三世諸菩薩獨覺聲聞一切行及餘一切異生位一毛孔中皆頓現如是三世菩薩獨覺聲聞一切諸行及餘異生位一切諸行於一毛孔中亦皆能頓現庚三隨欲自在圓滿已説三身圓滿次顯雖無分別而得隨欲自在圓滿頌曰此清淨行隨欲轉盡空世界現一塵一塵遍於無邊界世界不細塵不粗佛離一切垢清淨妙行隨欲而轉能於一微塵境上示現盡量虛空際一切世界及現一微塵遍於無邊一切世界然彼一塵亦不加大一切世界亦不減小頌曰佛無分別盡來際一一剎那現衆行盡贍部洲一切塵猶不能及彼行數佛無分別盡未來際於一一剎那示現種種妙行盡贍部洲所有一切微塵數量猶不能及彼一剎那諸行數量前頌依處增上説此頌依時增上説戌二建立十力功德分四己一略標十力己二廣釋十力己三一切功德説不能盡己四知深廣功德之勝利今初佛地是由十力所顯故當略説少分差別頌曰處非處智力如是業報智知種種勝解種種界智力知根勝劣智及知遍趣行靜慮解脫定等至等智力宿住隨念智如是死生智諸漏盡智力是謂十種力能仁十力謂處非處智力如是知業異熟智力了知種種勝解智力種種界智力如是了知根勝劣智力遍趣行智力靜慮解脫等持等至等智力宿住隨念智力如是死生智力漏盡智力是謂十力己二廣釋十力分二庚一釋處非處智等五力庚二釋遍趣行智等五力今初彼法定從此因生知者説此為彼處違上非處無邊境智無礙著説名力若彼果法定從此因法生知者諸佛即説此因為彼果之處如從不善業生不可愛果從聖有學道得涅槃等若與上説相違名為非處如從善業生不可愛果已得見道猶隨業力受第八生皆無是處如是處非處境無量無邊佛智無礙著轉説名處非處智力頌曰愛與非愛違上相盡業及彼種種果智力無礙別別轉遍三世境是為力愛謂善業非愛謂不善業是為不雜二業與上相違謂諸雜業能盡有漏業者謂無漏業及彼諸業種種果報智無礙著別別而轉遍於三世所攝一切業果等境是為業異熟智力頌曰貪等生力之所發有劣中勝種種欲餘法所覆諸勝解智遍三世名為力貪字亦表嗔等煩惱等字等取信等諸法生即種子由彼種子之力所發欲解此有下劣中等殊勝極不相同之種種欲解又彼欲解種子雖被餘法諸行之所覆蔽然佛妙智遍三世轉了達一切欲解名為種種勝解智力頌曰諸佛善巧界差別眼等本性説名界正等覺智無邊際遍諸界別説名力諸佛善巧一切界之差別謂眼根等等攝耳至意為六根色至法六塵眼識至意識六識説彼之內空等本性名界正等覺智遍於一切界差別轉説名種種界智力頌曰遍計等利説名勝處中鈍下名為劣眼等互生偕了達種智無礙説為力虛妄增益之遍計於生貪等有自在力故名為根等攝信等諸根其最利者説名勝根其處中根與鈍下根説名劣根眼等二十二根及諸根互能生果一切種智於彼一一根性皆甚了達無礙著轉説為根勝劣智力庚二釋遍處行智等五力有行趣佛亦有趣獨覺聲聞二菩提天人鬼畜地獄等智無障礙説為力頗有行道能趣佛果有行能趣獨覺菩提有行能趣聲聞菩提有行能趣天人餓鬼畜生地獄諸趣等字顯示正定邪定等種種諸行於彼一切智無障礙説為遍趣行智力頌曰無邊世界行者別靜慮解脫奢摩他及九等至諸差別智無障礙説名力無邊世界中行者各差別如四靜慮八解脫奢摩他等持及九次第等至與雜染清淨無邊差別佛智於彼一切均無滯礙説名雜染清淨智力頌曰過去從癡住三有自他一一有情生盡情無邊并因處彼彼智慧説為力始從愚癡展轉傳來於過去世住三有中隨念自他一一有情一切生事盡有情數無有邊際并念其因並念相貌謂念自他如是色類並念處所謂念從彼處沒來生此處於彼一切隨念境上所有彼彼無障礙智説為宿住隨念智力頌曰盡虛空際世界中一一有情死生時於彼多境智遍轉清淨無礙説名力盡虛空邊際諸世界中諸有情類一一有情死時生時由種種業感種種果佛清淨智於彼衆多境界無障礙轉説名死生智力頌曰諸佛一切種智力速斷煩惱及習氣弟子等慧滅煩惱於彼無礙智名力諸佛由行一切種智之力永斷貪等一切煩惱及諸習氣聲聞弟子與獨覺輩以無漏慧滅諸煩惱佛智於彼無障無礙是名漏盡智力言速者顯示佛智一剎那頃最細習氣盡皆斷除此中所言煩惱習氣釋論云若法於心染著薰習隨逐而轉是名習氣煩惱邊際薰習根本習氣是諸異名聲聞獨覺雖斷煩惱然不能斷除習氣釋論云無明習氣能障了達所知此説習氣是所知障此宗許法我執是煩惱障故所知障當是二取錯亂習氣龍猛師徒於餘論中皆未明説何為所知障故當依止此論所説也釋論又云無明與貪等習氣唯一切種智於成佛時始得永斷非餘能斷故餘處説二乘阿羅漢與八地菩薩斷盡一切煩惱種子當知彼煩惱種子與此處所説煩惱習氣亦非一事又此習氣係最微細之品十地最後心無間道現起同時息滅而成最初解脫道時即是佛智第一剎那故説以一切種智力斷除習氣也如是説此諸力知一切所知者是現前知以佛之現量不現而知不應道理故是現起而知又不現行相而知非此宗義六十正理論釋中已明了宣説故亦非是由現見現在之力而兼知去來也例如今日於現在時觀待此時之去來非有雖於此時不量去來然了知今日智即能了知去來一切亦不相違譬如種子雖不生種子時之芽然種子生芽全不相違也己三一切功德説不能盡諸佛所有一切功德假使諸佛加持壽量經無數劫不作餘事專一汲汲演説功德猶不能盡況諸菩薩尤況二乘豈能了知宣説諸佛所有一切功德當以譬喻顯示此義頌曰妙翅飛還非空盡由自力盡而回轉佛德無邊若虛空弟子菩薩莫能宣如我於佛衆功德豈能了知而讚言然由龍猛已宣説故我無疑述少分如妙翅鳥王翅翎豐廣仗承風力善能致遠彼向虛空極力飛去後飛還時非緣虛空已盡而還是由彼久飛自力用盡而回轉如是諸佛功德無量無邊廣如虛空聲聞弟子及諸獨覺并入大地諸菩薩衆不能盡説而自退止此亦非由佛德已盡故止是因自己慧力已盡而止也由佛功德説不能盡如我作釋者於佛功德豈能了知而讚説耶我以自力雖全不知諸佛功德然我無疑竟能略説少分功德者是因龍猛菩薩已説此等功德我是依彼而説己四知深廣功德之勝利甚深謂空性餘德即廣大了知深廣理當得此功德總此論中顯示諸佛甚深廣大二種德甚深者謂空性法身及因位行位之空性其餘十一地之功德及所説十力等即廣大功德若善了知如斯甚深廣大功德之理依義修習當能證得此二種功德丁三明變化身諸佛化身是諸聲聞獨覺菩薩共同境界共同方便隨其所應亦是諸異生境界是能成辦善趣等因頌曰佛得不動身化重來三有示天降出胎菩提轉靜輪世有種種行為多愛索縛佛以大悲心咸導至涅槃原文四句六十字諸佛已得安住真實永無動搖之法身現諸化身重來三有示現從兜率天降及出胎等父母妻子繫屬之相又現證大菩提適應諸根轉妙法輪令往寂靜涅槃大城世界有情有種種界行復為衆多愛索所縛佛以大悲心不顧名利等盡行引導安立於大般涅槃丁四成立一乘已説三身建立次明於一乘中佛説三乘是密意教頌曰離知真實義餘無除衆垢諸法真實義無變異差別此證真實慧亦非有別異故佛為衆説無等無別乘原文四句離了知諸法真實義更無餘法能除一切二障垢染諸法真實義亦無不同之變異差別故此證真實義之智慧緣境行相亦無別異故佛能仁為諸衆生宣説無餘能等全無差別之一乘經云迦葉由知一切法平等性故而般涅槃此唯有一無二無三龍猛菩薩亦云由法界無別故乘無差別佛説三乘者為導諸有情此説若不通達真實義則不能盡斷一切煩惱諸法真實義復無最大差殊故有處説往涅槃城有達不達真實義之因乘差別及説斷盡煩惱證涅槃已不復更學餘乘之果乘有多乘者當知是為引導衆生而説若能善解此義則經説二乘不證法無我之密意亦能了解若得涅槃後不復更學餘乘此大涅槃唯有一乘云何經説二乘亦能般涅槃耶曰此是密意語言頌曰衆生有五濁能生諸過失故世界不入甚深佛行境然由佛善逝具智慧方便昔曾發誓願度盡諸有情原文四句由諸衆生有劫濁見濁煩惱濁衆生濁壽命濁等五濁能為發生諸大煩惱過失之因使其身心都無堪能由此能壞勝上勝解障求佛智是故世界衆生於佛甚深難測行境不能趣入然由諸佛善逝具足調伏衆生之巧便妙智及不忘失利益衆生之大悲方便復由往昔行菩薩道時曾發誓願願我度盡一切有情決定當以他種方便成滿斯願也由諸衆生有多障緣障入大乘復應大乘諸衆生安立涅槃頌曰以是如智者導衆赴寶洲為除衆疲乏化作可愛城佛令諸弟子意趣寂滅樂心修遠離已次乃説一乘原文四句法華經説如大商主具足智慧引導衆人赴大海寶洲之時為除衆人行久之疲乏故於未到寶洲之中間化作可愛城邑令衆休息如是諸佛世尊於未到大乘之此岸示以能得大乘之方便令聲聞弟子及獨覺人心意暫趣寂滅樂故宣説二乘待彼修心已能遠離生死煩惱次乃宣説唯一大乘彼等亦當如佛世尊圓滿資糧而得佛果成立一乘集經論云唯有一乘無量經中皆宣説故如彼應知丁五成佛與住世分二戊一釋成佛時戊二釋住世時今初十方世界佛行境如其所有微塵數佛證菩提劫亦爾然此祕密未嘗説十方所有一切世界唯有佛所行境如其中所有一切微塵之數量佛證最殊勝大菩提之劫數亦有爾許雖然昔未集善根者極難信解故佛於此祕密未嘗宣説若能增上信解即得無量福德資糧故此言之疏云此因一切諸佛同一法身故作是説若不爾者則無餘佛出世矣此説非理釋論説是依示現化身説故疏又云言現化身因意説法身此亦非理若許證法身之量有爾許時亦犯無餘佛出世之過失若一切佛同一法身則前佛成佛時其未成佛者於成佛時所當得之法身應已先得極相違故以是當知此是説證菩提之數量然非説成佛後之時量是説成佛已後化身重現成菩提之數量拏錯譯為佛境諸剎遍十方如彼所有微塵數佛亦當成大菩提較為妥善若不作是解而照疏中所説正是本論所指不可説此祕密之機也戊二釋住世時直至虛空未變壞世間未證最寂滅慧母所生悲乳育佛豈入於寂滅處諸佛未來之壽量直至虛空無為未曾變壞一切世間衆生未證最寂滅之佛果而無盡期蓋諸佛係從般若波羅蜜多佛母所生由大悲乳母之所養育豈能入於一向寂滅處耶諸佛為利濟無邊無際一切有情其大悲心行相云何頌曰世間由癡噉毒食如佛哀愍彼衆生子毒母痛亦不及以是勝依不入滅諸世間人由愚癡過失增上力故貪著五欲如噉毒食以是能生大苦之因名雜毒食如佛哀愍彼食毒衆生之量設使慈母見自愛子誤噉毒食所生之悲痛亦不能及佛也是如諸佛為最勝依怙終不入於一向寂滅頌曰由諸不智人執有事無事當受生死位愛離怨會苦并得罪惡趣故世成悲境大悲遮心滅故佛不涅槃原文四句由諸世人不知真實義凡執有實事深信業果能生人天者決定當受生死位苦亦定當受愛別離苦怨憎會苦其執無因果事成就邪見者則當墮於諸罪惡趣地獄等中亦定當受前説衆苦故諸世人成為大悲所愍之境由大悲力遮世尊心不趣寂滅是故世尊常住世間不般涅槃乙三如何造論之理月稱勝苾芻廣集中論義如聖教教授宣説此論義如是無倒解釋龍猛菩薩意趣之論義是月稱苾芻廣集中觀論義如了義諸經聖教及龍猛菩薩之教授而解説也頌曰如離於本論餘論無此法智者定當知此義非餘有如離中觀諸論餘論典中未有無倒宣説此空性法者如是智者決定當知我等此中所説論義如空性法亦是餘論所未有者釋論云是故有中觀師謂經部與薩婆多部所説勝義諸中觀師許為世俗當知此説是未了知中論之真實義以出世法與世間法相同不應理故此顯自宗許為名言有者皆是無自相法故小乘二部於許有自相上一切建立自宗非但勝義中不許有即名言中亦不許有於是當知此宗非但不共唯識即與解釋龍猛提婆意趣之餘中觀師宗亦不相共然此論師許佛護釋堪為完量故非譏彼靜天菩薩與此師宗極相符順由此於名言中亦不許有自相而能安立二諦故有多種不共善説如不許自續及阿賴耶識等辨了不了義等論中皆已廣説此不煩贅有説出世法為越出世間名言之他宗世間法為自宗者與釋論相違釋論説棄捨此出世法故當反上而説世間與出世之義是如實知不知真實義也由此解釋龍猛菩薩意趣不共他故其不知菩薩意趣不解經論真實義者但聞宣説空性之文字便深生怖畏遂即棄捨此出世法今為無倒顯示中論之真義故造此入中論頌曰由怖龍猛慧海色衆生棄此賢善宗開彼頌蕾拘摩陀望月稱者心願滿龍猛菩薩通達甚深空性之慧海極廣難測顏色黝黑見者恐怖故唯識師等衆生皆遠棄龍猛此賢善宗義然中觀論如拘摩陀花之蓓蕾諸企望月稱開放彼花者今皆滿其心願矣釋論云若謂上座世親陳那護法等諸造論者彼等是否聞文生怖棄捨無倒顯示緣起義耶即作是答世親陳那等論中雖皆是解釋唯識宗義然彼諸師究竟何所許如我等凡愚實難揣測也又此甚深空義誰能通達頌曰前説深可怖多聞亦難解唯諸宿習者乃能善通達由見造宗如説有我教故離此宗外莫樂他宗論原文四句如前所説甚深真實義極可恐怖唯諸衆生曾於宿世樹殖增上勝解空性之習氣者由久修習故乃能決定通達此處拏錯譯云現見於外道惡論執為真實者由宿因力故亦能通達空性較跋曹所譯為善如諸外道若昔無信解空性之習氣即使暫斷對法所説唯除有頂其餘三界之煩惱現行能別創立宗派者然於佛説勝義空性不能信解如是彼諸論師多聞聖教終難了解此甚深義除中觀宗由見他宗解説勝義之理未得佛意唯由造如同宣説有人我之邪教故離此中觀宗外於他論師所許論宗當捨歡喜之心以他隨意所創宗義不足為奇唯自能增上信解空性正見最為希有乙四回向造論之善我釋龍猛宗獲福遍十方惑染意藍空皎潔若秋星或如心蛇頂所有摩尼珠願普世有情證真速成佛原文四句我以教理顯釋龍猛大阿闍黎之賢善宗義所獲廣大福德遍十方際此於煩惱所染心意如蔚藍色之虛空中最為皎潔如同秋星或如造者心蛇頂上之摩尼寶珠今仗此力維願一切世間有情如實通達甚深真理速趣如來普光明地甲四結義分二乙一何師所造乙二何人所譯今初入中論頌是薩曼達國光顯龍猛深廣理趣證持明位得如幻定住無上乘成就逆品不可奪之殊勝智悲能於所畫乳牛乳破除有情實執之月稱大阿闍黎著作圓滿乙二何人所譯迦濕彌羅聖天王時印度底拉迦迦拉沙論師與西藏跋曹日稱譯師於迦濕彌羅國無比大城寶密寺中依迦濕彌羅本翻譯後於拉薩惹摩伽寺印度金鎧論師序與前譯師依照東印度本善加校改講聞決擇此中所列與釋論中造論序翻譯序相同者是將別譯本頌與釋論中之合本頌合并校對而序也一切尊經心要義離邊中道深緣起遠離二邊如實解謂佛授記聖龍猛彼最勝宗聖天意智者造釋有多種圓滿釋者謂佛護月稱論師與靜天合三大士所許門要義盡決文句到以此善説今應成最勝宗義淨無垢北方雖多信此宗然不能分清微理無福信解深義者反謗此宗自不解為除所見諸垢染為善根者顯深道並願我於一切生不離此道故解釋由此勤勞所生善普願衆生達深義一切晝夜勤修習諸佛菩薩常歡喜入中論善顯密意疏初由善吉祥大善知識供四十兩銀曼荼羅復由衆多信解此法慧力殊勝之大善知識殷誠勸請造一文義明顯總義決斷廣解釋論諸難處之大疏大中觀行者多聞苾芻東宗喀巴善慧稱吉祥造於格敦寺尊勝洲中華民國三十一年三月三十日譯於縉雲山編譯處
