body:
  text: 宗喀巴大師造釋第一勝義菩提心之二戊二諸地各別建立分三己一釋極喜等五地己二釋第六現前地己三釋遠行等四地初又分五庚一極喜地庚二離垢地庚三發光地庚四燄慧地庚五難行地初又分三辛一略說地體性辛二廣釋地功德辛三結說地功德今初佛子此心於眾生為度彼故隨悲轉由普賢願善迴向安住極喜此名初安住初地之佛子由見眾生皆無自性以無自性為悲心緣境之差別此心為度諸眾生故隨大悲轉由普賢菩薩之大願廻向眾善其無二相智名曰極喜證得功德數量等果此地菩薩之勝義心名最初出世間心初地菩薩發無數億大願如十地經之十大願等皆可攝入普賢願中故本論唯說普賢大願於中文殊室利勇猛智等兩頌集學論尊為無上迴向釋論說如聲聞加行道非初果向如是無間將入初地之勝解行地上上品菩薩亦是未發菩提心地此約未發勝義心說於彼地前早有菩薩已發無上菩提心為此宗所許如前已說若作是念雜集論說始從一座順抉擇分乃至未得初果是預流向故譬喻不成答此兩派俱舍論說要得聖道方立初果向而集論則如上說今此師所許同俱舍論亦與集經論相順彼說假使有人經殑伽沙數刧於日日中以百味飲食天妙衣服供養世界微塵數隨信行者若復有人於一中日以一餐食供養一隨法行者其福過彼無量數倍復次設有人如前供養爾許隨法行者若有餘人於一日中以一餐食供養一八人地者其福過彼無量數倍此中二隨行人顯然是約資糧加行位說辛二廣釋地德分三壬一莊嚴自身德壬二勝過他身德壬三初地增勝德初又分二癸一別釋功德癸二總明功德初中又三子一得真義名初功德子二生佛家等四功德子三趣上地三功德今初從此由得彼心故唯以菩薩名稱說菩薩入初地以後已得勝義心已超異生地爾時唯應以勝義菩薩之名稱之不應稱以不稱之名以彼已成聖者故釋論引寶雲經說加行道上品世第一法未得勝義菩薩地故知特說勝義菩薩非通名也又般若經二千五百頌即第十六會說如實知無寔無生亦無虛妄非如異生所執所得故名菩薩此說諸法寔性應如聖者所得而得故彼所說之菩薩亦是勝義菩薩非異生菩薩也子二生佛家等四功德生於如來家族中斷除一切三種結此菩薩持勝歡喜亦能震動百世界住初地之菩薩過一切異生二乘地故內身已生定趣佛地之道故名生於如來家中謂於自道種姓決定不復更趣餘道也又此菩薩已現見補特伽羅無我故薩迦耶見及隨眠疑戒禁取等三結一切永斷不復生此說已斷三結種子其薩迦耶見是見所斷之分別起者非俱生者餘見所斷之隨眠亦初地斷何故唯說此三耶雖有二釋以俱舍所解為善彼云或不欲發趣迷道及疑道能障趣解脫故唯說斷三如趣向他處有三大障礙謂不欲趣行及迷失正道疑惑正道如是趣向解脫亦有三障由第一結怖解脫而不願趣行由第三結依止餘道而失正道由第二結於道疑惑故偏說斷此三結又此初地菩薩入種姓決定由得彼果功德遠離彼地過失故生不共之歡喜由喜多故說彼菩薩為持最勝歡喜者由喜勝故說此名極喜地又此菩薩能周遍震動一百世界子三趣上地等三功德從地登地善上進滅彼一切惡趣道此異生地悉永盡初地菩薩為欲進趣第二地故起大勇猛善進上地又於得證初地時此菩薩之一切惡趣皆悉永盡豈不從得加行道忍位便能不因業力而往惡趣已盡惡趣道耶得忍位已不墮惡趣非以對治壞彼惡趣之種子特緣不具耳此以真對治壞彼種子名滅惡趣集論亦說惡趣之蘊界處等是所斷也又得初地時此菩薩之異生地一切永盡癸二總明功德如地八聖此亦爾四果四向中從阿羅漢下數至第八即預流向名第八聖者即八人地如彼創獲聖法生隨順斷智功德此菩薩亦爾由得初地故能斷過失發生功德壬一勝過他身德分三癸一此地由種姓勝二乘癸二七地由智慧勝二乘癸三釋成上說今初即住最初菩提心較佛語生及獨覺由福力勝極增長菩薩之菩提心不特二地以上即住初心之極歡喜地已由世俗菩提心及大悲心福德之力能勝於從佛語生之聲聞及辟支佛較彼二乘之福德極為增長此如彌勒解脫經云善男子如王子初生未久具足王相由彼種姓尊貴之力能勝一切耆舊大臣如是初發業菩薩發菩提心雖未久然由生如來法王家中以菩提心及大悲力已能勝於一切久修梵行之聲聞獨覺善男子如妙翅鳥王之子初生未久翅羽風力及清淨眼目之功德為餘一切大鳥所不能及如是菩薩初發菩提心生如來妙翅鳥王之家此妙翅鳥王子以後一切智心之翅力及增上意樂清淨眼目之功德彼聲聞獨覺雖百千刧修出離行亦不能及疏抄謂此明世俗菩提心非也此約勝義心說經說初發業者及發心未久與前說初地始生如來家中其義相同蓋本頌即攝彼經之義也又莊嚴大乘經論等亦多說清淨增上意樂發心即初地之發心然則不許異生菩薩之世俗菩提心亦能勝過二乘耶不爾即前經云善男子如金剛寶雖已破碎猶能勝過一切金莊嚴具猶不失金剛之名能除一切貧乏之苦善男子如是一切智心金剛寶雖離修證亦能勝過一切聲聞獨覺功德金莊嚴具亦不失菩薩之名能除一切生死眾苦所以知此是說世俗菩提心者以集學論引證此經謂大菩提心雖離諸行亦不可輕毀若是已得大地之菩提心決無離諸行者癸二七地由智慧勝二乘彼至遠行慧亦勝彼初地菩薩至遠行地時非但以世俗菩提心勝二乘即勝菩提心智慧之力亦能勝彼二乘如十地經云諸佛子譬如王子生在王家具足王相生已即勝一切臣眾但以王力非是自力若身長大藝業悉成乃以自力超過一切諸佛子菩薩摩訶薩亦復如是初發心時以志求大法故勝出一切聲聞獨覺非以自智觀察之力菩薩今住第七地以自所行智慧力故勝過一切聲聞獨覺所作初發心者謂初地纔發清淨增上意樂心是則應知唯遠行地菩薩乃能以自慧力勝過二乘非六地以下勝過一切聲聞獨覺所作者即以智力過勝二乘之義以自所行智慧力者謂了知菩薩實際滅定之殊勝此中智力超勝者有謂六地以下與七地智慧體性無別然前者之智力無斷所知障之功能第七地智則有能斷之力故有智慧勝劣之別有說七地以後乃能超越入三摩地有說第七地智是趣向第八不退地智故說智慧超勝初且非理此宗許一切補特伽羅寔執皆是染汙無明要永斷彼令不復生須斷盡其種子即此斷德亦共二乘諸阿羅漢故斷寔執種子非斷所知障若除種子別立餘習氣為所知障則未至八地皆不能斷故安立寔執為所知障之宗派分所知障為輭中上九品由二地等九品修道而斷非此宗所許下當廣說次說亦非理超越古譯次第錯亂由此門入三摩地非六地以下所能七地方有云云無經可證第三說亦不然解六地以下與第七地能否以智力超勝之理猶不能斷疑如以宗為因也疏抄說七地菩薩有分別念謂我當修道故猶有功用然不作意經等相法故得無相道六地以下及聲聞獨覺無無相道故由智慧能超勝之吾師解云此應於通達真實之智慧辨其差別謂由緣實際真理之入定出定而分經說第七地時謂一剎那心能緣寔際滅定而入定出定要七地方有非以下諸地所能此說極善以勝解行地心與真理尚未融合一味故於出入空三摩地猶不甚難但至聖位心與真理融合一味如水注水出入彼定轉極難也說初地功德而敘七地以智力勝二乘得無有紊亂之失耶無失本論釋初地等依十地經彼經分別解說初地菩薩能以世俗菩提心勝過二乘非以勝義菩提心勝爾時應有作是念者要至何地智慧方勝經說至第七地智慧方勝為除彼疑故本論於此中安立其義極為適當癸三釋成上說分三子一明十地經說二乘通達法無自性子二引教證成子三釋妨難初又分二丑一解釋論之意趣丑二明彼亦是入行論宗今初十地經說六地以下不能以智德勝二乘由此可知二乘亦知法無自性若二乘人無彼智者則初發勝義心菩薩之智德亦應勝彼以彼不知法無自性故如以粗靜相世間道而得離欲之仙人釋論謂猶如外道聲聞獨覺亦應不能永斷三界煩惱及種子意顯若不通達空性修習則如粗靜相世間道不能盡煩惱種子又說若不通達真寔義則應緣色等五蘊而執寔有由此心顛倒故則應不能圓滿了解補特伽羅無我以於施設人我所依之諸蘊執為寔有之境未能破故此明若於施設所依之諸蘊未能破執寔之境則於安立之補特伽羅亦不能破執寔之境由未通達補特伽羅無寔則亦不能圓滿了解補特伽羅無我也此義極難通達諸依本宗及靜天論師者多未能善說故更為決擇之或有作是念若以正理決擇補特伽羅寔我與諸蘊性一異俱遣則能定解空無我相及無常等十六行相既能解彼則彼正所化機亦必緣彼極善修習由修習力定能現證補特伽羅無我此是成立瑜伽現量諸理之所成立由是因緣現證彼義之見道能斷分別煩惱亦得成立若彼已成則現見補特伽羅無我已更數數薰修之修道亦得成立亦能成立斷除俱生煩惱乃至漏盡雖未通空性亦能斷三界一切煩惱及種子以所述見修斷惑之理即出世間道斷惑之理也故修無常等十六行相之道亦能斷一切煩惱盡當釋彼疑吾等非說末得真寔義見則以正理決擇無常等十六行相及彼所化勤修彼義現見分粗補特伽羅無我并見後薰修皆不可能乃說彼道不能圓滿通達補特伽羅無我非是真見道及出世修道全不能斷見修所斷之種子故說彼道為見道修道能斷二種所斷惑及種子彼二道究竟能得阿羅漢果者此皆判為不了義如唯識宗破無方分極微與極微所集之外境并與彼異體之能取雖可以量成立彼所化機久修彼義則能現見見後薰修雖亦得成然若說彼道能登十地而趣後三道則中觀宗釋彼為不了義也況修無常等十六行相雖同然許唯證如上所說之補特伽羅無我智乃是解脫煩惱之道如集論說無我作意能斷煩惱所餘諸相是修彼之方便釋量論亦云空見能解脫修餘為證彼印度論師有誤解此中空見為通達真寔義之見者深乖論義論說空彼補特伽羅寔我之空見耳此道雖不能永斷煩惱種子然能暫斷煩惱現行彼共外道之粗靜相道尚能暫斷無所有地以下煩惱現行而況前道之暫斷現行乎然所言暫斷煩惱現行之煩惱亦是集論俱舍所說之所緣行相煩惱若本宗所說染污無明之寔執及由彼所起之利鈍煩惱凡異於對法所說者則雖現行亦不能斷又對法說有頂地攝之煩惱現行粗靜相道雖不能斷然修前說通達粗分補特伽羅無我之道則亦能伏斷也此等即是解說釋論凡未通達真寔義而說為對治煩惱之道者皆與粗靜相道同及如外道不能斷除一切煩惱之意丑二明彼亦是入行論宗靜天菩薩亦許此義入行論云由見諦解脫何用見空性外人意謂由見無常等十六行相之道已能解脫煩惱故為盡斷煩惱不須見無自性之空性也答曰經說無此道不能證菩提意謂若無見自性空之道則不能得三乘菩提此如入行論大疏引般若經說有法想者則無解脫及預流乃至獨覺皆依般若波羅蜜多而得道果有但釋為無上菩提者非也次說苾芻是教本等四句亦明心有寔執所緣之道不能得於涅槃次云若斷惑解脫彼無間應爾若斷惑解脫是牒敵者之宗此與前說由見諦解脫義同意謂若如汝說由修無常等十六行相之道便煩惱而得解脫此中所諍在唯修無常等十六行相之道能否解脫煩惱此即從由見諦脫等諍論演繹而來極為明顯以是有人許唯修無常等十六行相之道能斷盡煩惱又說由彼不能解脫一切苦果全非論義此中破他意云若由身心生起十六行相之道其共聲聞兩宗所立煩惱暫不現行便立彼為煩惱已盡而得解脫者則應暫斷煩惱現行之際無間當得諸漏永盡之解脫然彼等雖無惑猶見業能功雖暫無煩惱現行猶見業力能引後有故不應許爾有釋論及藏人釋此論意如目犍連及指鬘等雖無煩惱由昔異生位所造之業猶受苦果非無間而得解脫不應如此釋此中非說引生現法苦果之功能乃說惑未永滅由業功能引生後有故不得解脫如云由遠離空性心滅當復生如無想等至此說若離通達空性之智雖修餘道亦能暫滅煩惱心現行然非畢竟滅當復生起煩惱現行由業增上流轉生死永無止息也敵者於猶見業功能作如此難且謂無愛取而云決定者謂由彼道斷盡受後有之愛故決定不由業力更受後有答曰此非染污愛如遇云何無此謂敵者既許愚癡無知有染污不染污之二何不許此愛亦如對法所說有染污不染污之二耶然此乃說應有大小乘共許之非染污愛非謂自宗許彼愛為不染污也故此是說其有寔我補特伽羅我執所引諸愛現行雖暫斷除然執補特伽羅由自性成薩迦耶見所引諸愛猶不能滅若作是思若俱斷彼二宗所說之煩惱現行不斷種子現行之有無既同何事分判愛之差別也論曰由受緣生愛彼等受仍有此即顯示餘道十六行道能斷餘煩惱現行而不能斷愛之理謂離真寔義見則不能斷緣受之寔執無明由是生樂受則起不離愛生苦受則起速離愛依於順緣具足障緣遠離之受因定生愛果也自宗於受斷愛之理如入行論云若時無受者受亦不可得爾時見彼義何故愛不滅謂見受者及受都無自性如是修習方能斷愛故亦是說若無此道則一切愛即不能滅此亦即六十正理論義如云若心有所依惑毒寧不生此以有受之因而證有愛西藏法獅子與自在獅子輩破入行論云有因不能成立有果故非善說此因習聞藏地諸師多說聲聞不證法無我義又因未能精識論師之教理乃於智者妄生毀斥如是藏人有於月稱論師見其過失者亦由未解論師之義乃以似過妄相攻難又如疏抄中所說無常等十六行相道能斷分別煩惱不能斷俱生亦不應理以若約暫斷諸宗共許之煩惱現行而言則分別俱生俱可斷若約不斷種子而言則俱不能斷此亦不知月稱靜天意趣相同之失也是故若未了知五蘊無寔則不知補特伽羅無寔亦即不能通達補特伽羅無我如於五蘊等法空無寔有立法無我則補特伽羅空無寔有亦應立為人無我以其義相同故以是執補特伽羅寔有必應立為補特伽羅我執乃至彼執未盡一切煩惱亦不能盡執補特伽羅及法寔有應皆煩惱障攝靜天論師宗必應作如是建立也子二引教證分二丑一引大乘經證丑二引論及小乘經證今初顯句論引增上意樂請問經云如有人聞幻師奏樂由見幻師所幻之女起貪心而為貪所縛惟恐眾知深生羞恥從座起去到靜處已即緣彼女作意不淨作意無常苦空無我善男子於意云何當言是人為正行耶為耶行耶白言世尊女尚非有況緣彼女作意不淨作意無常苦空無我當言彼人是為邪行世尊告曰善男子若有苾芻苾芻尼鄔波索迦鄔波斯迦緣於不生不起諸法作意不淨作意無常苦空無我當知與彼無異我終不說彼愚癡人是修正道當說彼等是行邪行此謂若緣幻女以為寔女即緣彼女作意無常等五相與執五蘊寔有即緣五蘊作意無常等五相相同其執五蘊寔有修無常等乃於所著境錯誤之邪執非量所能成若未破寔執境未得正見者不分別為寔為妄但總緣五蘊修無常等其所修義由名言量可容成立修習此義亦能生起如上所說之道又顯句論引靜慮慳悋經說曼殊室利諸有情類由不如寔見諸聖諦以四顛倒顛倒其心不能出離虛妄生死曼殊室利問佛云世尊惟願為說諸有情類由緣何事不出生死佛說由不如寔了知四諦故不能解脫生死曼殊室利又問於何境如何執故不能解脫生死佛答若作是念我當出離生死我當得般涅槃以寔執心修無常等謂我已知苦斷集證滅修道我已獲得阿羅漢果由暫離煩惱現行即自謂諸漏永盡臨命終時見生相現遂於佛所而生疑謗由此罪業墮大地獄此約一類住此道者有如是過非一切皆爾前說要如寔了知四諦方能解脫生死故曼殊室利復問云如何乃能通達四聖諦答曰曼殊室利若見一切諸行無生彼即知苦若見一切諸行無起彼即斷集若見一切諸法畢竟涅槃彼即證滅若見一切諸法究竟不生彼即修道又說彼道能無所取而般涅槃此說要見四諦皆無自性乃能解脫生死則未離寔執之道決定不能出離生死亦極明顯故亦是說唯修四諦無常等十六行相之道不能斷煩惱種子斷彼種子必須通達真寔義而修習有未善了別此等義者妄謂聲聞唯修無常等十六行相更無餘斷煩惱之道乃說聲聞聖者非真聖者聲聞阿羅漢非真阿羅漢造毀謗聖人之重罪作如是說者若有菩薩戒即犯根本罪以集學論說若執有學乘不能斷貪等亦令他受持即犯根本罪故能斷金剛經亦顯此義如云善現於汝意云何諸預流者頗作是念我能證得預流果不善現答言不也世尊何以故世尊諸預流者無少所預故名預流又云世尊若預流者而作是念我能證得預流果者即執我有情命者補特伽羅於後三果亦如是說此謂若預流者於能得人及所得果執為實有而作是念我能證得預流之果即為執我蓋執補特伽羅實有即補特伽羅我執執果實有即法我執所言諸預流者不執實有能證果者約彼無有實執所著之境非說彼身全無俱生我執也於後三果亦應知是知自續中觀師雖於此文有異解然慧生論師引此文以證證二乘菩提亦須通達空性極為善哉如是諸教皆顯示若離真實義見則不能解脫生死要脫生死則必須彼見若說二乘阿羅漢未能解脫生死繫縛非諸智者所許亦不應理故是明說二乘亦證法無自性般若經等可引證者尚多恐煩不述丑二引論及小乘經證寶鬘論云乃至有蘊執從彼起我執有我執造業從業復受生三道無初後猶如旋火輪更互為因果流轉生死輪彼於自他共三世無得故我執當永盡業及生亦爾初二句顯示若時於蘊有實執即從彼執而起我執薩迦耶見故斷盡薩迦耶見者必須於蘊斷盡實執由此可知二乘阿羅漢亦於蘊斷盡寔執是則未破實執所著之境即不能破薩迦耶見所著之境故知大小學派共許之補特伽羅無我但破粗分補特伽羅我非是微細補特伽羅無我是故有人見此論師或說二乘通達補特伽羅無我與他宗相同須說與他宗不同唯在是否通達法無我理寔係未解此宗正義以釋論說若離真寔義見亦不能通達微細補特伽羅無我也次二句說以有薩迦耶見增上力便造繫縛生死之業以此業力復受生死此亦約未破寔執所著之境者說非謂凡有薩迦耶見皆爾以至七地猶有薩迦耶見而初地以上即不由業力受生此諸教證并明若不修真寔義見則不能斷盡薩迦耶見故亦即是說但無常等十六行相之道不能斷盡煩惱也故凡許此不共補特伽羅無我之理而猶依於共許之補特伽羅無我而明薩迦耶見許彼煩惱建立是未了不共宗義成大矛盾豈此大論師而有此失故知本宗學者若許二乘證法無我然於煩惱建立全不思惟不共之理是僅有信仰本宗之名而已言三道者謂煩惱業生三雜染無初後者謂由煩惱造業從業感苦復從於苦生同類果及煩惱等由彼此更互相生故前後次第無定即更互為因果之義又彼緣起不從自生他生共生其自性生於三世中俱不可得見無彼故或不可見故即能斷盡我執薩迦耶見故亦能滅生死流轉決擇蘊等皆無自性已又云如是如寔知無寔眾生義猶如火無薪無住取涅槃此說由見真寔義故而般涅槃此非但依菩薩說如是見乃依二乘說以彼涅槃文後復說菩薩亦見彼決定求菩提然由大悲故受生至菩提故釋論所引寶鬘論係舊譯本譯文欠善聲聞乘經亦有此說諸聲聞為斷煩惱障故諸色如聚沫請受類浮泡諸想同陽燄諸行喻芭蕉諸識猶幻事日親之所說以五喻觀察諸有為法皆無自性雖釋菩提心論云佛於聲聞宣說五蘊於菩薩眾說色如聚沫等喻然彼論意且約暫時不能了達真寔義之聲聞而言非指一切聲聞以彼論亦云若不知空性即非解脫依彼愚者流轉六道三有獄又聲聞藏中亦說諸法無自性義如寶鬘論云大乘說無生餘說盡空性盡無生義同是故應忍許此謂大乘經中說無自性生為空性餘小乘經中則說有為盡為空性以二種空性義同故於大乘空性應信可勿疑此二空性義同之理有說諸聲聞乘許有為滅盡若自性則滅盡不成既許滅盡則應先許無自性故說彼義同此不應理若如彼說則凡中觀師所許苗芽等法皆有此義則應許苗芽等一切法皆與空性義同寶鬘論疏謂無生與剎那義無別亦是未解論義此當如六十正理論疏說先引小乘經云若於此苦無餘斷決定斷清淨永盡離欲滅靜永沒不生餘苦不生不起此最寂靜此最微妙謂決定斷一切諸蘊盡諸有離貪欲息滅涅槃次解此義云言此苦者唯依現在身中苦蘊說無餘斷乃至永沒依未來苦說不生餘苦乃至涅槃若謂此苦正詮煩惱是總名詮別也此不應理若時總名不可作總義解者乃可作別義解此中可就總名解故不應作此說若必如彼寔事師說則寶性論之煩惱本盡故不應釋為諸蘊本來無自性生名為本盡若必釋為由修道力無餘斷者則有所證涅槃時已無能證之人有能證人時蘊未永盡則無所證之涅槃故彼不能解說經義若如吾等所許此言永盡非由對治而盡乃本來盡故名盡則於經義善能解釋龍猛菩薩謂經中所說之永盡即苦蘊寂滅之滅諦涅槃與無自性生之滅諦義同釋者多未能通達故今詳說之中觀論云世尊由證知有事無事法迦旃延那經雙破於有無此亦顯示小乘經中雙破二邊者此經出雜阿笈摩上來僅略舉少分餘寶鬘論六十正理論各種讚文中猶多可引者子三釋妨難分二丑一釋釋論已說之難丑二釋釋論未說之難今初釋論云設作是念若聲聞乘中亦說法無我則說大乘經應成無用此所出敵者是清辨論師以佛護論師第七品疏中解釋小乘經說一切法無我之義即諸法無自性義般若燈論破云若如是者則大乘經便為無用今反破云為總說大乘經無用耶為別說大乘經說法無我為無用耶若如初難作決定說者不犯不定過則大乘經應唯說法無我而寔不爾以大乘經中更說菩薩諸地布施等波羅蜜多行大願迴向大慈悲等二種廣大資糧菩薩神力及異生二乘不可思議之法性故如寶鬘論云彼小乘經中未說菩薩願諸行及廻向豈能成菩薩安住菩提行彼經未曾說惟大乘乃說智者應受持此破唯以小乘經所說之道便能成佛不須別說大乘經之邪執若如汝所解應云唯小乘經所說之道猶不具起故大乘經中別說法無我然不作彼說而說別說廣大行品故所難非也若作第二義犯不定過聲聞藏中僅略說法無我大乘經中則以無量門廣說之此亦龍猛菩薩所許如出世讚云若不達無相佛說無解脫故佛於大乘圓滿說彼義初二句顯示若不通達無相真寔義則不能滅盡煩惱故不能證得解脫後二句謂大乘經中乃圓滿宣說無相法無我義故亦當知小乘經中是未圓滿宣說諸法無我如何以一故字能作圓滿宣說之理由耶當作是說若不通達無相即不能滅盡煩惱證得解脫聲聞乘中雖亦必說法無我然大乘小乘應有差別故於大乘作圓滿說故知彼所設難及所成立皆不决定是以能破即是違理之失其違教失前已廣說若爾此論師說大小乘經說法無我有圓滿不圓滿大小乘道修法無我亦有圓滿不圓滿其義云何有說大乘人能通達一切所知皆無自性二乘人僅能通達一分所知無自性决非如是若以正童於一法上能成立為法無我次觀餘法有無寔性即依前理便能通達無寔性故豈不中觀學者亦有破除有事寔有而許真空寔有或許法性是自在成就真寔有者乎初說是未善知寔有之量僅破粗分後說則雖自以為能破有事寔有然彼不以正量而破僅是毀謗有事之惡見故不以彼等所說而成不定由是當知諸大乘人隨成立一法無寔亦如中觀論所說有無量品類能立之理故於真寔義慧極為廣大諸小乘人僅以略理成立真寔義故於真寔義慧略而不廣故說彼二慧有廣略修有圓滿不圓滿之殊致此差別者亦由諸二乘人唯為斷除煩惱障故精勤修行以略理通達真寔義便能滿其所願而諸大乘人為斷所知障故精勤修行故於真寔義須以廣大慧而善通達也丑二釋釋論未說之難現觀莊嚴論云遠所取分別未離能取故當知由所依攝為麟喻道此說獨覺道雖能斷執所取實有之分別猶未能斷執能取實有之分別又云惑所知三道斷故為弟子麟喻佛子淨此說執所取實有為所知障此當如何會釋答此中斷執所取外境實有之義不出二宗或如中觀師所許外境雖是量所成立然正理能破外境實有由修此所决擇義即斷寔執或如唯識師說先以正理破外境由修彼義便斷有外境執若如初說且不應理若能安立外境為有以觀察真實義之正理能破實有者則於能取依前理之力便能通達其非有實性如提婆菩薩云若見一法真如性即見一切法真如若如第二說即獅子賢等之規是則無外境乃量所成立若能成立無有外境則能取心非離所取別有實體雖最鈍根亦能成立故不斷能取分別是依總許心為實有而言非謂緣異體之能取所取破其一分而執一分為實有故譏執能取實有之獨覺與執離二取心為勝義有之唯識宗相同殊為希有者乃自未解耳此中顯示獨覺道為中乘即說於所取能取有斷不斷實執之差別由彼二義較聲聞為勝較菩薩為劣故說名中此大中小三乘之三類補特伽羅依根姓之利中鈍而分復是依於無我建立根之次第謂大乘上見是中觀見中乘中見是唯識見小乘下見是共許補特伽羅無我見然此義不定若許三乘人皆有真寔義見者則依能否速疾了解真實義等而建立三根亦不相違又以不斷能取內心之實執判為劣根則現觀莊嚴論所說之無我見不可說即是莊嚴經論辨中邊論辨法法性論之唯識見但印度諸師亦有以現觀莊嚴論作唯識中觀見而解釋者恐煩不述又彼論云法界無差別種性不應異由能依法異故說彼差別此說聲聞獨覺亦通達法性言法界者如二萬明論云此中分別觀察謂於有事及有事相而起執著由彼無故當知無貪此非有性即一切法之真如性法界性即諸聖法之因故本性住種姓即修行之所依也此說於有事及彼相之執著為貪如彼所執非實有即說此實空為法界次設難云若法界即種姓應一切有情皆住種姓以法界遍一切故所言住種姓意取入道位之種姓答彼難云若緣某法而能轉成聖法之因即說彼法為種姓故無彼失此謂但有法性非安住道位之種姓要由道緣法性而修至轉成聖法之殊勝因時乃立為殊勝種姓也如是答彼法界無差別種姓不應異之難曰由能依法能緣道之差別故說種姓有異所依謂所緣能依即能緣其能緣中亦有聲聞獨覺之二乘緣法性者必須於覺慧成立若於覺慧前未破實有則彼覺慧不能成立實空亦於彼覺慧不能成立法性此復須先於一法得决定見故聲聞獨覺亦緣內外有法而見彼無實也由是獨覺亦有通達真實義者非獨覺定不能斷內心上之實執即聲聞乘亦須分通達不通達真實義之二現觀莊嚴論亦說小乘為二類故執二取異體之實執是否安立為所知障亦應分二類也若作是念彼非難三乘種姓有異是難十三種姓差別不應道理此亦非理如二萬明論云如云曼殊室利若法界是一真如是一實際是一云何觀察器非器耶此引餘經所說證此與彼由法界性無差別云何觀察是否大乘法器義同故是難大小乘種姓不應有異若作十三種姓解則彼難是器非器應不符理矣獅子賢論所許與解脫軍論師同餘寶性論本釋等亦說二乘有通達不通達法性之兩類恐繁不錄現觀莊嚴論宣說了知二乘道之道相智為攝受二乘種姓之機所攝受之小乘機中亦有是否甚深法器二類於二類中非器者多故多說彼機之道如大乘人若先不學唯識見則難得中觀正見獨覺聲聞亦應如是也又二萬明論與八千頌大疏為證安立法界為三乘種姓皆引能斷金剛經云一切聖者皆以無為法之所顯現意謂大小乘一切聖者皆由現證諸法無實勝義無為之所安立故此宗與現觀莊嚴論全不相違以是當知解釋現觀莊嚴論者之宗亦有二理也
