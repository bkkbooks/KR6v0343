body:
  text: 宗喀巴大師造釋第一勝義菩提心之三壬三初地增勝德分四癸一釋初地之布施癸二釋下乘之布施癸三釋菩薩之布施癸四明施度之差別今初爾時施性增最勝為彼菩提第一因雖施身肉猶殷重此因能比不現見證得極喜地時菩薩所修十度行以布施波羅蜜多為最增勝然非無餘波羅蜜多其出世布施波羅蜜多即大菩提之第一因於十度中雖後後勝於前前然說此地布施勝者謂此地修行布施有殊勝力於所修戒等則無此勝能如經說初地中隨施內身外物不起少分違逆施度之慳貪然不如第二地竟至夢中不起少分違逆戒度之犯戒又此地所有不可現見之智德即由布施而能比知謂彼非但殷重布施外物即割身肉施人亦極殷重彼所具他人不能見之登地等德由此施為因能比度而知如見煙比知有火此即顯示布施身命財寶全無慳惜雖如是布施而身猶安詳不變異也癸二釋下乘之布施分二子一由施能得生死樂子二由施能得涅槃樂今初彼諸衆生皆求樂若無資具樂非有知受用具從施出故佛先說布施論悲心下劣心粗獷專求自利為勝者彼等所求諸受用滅苦之因皆施生彼諸衆生皆欲解除饑渴疾熱病寒饑等苦而求其樂若無飲食醫藥衣服房舍等諸受用具則人類所求之樂必不得生解一切衆生意樂之釋尊因見此等受用資具皆從往昔布施之福德生故於最初即說布施之論又此方便最易行故由行布施能得圓滿受用者亦不定須如法如商人之捨極少財以求廣大之財聚較請乞丐所求尤多故於布施極應殷重其行施者非如菩薩隨大悲轉不求施報專為滿足求者之快樂而施故悲心下劣且於諸有情具粗獷心偏重於專求得生善趣自利之樂彼等由厭離不捨財物之慳貪與希望能感異熟之功德即下劣布施故能出生勝妙圓滿受用成滅除饑渴等衆苦之因子二由施能得涅槃樂此復由行布施時速得值遇真聖者於是永斷三有流當趣證於寂滅果彼無悲愍心唯求自身除苦得樂而殷重行施者於行施時善士常往施主家故得值遇聖者由彼聖者宣說妙法便能了知生死過失證無漏道永破無明斷無始來生死有流其值遇聖人之果即趣證聲聞獨覺之寂滅涅槃癸三釋菩薩之布施分四子一明菩薩布施之不共勝利子二明二種人皆以布施為主子三明菩薩行施時如何得喜子四明菩薩施身時有無痛苦今初發誓利益衆生者由施不久得歡喜諸非菩薩者於行布施滿足求者之願望時不能布施無間便得其樂果由彼不能現見布施之樂果故於布施容不修行但發大誓欲現前究竟利益安樂一切衆生之菩薩施後不久即於滿足求者之願望時得受用布施之果最大歡喜故能一切時中歡喜行施子二明二種人皆以布施為主由前悲性非悲性故唯布施為要行由前所說大悲為性之菩薩及非大悲為性者其所求之一切增上生樂與决定勝樂皆由布施生故唯布施為最要之行親友書亦云了知財物動無實當施沙門婆羅門貧乏親友以後世更無至親過於施子三明菩薩行施時如何得喜前說菩薩殷重行施以財物滿足求者之願望時即能引生殊妙歡喜其喜相如何頌曰且如佛子聞求施思惟彼聲所生樂聖者入滅無彼樂何況菩薩施一切如佛子聞求者乞施之聲思惟彼聲便念彼等乃來向我求者心中數數引生歡喜雖諸阿羅漢入寂滅涅槃之樂尚不能與之相比則諸菩薩盡施一切內外財物滿足求者所生之妙樂勝寂滅涅槃樂更不待說若以寂滅涅槃妙樂引攝其心則必失利他之行若以上說菩薩妙樂引攝之則於利他倍復精勤故不相同也子四明菩薩施身時有無痛苦菩薩由行布施引生妙樂能捨內外一切財物其捨身時能無苦耶曰已得大地之菩薩彼身無苦如割無情物虛空藏三摩地經云如大娑羅樹林若有人來伐其一株餘樹不作是念彼伐此樹未伐我等於彼伐者不起貪瞋亦無分別菩薩之忍亦復如是此是最清淨忍量等虛空寶鬘論亦云彼既無身苦更何有意苦悲心救世苦故久住世間此等并依得地者而說若未得極喜地於身及財物未能離貪著者彼於受害身之障緣時其身决定發生痛苦然於爾時於饒益有情事即依彼苦成倍復精進之因頌曰由割自身布施苦觀他地獄等重苦了知自苦極輕微為斷他苦勤精進菩薩觀察地獄等趣其身恆為粗猛難忍無量重苦所逼較自割身之苦何止千倍乃於自己割身布施之苦不覺其苦反以自身所受之苦為因為斷他有情地獄等苦起大精進拏錯譯此頌曰由彼割身布施苦觀他地獄等重苦彼由自身所親受為斷他苦勤精進要有如是大意樂力乃可施身未入地前可有彼意樂故說未得地者亦可捨身癸四明施度之差別施者受者施物空施名出世波羅密由於三輪生執著名世間波羅密多捨思為體之施若由了達施者受者施無空無實體之無漏慧所攝持大般若經說名曰出世波羅蜜多到彼岸無得聖根本智是出世智由此所攝持之布施亦得立為出世波羅蜜多其未由無得聖智所攝持之布施即世間施此二之差別在未得勝義菩提心者不能現量決定也彼岸謂生死大海之彼岸即斷盡二障之佛果到達彼岸名到彼岸釋論釋此云若有後句不應減去由此未減業聲故成彼形或是枳顆答羅等故留摩字邊勝喜論師解此云梵語彼岸為波羅到為伊多二語合時於波羅後加第二轉一聲阿摩字於伊多後加初囀蘇字波羅摩伊多合為波羅蜜多時阿摩及蘇雖可減去今依聲明根本文有後句不應減去故雖減蘇字而留阿摩由此未減業聲者謂未減第二囀一聲阿摩字由未減故成波羅蜜多聲或是枳顆答羅等中之波羅摩本是摩字邊今說波羅摩故不應減去此謂減去阿摩之阿而留摩字於彼上加伊字故成波羅蜜多所言初囀蘇字似是悉字之誤更當研究藏人有謂到彼岸之梵語為波壞伊多將壞字之圈平列即成波羅摩伊多結合時加伊字於摩字上減去阿字故成波羅蜜多此類說雖多要以勝喜論師所解為善施者等二句列釋了達三輪不可得慧所攝持之布施波羅蜜多未為此慧所攝持之施等與慧所攝持之波羅蜜多相同故亦名波羅蜜多又彼等雖未為慧所攝持然由回向大菩提之回向所持亦定能到彼岸故亦得波羅蜜多之名是故當知波羅蜜多之義若加業聲則到於彼岸即是已到佛地若加具聲則此能到彼岸即有學位亦有波羅蜜多如釋布施其持戒等由菩提心回向攝持及般若攝持或別或總應知亦爾若於布施三輪猶為實執所縛者經說名世間波羅蜜多修習布施之理謂於菩薩施身及引生殊歡喜等事應先修信解諸餘財施於最上最下之福田下至供水等應相續修積復應以了達三輪不可得之空慧攝相持而修又應緣自身財物及三世善根數數思惟為利有情應修布施更應思惟縱不願施彼等亦必自然壞滅失壞既同則何如自心先施如入行論云身及諸受用三世一切善當為利有情無所惜而施又云捨一切涅槃我心修滅度等是一切捨施有情為勝辛三結說地功德今以無漏慧差別略說此極喜地之功德頌曰極喜猶如水晶月安住佛子意空中所依光明獲端嚴破諸重暗得尊勝此極喜地如水晶珠之月輪此有三義一住高勝處如上所說初地功德住於已得彼德初地菩薩之意住彼高勝道中如月住虛空以初地為彼菩薩意之一分故說住彼意中如眼住於首二令所依端嚴初地之勝義心能使最勝所依之意具足智慧光明而得端嚴如月輪能使所依虛空皎潔莊嚴三能勝逆品初地能勝出自所治品之見所斷障如月輪能破一切重暗初品終釋第二勝義菩提心庚二離垢地分五辛一明此地戒清淨辛二明戒之功德辛三明不與破戒雜住辛四明戒度之差別辛五結明此地功德初中分四壬一明此地戒圓滿壬二明依此故功德清淨壬三明戒比初地增勝壬四明戒清淨之餘因今初彼戒圓滿德淨故夢中亦離犯戒垢彼二地菩薩由戒最嚴圓滿及功德最清淨故非但覺時即於夢中亦不為犯戒之垢所染此又非但不犯根本罪及性罪即一切違越佛制之輕罪亦皆遠離也由不起能令犯戒之煩惱不造一切違越佛制之罪業永息追悔犯戒之火常得清涼故名尸羅多尸是清涼義羅底是得義又以此是安樂之因善士所行故名尸羅此是就文訓釋若就體相言則以能斷身語七支犯戒之能斷思為相又無貪無瞋正見三支是七支能斷思之發起若并發起而言則以能斷十黑業道之十白業道為體壬二明依此故功德清淨云何由尸羅圓滿一切功德得清淨耶頌曰身語意行咸清淨十善業道皆能集由彼菩薩身語意行於醒寐一切時中無微細罪犯所染最極清淨故能修集十善業道圓滿無乏由身修集不殺生等前三善業道由語修集不妄語等中四善業道由意修集不貪欲等後三善業道此復非唯不犯應遮之事於尸羅中所應行者亦皆能圓滿也壬三明戒此初地增勝初地菩薩豈不圓滿修集此十善業道耶頌曰如是十種善業道此地增勝最清淨彼如秋月恆清潔寂靜光飾極端嚴彼雖亦實能修集然不能如二地菩薩所修最勝清淨之十善業道初地之增勝布施此地亦能具足於布施外餘九波羅蜜多中如持戒增勝之量其忍辱等則未能爾故說此地持戒增勝非說無餘波羅蜜多此言十善且以依十善所制之戒為例當知即是總說一切戒律如秋月有二勝法謂能息熱惱銀光皎潔如是住清淨尸羅之菩薩亦有二法極為端嚴謂守護根門威儀寂靜及容色光嚴壬四明戒清淨之餘因若彼淨戒執有我則彼尸羅不清淨故彼恆於三輪中二邊心行皆遠離若苾芻於別解脫戒最極清淨而不能除諸法有自性見則彼尸羅終不能清淨名為破戒似善持戒如寶積經云迦葉若有苾芻具足淨戒以別解脫防護而住軌則威儀皆悉圓滿於諸小罪生大怖畏善學所受一切學處身語意業清淨圓滿正命清淨而彼苾芻說有我論迦葉是名第一破戒似善持戒乃至迦葉若有苾芻具足修行十二杜多功德而彼苾芻見有所得住我我所執迦葉是名第四破戒似善持戒說有我論即是見有所得而復說住我我所執者莫以共許之薩迦耶見解之當知此說不斷執我我所有自性也初句之彼字非指前頌所說一切菩薩拏錯譯云若戒清淨見自性由此彼是破尸羅譯為由此彼較善由不斷除有所得見尸羅終不清淨故二地菩薩離破戒時於誰有情修何對治由誰能離之三輪皆能遠離有事無事等二邊心行執有自性也辛二明戒之功德分五壬一明於善趣受用施果必依尸羅壬二明生生展轉受用施果必依尸羅壬三明無尸羅難出惡趣壬四明施後說戒之理壬五尸羅為增上生决定勝之因今初已別說菩薩圓滿淨戒今當通說淨戒功德較布施等為大是一切功德所依頌曰失壞戒足諸衆生於惡趣受布施果彼修施者若能具足淨戒當於人天中感最圓滿之財位然有墮惡趣中而受圓滿大財位者如獨一地獄龍象等畜類及大力鬼類由彼衆生修施而失壞戒足之所感也故若無淨戒則布施之大財位果不於善趣成熟而成熟於惡趣諸有欲於善趣身成熟施果者則須善持淨戒也壬二明生生展轉受用施果必依尸羅生物總根受用盡其後資財不得生若無淨戒則於惡趣身中成熟施果彼唯能受用往世布施之果最極愚蒙不知新修布施等若將前生布施之果用盡則生物總根亦盡彼補特伽羅此後更難得感生資財也如有人見下少種可得大果為得後果故更下多種則其果聚增長不絶若癡人不知下種以種為食則必不能令果增長不息也壬三明無尸羅難出惡趣失壞戒足墮惡趣者非但難得財位相續增長即再出惡趣亦屬不易頌曰若時自在住順處設此不能自攝持墮落險處隨他轉後以何因從彼出若時隨自欲樂自在不依賴他住人天趣隨順之處如勇士住於順處脫離繫縛設此補特伽羅不能善自攝持不墮惡趣則如勇士被他所縛投山澗中若墮惡趣險處後全無自在隨他力轉彼更以何因能出彼惡趣耶以惡趣身修善少而造惡力強故唯當流轉惡趣如十地經云假使後生人中亦當感二種果報此說難得再生人中故知當於現在善自攝持莫墮惡趣復當竭力嚴持淨戒也壬四明施後說戒之理是故勝者說施後隨即宣說尸羅教尸羅田中長功德受用果利永無竭由破戒是感惡趣等衆患之本故戰勝一切罪惡者為令布施等功德不失壞故於說布施後即說持戒之教戒如良田為一切功德之所依若於尸羅田中長養施等功德使施等因與身財等果展轉增長永無間竭乃能長時受用多果此說凡修布施者不應專以能感圓滿資財為念要當籌量以何等身受用彼果如何乃能使彼資財多生相續則知持戒為勝方便也初發業菩薩雖以利一切有情為得佛道之心須勤修布施然亦須於善趣身成熟布施之果復須多生相續受用故亦以持戒為因以無此善趣身則不具修菩薩行之順緣也壬五讚尸羅門為增上生决定勝之因若諸異生及語生自證菩提與佛子增上生及决定勝其因除戒定無餘得善趣身及於彼身長時受用布施之果固有賴於戒即得决定勝果亦以戒為必要故諸異生未入聖道者其能得善趣增上生之因及從佛語生之聲聞自證菩提之獨覺并諸佛子菩薩其能得菩提决定勝之因淨戒以外定無餘事也然此非說唯戒是因餘皆非因以尚有多因非戒所攝者是說得增上生及决定勝必不離於戒離淨戒必不能得也十地經說殺生等十不善業道各分上中下三品如次能感地獄畜生餓鬼後設生人中殺生者得短命多病二種果報餘九不善亦各得二種不可愛樂果報十善業道則能感生欲界人天乃至有頂其上若有心意狹劣唯求自利怖生死苦闕大悲心從他聲聞了達無我以此智慧修十善業成聲聞乘其上若有於最後生不從他教志求獨覺菩提不具大悲方便解悟甚深緣起修治清淨十善業道成獨覺乘其上若有心廣無量具悲愍方便立大誓願不捨衆生求諸佛廣大智慧修治清淨十善業道能淨治菩薩諸地修一切諸度成就菩薩極廣大行本頌即攝彼經義親友書亦云仁者於戒勿破羸莫雜莫染當淨修佛說戒為衆德本如情非情依止地此說學戒最為重要以是淨戒雖在二地時說然初發業菩薩皆當修學防止十不善業乃至莫令起犯戒心修此律儀戒極為重要當如上來所說而正思惟每學戒時當以無所得慧攝持而修若僅了其義或略修數次則無大益故必須相續思惟也若能相續修者則於所學菩薩大行即使初聞生於憂怖念昔諸佛亦久未能修者自心亦能任運而修也如無邊功德讚云世聞何法生怖畏佛亦久遠未能行然佛修習得任運功德不修難增長辛三明不與破戒雜住猶如大海與死尸亦如吉祥與黑耳如是持戒諸大士不樂與犯戒雜居譬如大海由諸清淨龍神居止之力凡有死尸即以波浪漂出不與死尸共住又諸吉祥圓滿不與黑耳不吉祥共住如是持戒清淨之二地大士亦不樂與犯戒者共住也四百論釋說吉祥女所在之家亦必有黑耳在內彼與本論無違以彼意取有彼名之二人本論則說黑耳是不吉祥之異名也辛四明戒度之差別由誰於誰斷何事若彼三輪有可得名世間波羅蜜多三著皆空乃出世由誰能斷於誰有情所斷及斷何所斷事若於彼三輪不能減除見為實有可得之種子則說如是之尸羅名為世間波羅蜜多即彼尸羅若於上說三輪實執空不可得由了達不可得之無漏慧所攝持者是名出世波羅蜜多故尸羅中有此二種差別辛五結明此地功德佛子月放離垢光非諸有攝有中祥猶如秋季月光明能除衆生意熱惱如秋月光明離諸垢障能除衆生意中熱惱如是二地佛子月輪所放之尸羅光明離破戒垢故第二地名離垢名實相符亦能除遣衆生意中由破戒所生之熱惱也又此二地菩薩不屬生死流轉故非三有生死所攝然是三有中之吉祥以一切圓滿功德皆隨此菩薩而轉為利衆生以大願力得為王四大洲之轉輪王也釋第三勝義菩提心之一庚三發光地分四辛一釋地名義辛二釋地功德辛三明初三度之別辛四結明此地功德今初火光盡焚所知薪故此三地名發光入此地時善逝子放赤金光如日出此菩薩第三地名發光以得第三地時發智慧光盡焚一切所知之薪此是於根本定位放寂諍光明能滅一切二取戲論也又善逝子得第三地時生智慧光明如日將出先現赤金色光明此是第三地後得位見赤色或黃色光遍一切處寶鬘論亦云三地名發光發靜智光故起靜慮神通永盡貪瞋故由此地異熟常作天中王增上行忍進能遣諸欲貪辛二釋地功德分四壬一明此地忍增勝壬二明餘修忍方便壬三明忍度之差別壬四明此地餘淨德今初為顯得如是智慧光明之菩薩忍波羅蜜多最為增勝頌曰設有非處起瞋恚將此身肉并骨節分分割截經久時於彼割者忍更增已見無我諸菩薩能所何時何相割彼見諸法如影像由此亦能善安忍前說之布施持戒增勝此地亦具足故此是於餘八波羅蜜多中忍偏增勝增勝者謂修忍度已最超勝修餘七度猶未能爾又此三地菩薩已得焚所知薪之寂靜智火故能善護他心設有人焉於實非可瞋之處即於我及我親已損今損當損如斯三業皆不行者而竟瞋恚菩薩割截其身非僅割肉并割其骨節非大塊而分分割非一次而數數割非短時而久時割菩薩於彼割者非但心不恚惱且知依彼罪業因緣當墮地獄等處受極重苦故於割者更生極大之安忍由此可知極喜等二地於割身者雖亦心不恚怒然無更增上之安忍安忍增勝實從此地始此是由悲而忍下是由慧而忍又此三地菩薩非但由見地獄等重苦而起增上安忍由觀己之身誰是能割何為所割於何時割以何相割現見三輪諸法皆如影像及離妄計我我所想故彼亦能善修安忍釋論謂亦字為攝安忍之因意謂非但前因能不恚惱即由此第二因亦能安忍也壬二明餘修忍方便分二癸一明不應瞋恚癸二明理應修忍初又分四子一明無益有損故不應瞋子二明不欲後苦則不應報怨子三明能壞久修善根故不應瞋子四明當思不忍多失而遮瞋恚今初又此安忍非僅地上菩薩相應之行亦是地前餘人保護一切功德令不壞滅之因故諸未能安忍者皆應遮止瞋恚也頌曰若己作害而瞋他瞋他已作豈能除是故瞋他定無益且與後世義相違若他已作損害緣此瞋他能作害者其所作之損害已不能除豈緣彼人起內心之憤恚其已作之損害能得除乎內心憤恚即粗暴心與瞋義同又此瞋恚非但無益且與後世之義利相乖若容許瞋恚身壞命終必將引發非愛異熟也子二明不欲後苦則不應報怨頗有癡人現受往昔自作惡行所感苦果妄謂他人損害於我遂於能害者發瞋恚心而行報復却願後世不更受彼損害為遮此執故頌曰既許彼苦能永盡往昔所作惡業果云何瞋恚而害他更引當來苦種子怨敵現於自身所作大苦是由往昔造殺生等諸不善業於三惡趣受苦異熟今乃所餘等流殘果由此因緣能使一切苦等流果皆悉消滅既許彼苦能令餘業皆悉永盡云何復起瞋恚心而思報害於他更引當來遠勝現苦之大苦種子如醫師為治重病作刀割等苦理應忍受如是為治未來無邊大苦忍現前小苦極為應理子三明能壞久修善根故不應瞋分二丑一正義丑二旁義今初又此不忍非但是能引不可愛異熟之因亦是能壞多劫所修福德資糧之因頌曰若有瞋恚諸佛子百劫所修施戒福一剎那頃能頓壞故無他罪勝不忍若菩薩大士於已發菩提心之佛子或不知彼是菩薩或雖知之然由上品煩惱串習增益其過失隨實不實發瞋恚心一剎那頃尚能摧壞百劫所修福德資糧如前所說由修施戒波羅蜜多所生善根况非菩薩而瞋菩薩如大海水不可以稱瞋恚菩薩之異熟量亦不可知故能引不可愛果及能壞善根之罪惡更無大於瞋恚不忍之心者也增益真實過失者疏謂於微小過增益為大過其摧壞善根之相如曼殊室利遊戲經云曼殊室利以能壞百劫所修善根故名瞋恚此經於能瞋所瞋之是否菩薩雖未說明而釋論於能瞋所瞋則俱說是菩薩如集經論於引彼遊戲經之前先引彌勒獅子吼經云若有菩薩於三千大千世界一切衆生打罵割截菩薩非由此故便生瘡疱若有於餘菩薩下至起損害心起株杌心起瞋恚心菩薩由此因緣即生瘡疱何以故若彼菩薩未捨一切智者由此菩薩於彼菩薩起損害心起株杌心起瞋恚心隨起心數當於爾許劫中重披誓甲此論說能瞋所瞋俱是菩薩即依此經而說也若爾馬鳴及靜天云千劫所修集布施供佛等一切諸善行一瞋悉能壞皆說能壞一千劫中所修善根復云何通答入行論疏有說多千劫中所修善根由瞋衆生即便摧壞實難信受彼二論師於能瞋所瞋雖未明說然能壞百劫或千劫所修善根之瞋恚其所瞋境必要菩薩其能瞋者觀釋論說菩薩大士一語則能瞋之菩薩似較所瞋菩薩力大其能瞋菩薩定是異生所瞋之境則有登地未登地之二類如是便有大力菩薩瞋力弱者力弱菩薩瞋強力者能瞋所瞋力相等者共成三種其中初者壞百劫善根若非菩薩而瞋菩薩則壞千劫善根極為明顯至於第二第三兩種由所瞋境之勝劣差別摧壞善根之量亦當依據聖教更為觀察從於三千至非由此故便生瘡疱是明菩薩於非菩薩心生瞋恚口出惡言身行捶既與損傷菩薩不同亦知不須重披誓甲若此菩薩於他菩薩即使身語未動唯發瞋恚亦須隨彼興心之數經爾許劫重披誓甲此所瞋境是已得授記之菩薩其能瞋者則是未得授記者如般若頌云若有菩薩未得記瞋恚門諍得記者隨彼惡心剎那數重經爾劫披誓甲重披誓甲者如上品資糧道菩薩本能疾入加行道若瞋已得授記者則隨瞋恚心數於爾許劫中不能入加行道更當修行也又入行論云若於佛子施主所設有發生罪惡心佛說應隨惡心數墮地獄中經爾劫此說隨瞋菩薩之心數經爾許劫恆處地獄亦有摧壞多劫所修善根之過患也若未得授記者瞋已得授記者有二過患謂如上說恆墮地獄及經爾許劫重披誓甲若作精研經所說謗法之業於七年中每日三時勤修懺法其異熟果雖可清淨然得忍位最快亦須再經十劫若能多門勤修懺悔雖進道遲緩不可補救然異熟果猶可清淨故當策勵而行也丑二旁義又能瞋所瞋俱非菩薩若發瞋恚亦有壞善根者如集學論引說一切有部之經云諸苾芻見此苾芻發淨信心以一切支頂禮如來髮爪塔否白言大德已見諸苾芻如此苾芻隨身所覆下至金輪八萬四千踰繕那量盡其中間諸塵沙數今此苾芻當得千倍轉輪王位乃至具壽塢波離頂禮世尊恭敬合掌而白佛言世尊說此苾芻修集如是廣大善根世尊如是善根由何令其微薄損減乃至永盡塢波離若於同梵行所互生瘡疱我不見彼更有福德塢波離由此能使如是廣大善根微薄損減乃至永盡塢波離由是當知於諸枯木尚不應起損惱之心况於有情之身言微薄者如彼善根原能引生極圓滿果今令微小能長時引生妙果今令短少非壞一切果是下品盡言損減者是中品盡言永盡者是上品盡集學論引月燈三昧經云若有互起損害心持戒多聞不能救或修靜慮住練若布施供佛亦難救言互起者謂同梵行者持戒等六不能救者謂不能遮止瞋心壞諸善根所壞善根彼經未明說入行論說是布施及供佛等入中論則說是布施及持戒所生釋論中說是福德資糧似非通達無我之善根也若爾集經論引無盡慧經說如滴水落大海中乃至大劫未壞以來終不窮盡如是善根回向菩提乃至未證菩提以來亦不窮盡華嚴經亦說如有藥汁名訶宅迦以一兩藥變千兩銅皆成真金非千兩銅能變此藥如是一切業煩惱銅亦不能變菩提心藥故菩提心及彼攝持之善根并回向菩提之善根等應非瞋恚心所能壞答非爾釋說能壞菩薩大士之善根故當知前經之義是說生果無盡非說瞋恚不能使盡第二經義是說依止菩提心能斷盡惑業惑業則不能斷盡菩提心也又摧壞善根之義有說是壞衆善速能感果之功能令其遲緩先生瞋恚之果非謂後遇緣時亦不能生自果彼世間道尚不能斷所治種子則諸煩惱定不能壞善種子也破彼因不定異生以四力對治懺不善業雖非斷不善種子然後縱遇緣亦定不感異熟果證加行道頂忍位時雖非永斷邪見種子及惡趣因不善種子然後遇緣亦定不起邪見及墮惡趣又如俱舍論引經云諸業於生死隨重近串習隨先作其中即前前成熟任何善不善業凡是先成熟者則必遮止他業暫不成熟故僅由此義不能安立為壞善根或斷不善經論亦未有作如是說者不則凡是強力不善業皆應說為能壞善根者矣故當如中觀心論釋說以四力淨治不善以邪見及瞋心壞諸善根後縱遇緣亦不能生果如壞種子遇緣亦終不生芽又壞善根非是起瞋無間即令善根消失乃壞彼感果之力此復如上有上中下三品盡相隨所壞之限彼即不復成熟也如是破壞之相有二謂壞速生新道之功力及壞感生善果之功力又集學論說於菩薩所瞋恚輕毀惡心誹謗過失無邊釋說隨知不知彼是菩薩所瞋因相隨實不實過患相同故總於一切瞋恚別如緣同梵行者及諸菩薩所起瞋恚應當盡力滅除也虛空藏經說諸根本罪能壞往昔所修善根集學論說由增上貪著利養恭敬若顧戀家庭若起增上慢若謗正法亦能壞盡往昔所修善根令諸善法不更增廣故應了知摧壞善根之緣盡力斷除此但略舉少分當閲集經論與集學論子四明當思不忍多失而遮瞋恚復次無力者不忍徒為自害若有勢力無悲愍者則俱害自他頌曰使色不美引非善辦理非理慧被奮不忍令速墮惡趣才生不忍時便使顏色不可愛樂引成非善劫奪智慧不能辨別是理非理又由不忍瞋恚之力令命終後速墮惡趣應思惟此諸過患滅除瞋恚不使瞋恚生起也
