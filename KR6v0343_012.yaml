body:
  text: 宗喀巴大師造釋第六勝義菩提心之九卯五明他宗無係屬尋求我執所緣假我義有計為五蘊有計為唯心者若如彼宗則至自身有諸蘊時即應有補特伽羅我執生起以計我執所緣之我義是尋求所得而立彼即補特伽羅我執所依境是有事故頌曰證無我時斷常我不許此是我執依故云了知無我義永斷我執最希有汝計現證補特伽羅無我時唯斷除常我然不許此常我是俱生我執薩迦耶見所緣行相任何所依境故云唯見無此常我修習彼智使能永斷無始傳來之我見噫汝此事可謂最希有矣計唯見無有常我即能斷無始我執當以世喻明其毫無係屬頌曰見自室壁有蛇居云此無象除其怖倘此亦能除蛇畏噫嘻誠為他所笑有諸愚人見自室壁中有蛇居住甚可怖畏餘人告曰汝勿恐怖此室無象若謂由知彼室無象非但能除象怖亦能除蛇畏者噫嘻誠為智者所竊笑也若有毒蛇恐怖因緣唯因他語由知無象便安間居住不知恐怖不作除彼恐怖之方便則定遭蛇噬如是僅見無如象之常我若謂修習彼義亦能斷除無始傳來如蛇之我執恐怖便安間而住者必不能除緣五蘊之我執薩迦耶見故彼補特伽羅亦定不能解脫生死此顯自他各部諸欲決擇諸法真實義者由不知破除俱生我執所執境而作決擇餘真實義之建立皆徒勞無果故知此義至為切要寅三破能依所依等三計分二卯一正破三計卯二總結諸破今初已説我與五蘊自性一異不成今説我蘊亦無自性更互相依頌曰於諸蘊中無有我我中亦非有諸蘊若有異性乃有此無異故此唯分別於諸蘊中無有自性能依之我於我中亦非有自性能依之諸蘊何以故若蘊與我有自性成就之異性乃可有此自性成就之能依所依二種分別然實無自性成就之他性故此自性成就之能依所依唯是顯倒分別之所安立喻如世間盤酪異性乃見能依所依我與諸蘊未見是事故能依所依都無自性也我亦非自性有五蘊頌曰我非有色由我無是故全無具有義異如有牛一有色我色俱無一異性亦不許我自性有色蘊何以故以我與諸蘊自性一異皆已破訖是故我與諸蘊無自性具有義以具有之因緣異性者如云天授有牛不異性者如云天授有色然我與色俱無一性異性故我亦非自性有色也破自性有餘四蘊應知亦爾卯二總結諸破今當總結以上諸破由行相所緣顛倒數量門明薩迦耶見頌曰我非有色色非我色中無我我無色當知四相通諸蘊是為二十種我見色非是我而見為我我非自性有色而見為有色我自性不在色中色亦不在我中而見相在如於色蘊所説四種薩迦耶見當知於受等四蘊皆有四見是為二十種薩迦耶我見若謂此加我異色蘊見於一一蘊可作五類觀察中論亦云非蘊不離蘊此彼不相在如來不有蘊何處有如來應成二十五種我見云何只説二十種耶曰二十種薩迦耶見是經所建立建立之理謂薩迦耶見若不先取五蘊必不能起我執故由四相緣慮諸蘊執以為我執離五蘊第五相為我者唯諸外道乃起彼執故經不説第五事中論説第五異品者當知是為破外道而説也經言以金剛智杵摧壞二十種薩迦耶見高山證預流果此義頌曰由證無我金剛杵摧我見山同壞者謂依薩迦耶見山所有如是衆高峯薩迦耶見山以我為所緣執有自性為行相未以聖金剛智杵摧壞之前始從無始生死而有從無明地基之所發起日日增長煩惱巉巖竪窮三界橫遍十方經現證無我金剛智杵摧壞之後與所摧我見同時摧壞者謂依根本薩迦耶見山而住即前所説五蘊各有四相之二十種高峯也釋論譯為與最高峯同時壞者當知彼等即是高峯今如頌譯謂與根本薩迦耶見同時又俱生薩迦耶見我執都非前説二十種見攝故論云依薩迦耶見山謂二十種薩迦耶見高峯依止根本薩迦耶見而住然預流果所斷與二十種見同時之根本薩迦耶見亦是分別我執彼非僅執我是有自相且計彼執為應正理是依邪宗所薰之種子為預流所斷也寅四破不一不異之實我分二卯一敘計卯二破執今初今為破正量部所計實我頌曰有計不可説一異常無常等實有我復是六識之所識亦是我執所緣事正量部有云由離諸蘊無我故之理我與諸蘊非是異性亦非即蘊為性若是則我應有生滅故故我與五蘊一性異性俱不可説亦不可説我是常無常然計彼我是實物有以是能作二業者與能受苦樂二果者及是繫縛生死者與解脫涅槃者故復計彼我是六識之所識亦計彼我是我執所緣事也卯二破執此計實有補特伽羅亦不應理頌曰不許心色不可説實物皆非不可説若謂我是實有物如心應非不可説如不許心與色是一性異性俱不可説法則諸實物皆非不可説者若謂我是實物則應如心非是一異俱不可説也此頌已明不可説者定非實有次顯假有補特伽羅頌曰如汝謂瓶非實物則與色等不可説我與諸蘊既叵説故不應計自性有如汝謂瓶非是獨立之實物則計彼體與色等支分不可説是一性異性如是彼我既與諸蘊是不可説一性異性之假有故不應計補特伽羅為自性有也如是二頌已破實有成立假有今當更述一異為實法所依以我非所依破我實有頌曰汝識不許與自異而許異於色等法實法唯見彼二相離實法故我非有若如汝計我實有者如汝內識不許與自體相異則補特伽羅亦定不異自體即可説為一又如汝識許與色等為相異法則補特伽羅亦可説與諸蘊相異也凡諸實法決定唯見彼一異二相故我非實有以離一異實法理故寅五明假我及喻分四卯一明七邊無我唯依緣立如車卯二廣釋前未説之餘二計卯三釋妨難卯四餘名言義均得成立今初如上觀察實有補特伽羅不應道理頌曰故我執依非實法不離五蘊不即蘊非諸蘊依非有蘊故我執所依非有自性之實法以觀察時我非離蘊別有異體諸蘊總別亦非是我我非諸蘊之所依蘊在我中亦非以蘊為我所依我在蘊中我亦非自性能有諸蘊也是故內教諸部隨計假我或計我非勝義可得然皆不應計如上行相頌曰此依諸蘊得成立此我唯依諸蘊即得成立也如為不壞世俗諦故唯許依彼因緣有此法生然不許無因生等四邊生如是觀察我時其許依蘊假立我者雖破上述有過五計然為使世間名言得安立故亦許依止諸蘊假立之我現見有名言假立之我不可強撥為無也為顯所説假我之義復説外喻頌曰如車不許異支分亦非不異非有支不依支分非支依非唯積聚復非形如不許車異自支分亦非是一全不相異又非自性有彼支分自性不依支分支分亦不依車亦非唯支積聚復非支分形狀我與五蘊當知亦爾卯二廣釋前未説之餘二計分二辰一正義辰二旁通初中又二巳一破計積聚為車巳二破計唯形是車今初初五計如前説此當別破計聚為車與計形為車頌曰若謂積聚即是車散支堆積車應有若謂車支積聚即是車者則車拆散之支堆積一處亦應有車前雖已破車聚為有分此中説者是為顯示所餘過失復有過失頌曰由離有支則無支唯形為車亦非理由離有支則無支分故支分亦非有以彼諸部自許無有支車故若謂彼等許支聚為有分諸支為分亦可如是許支與有支故彼非許無有支也曰無過以自宗中如蘊若別若總皆是所取非能取者如是車之支分若零若聚亦俱安立為支不安立為有支彼等諸部不許離聚之有支聚已破故頌中亦字攝未明説之積聚謂唯支形為車不應道理當知唯聚為車亦不應理巳二破計唯形是車復次若汝計唯車形是車者為是一一支分之形耶抑是積聚之形耶若謂如前者為是不捨未成車時原有之形耶抑是捨棄原形別有餘形耶若謂如前且不應理何以故頌曰汝形各支先已有造成車時仍如舊如散支中無有車車於現在亦非有如汝所許車輪等一一支分如先未成車時所有形狀後造成車時仍如舊者是則如未造車前分散之支中全無有車現在支分積聚之時車亦應非有以汝唯以各支形狀立為車故各支形狀前後無差別故若如第二義謂不同先形後生餘形以為車者頌曰若謂現在車成時輪等別有異形者此應可取然非有是故唯形非是車若謂現在車成之時輪軸轄等車衆支分方長圓等各別形狀與未成車前別有不同者則此各支之不同形狀眼識應有可取然實非有故唯各支之形狀仍非是車若謂輪等支分合積之特殊形狀乃立為車亦不應理頌曰由汝積聚無所有彼形應非依支聚故以無所有為依此中云何能有形若所言積聚有少實體乃可依彼假立形狀然所言支聚無少實體由汝積聚都無所有無少實體故彼形狀應非是依支聚假立以汝宗説假有諸法要以實法為所依故汝亦許支聚是假有故此觀察車時云何能以都無所有無少實體者為所依事而安立有車之形耶此中僅説敵者計假有諸法要以獨立實有諸法為所依事乃能假立復許積聚與形狀俱是假有今若計積聚為形狀所依事則自成相違然亦應知如人之形色不可安立為人如是車之形色亦不可安立為車以彼二法俱是車之所取故辰二旁通若謂積聚雖假有非實然即依彼安立不實假有之形頌曰如汝許此假立義如是依於不實因能生自性不實果當知一切生皆爾如汝許此依假有積聚安立假有形狀如是應知依於無明與種子不實之因能生諸行與苗芽自性不實之果其餘一切自性不實之因果當知皆如是生則於無肉可食之物影假鹿徒費百千辛勞強執實有此復何為頌曰有謂色等如是住便起瓶覺亦非理內教多説如瓶之色等八微合積而住即是瓶故於彼上便起瓶覺以此車喻即能破除故彼説亦非理復次頌曰由無生故無色等故彼不應即是形由前已説無自性生故色等亦無自性由計瓶等有實法為因不應道理是故瓶等不應即是色等之形狀差別卯三釋妨難問若以所説七相道理求車之假立義都非有者則車亦應無世間由車假立之名言皆應斷絶然此不應理現見世云取車買車造車等由是世間所共許故車定當有曰此過唯汝乃有此是我為汝所立者汝計要觀察車假立義乃安立車若不觀察不許有餘能安立車之方便若於七相求假立義則取車等世間名言於汝宗中云何得有此是論師答彼妨難現在藏地講應成者謂七相尋求若不得車則不能安立車是中觀宗之攻難當知是以惡分別水污此清淨宗義也我宗則無彼過頌曰雖以七相推求彼真實世間皆非有若不觀察就世間依自支分可安立雖以七相推求彼車之假立義隨於真實勝義或於世間世俗皆不得有彼車若不觀察此車之假立義唯就世間名言如立青與受等即可依輪等支分安立為車如許緣起性亦許此車依自支分假設立故故於我宗取車等世間名言無不應理彼等亦應許此義也此説不以推求車假立義而安立為車之中觀宗許有世間名言即彼宗亦應許非是難他之過自不能免便云我無所許也卯四餘名言義均得成立此中觀宗依世間所許非但成立名言為車即車之諸名差別皆可不推求假設立義唯依世間所許而自許也頌曰可為衆生説彼車名為有支及有分亦名作者與受者可為衆生宣説彼車觀待輪等諸支名為有支觀待輪等諸分名為有分又即彼車觀待有取輪等之作用名為作者觀待所受色等事亦名受者復有倒解佛經義者而更倒説世間世俗謂只有支聚離支聚外決無有支以異支聚之有支不可得故如是復説只有分業所取等聚離彼之外決無有分作者受者以異彼之有分等不可得故若如彼宗即以彼説無有支之因其支聚等亦皆非有頌曰莫壞世間許世俗故應遮止莫妄破壞世間共許之車等世俗也內教大小諸部計支聚等即有支者因見不以彼等立為有支更無異彼等之有支便不能安立有作用之有支等故作是計由彼等推求有支等假立義若無可得即不知安立彼等故彼不許車等唯假名安立而計車等為自性有故釋論説彼等是倒解經義者此宗則説若支積聚若支分離皆非有支然唯假名之有支等亦善安立其作用是為此宗解釋經義亦是如來不共意趣故有智者當善學此宗解經之理寅六明此建立易除邊執之功德分五卯一正義卯二釋難卯三車與我名法喻相合卯四明許有假我之功德卯五明凡聖繫縛解脫所依之我今初此世間世俗若以推求假立義之七相觀察都無可得若不觀察唯依世間共許則皆是有故瑜伽師以此次第如前觀察我及車義速能測得真理底蘊所以者何頌曰七相都無復何有此有行者無所得彼亦速入真實義故如是許彼成立若車有自性以七相推求於七相中定當有所得但瑜伽師都不能得此車是有以七相推求都無所得復云何可説是有自性故瑜伽師生是定解言車有自性唯是由無明翳障蔽慧眼者之所妄計其自性實無所有即由彼理速易悟入真實義性亦字攝亦不失壞世俗建立故此中觀宗時即如是許彼車成立之理謂不觀察釋論説諸善巧中觀宗者當知前説此宗全無過失唯有功德決當受許故當自許此無過宗不應避過謂此無宗卯二釋難問諸瑜伽師如前觀察雖不見有車然見有彼支聚此應有自性答汝於燒布之灰中尋求縷線誠屬可笑頌曰若時其車且非有有支無故支亦無若時車無自性由有支無自性故其支亦無自性若謂車拆毀時其車輪等聚豈非可見云何可説由無有支亦無支耶曰此亦不然其執車拆散之支聚為車支者是由先見彼支與車相屬乃知輪等是車支分餘先未見如是相屬者則定不知彼人却見輪等觀待自支而知輪等自為有支由彼人全不曾見輪等係屬於車故亦不知彼等是車之支也復次若車無自性則彼支分亦無自性當以喻明頌曰如車燒盡支亦毀慧燒有支更無支喻如火燒有支車則諸支分亦皆燒毀如是諸瑜伽師若以觀察所發無所得之慧火燒盡有支車之自性則成為慧火柴薪之支分亦定不能存其自性必為慧火之所燒毀卯三車與我名法喻相合如為不斷滅世俗諦故諸瑜伽師速能悟入真實義故觀察車義立為假有頌曰如是世間所共許依止蘊界及六處亦許我為能取者所取為業此作者如是由世間共許門依止五蘊六界及六處等亦許我為能取者是依彼等安立我故如是亦可安立所取五蘊為作業此我為作者卯四明許有假我之功德若安立我為假有則非堅不堅等邊執分別之所依故計常無常等有自性之分別皆易遣除頌曰非有性故此非堅亦非不堅非生滅此亦非有常等性一性異性均非有此依諸蘊假立之我若堅不堅皆無自性若我為自性不堅則我與所取應無異性即所取為我若果爾者則我一一剎那應是自性各別生滅是則前後全無係屬又所取法應成能取故不應理如是若謂常住堅固亦不應理我若常者應前生之我即現在我又前世我與現在我所取諸蘊自性各異則我應非一以離所取無異體之我故中論曰若五蘊是我我即為生滅釋論云可知龍猛菩薩許非生滅二種差別此言生滅謂有自性者此我亦非自性有之常性等四中論觀如來品云寂滅相中無常無常等四又此我亦非自性有之一性異性此等之理由謂非有自性我故如經云世間依怙説四法無有盡謂有情虛空菩提心佛法若彼法實有寧不有窮盡無實不可盡故説彼無盡經説有情無實故無窮盡即此證也卯五明凡聖繫縛解脫所依之我七相推求假立我義常無常等決定非有若不見我是無自性由無明力執有自性以薩迦耶見執著我有自性則流轉生死頌曰衆生恆緣起我執於彼所上起我所當知此我由愚癡不觀世許而成立推求我時外道求我之理由見即蘊是我不應道理故倒執我性異蘊內教諸部則見離蘊別無異我故倒執唯蘊是我意謂彼二必須許一也諸正解經義者了知前二俱無有我而得解脫人鬼旁生等一切衆生恆緣我事起我執心及緣此我所自在事或屬我事謂我施設所依之眼等內法及諸外事於彼我所上起我所執心當知彼我是由不觀察世間共許愚癡無知而成立非有自性此我雖無自性然由愚癡無知假名為有諸瑜伽師見如是我畢竟不可得我若不可得則彼自性我所取之眼等亦不可得諸瑜伽師由見我我所事都無自性可得故解脫生死中論云若內外諸法我我所皆滅諸取亦當滅取滅故生滅丑二破我所有自性云何我無自性我所亦無自性頌曰由無作者則無業故離我時無我所若見我我所皆空諸瑜伽師得解脫若無作者陶師則無作業之瓶故我無自性則我所亦無自性若瑜伽師見我與我所皆自性空修習彼義定能解脫生死若見色等皆無自性可得則緣色等自性之貪等煩惱皆當隨滅聲聞獨覺便能不受後有而般涅槃諸菩薩衆雖見無我然由大悲增上至未證菩提恆生三有以是大小二乘最勝道故諸有智者應當勤求如是無我子三觀我及車亦例餘法分三丑一例瓶衣等法丑二例因果法丑三釋難今初如我及所取唯是假立與觀察車相同如是觀察餘法亦爾頌曰瓶衣帳軍林鬘樹舍宅小車旅舍等應知皆如衆生説由佛不與世諍故所有瓶盂衣服帳幕軍隊森林珠鬘樹木舍宅小車旅舍等物若以觀察車之道理七相推求各各假立之義俱無所得若不觀察只就世間共許則皆容有如是此類諸法應知皆如衆生言説不加觀察唯就世間共許而有何以故以佛世尊不與世間起異諍故如寶積經三律儀會云世與我諍我不與世諍此説世間名言所安立者佛亦許有故不應違害世間所許也世間如何安立諸法名言頌曰功德支貪相薪等有德支貪所相火如觀察車七相無由餘世間共許有如瓶是有支瓦礫等是支瓶是有德紺青花紋等是德貪著可愛境之有情是有貪緣有漏可愛境增上染愛名貪瓶是所相鼓腹翻口長項等是瓶之能相火是能然薪是可然等要依於支乃立有支依於有支乃立名支如是乃至火與薪等皆是相依假立若以七相推求彼等假立之義雖無可得然仍可安立為有者當知是由世間名言而立非以觀察實義正理而立也丑二例因果法不但支等是相待立即因果二法亦是相待安立頌曰因能生果乃為因若不生果則無因果若有因乃得生當説何先誰從誰要因能生果彼能生法乃可為因若不生果既不能生則果應無因果法亦要有因乃從彼生故因果二法亦是相待而有非自性有若謂因果是自性有者汝且當説因果二法何者居先為是何法由何法生若有自性説因在先不應道理以於因時要有所待果故説果居先亦不應理成無因故以是當知因果唯是假立相依而有非自性有如車復次若謂因自性能生果者為與果合而生為不合而生頌曰若因果合而生果一故因果應無異不合因非因無別離二亦無餘可計汝若謂因與果合而生果則因果力應一如江與海合若成一者不能分別此法是因彼法是果因果無異故復謂何法生於何法也若謂不合而生則所計之因與諸非因應無能生不能生之差別以自性各別諸法無關係故又計因果有自性者能生所生離合不合二計之外亦無餘第三類可計故自性因定不生果故又頌曰因不生果則無果離果則因應無因汝若轉計自性因不生果者則果應無自性由生果故乃安立因為因若離果亦可安立因者則應無安立因之因相此非汝許故因果二法非有自性若爾汝宗云何頌曰此二如幻我無失世間諸法亦得有若如他宗能生所生皆有自相則當觀察因果二法為合不合俱有過失若如我宗諸法皆由虛妄遍計增上而生唯由名言分別假立故因果二法如同幻事自性不生雖無自性然是名言分別安立之境如眩翳人所見毛輪不可思維與計因果有自性者犯過相同故我無有所説合不合之過失世間所許不觀察諸法因果及車等亦皆得有故一切皆成釋論此處破因果法於所破上加自性等簡別是説許無自性者不犯彼過不應不辨有自性與有之區別專作相似之答難也丑三釋難分二寅一難破因果過失相同寅二答自不同彼失今初此中破因果自性他作是難觀因生果為合不合汝同犯過何則頌曰能破所破合不合此過於汝寧非有汝此能破與所破法為合為破為不合而破此過於汝寧非亦有若合而破則應成一復謂何法破於何法若不合而破則一切法同是不合皆成能破不應道理離此二外更無第三可計則汝之能破都無破除所破之力由汝能破既已被破則因果法是有自性頌曰汝語唯壞汝自宗故汝不能破所破由汝所説之似能破唯能壞汝自宗故汝不能破除他宗之所破也復次頌曰自語同犯似能破無理而謗一切法故汝非是善士許汝是無宗破法人汝為敵者所出過失自語亦同犯彼過唯以彼似能破則無正理而毀謗一切法故汝非是善士所許可者何則汝説若不合而生則一切同是不合者皆應能生然彼不能生此有何正理如磁石未合唯能吸引可引處之鐵不引一切不合之鐵如眼不合唯見可見處之色不見一切不合之色如是因雖不合而生果然不遍生一切不合者要可生之果乃能發生復次汝是破法人若不立自宗唯破他宗名破法人汝今亦爾寅二答自不同彼失分四卯一自宗立破應理卯二不同他過之理卯三如成無性難成有性卯四了知餘能破初又分二辰一於名言中許破他宗辰二許立自宗今初今當解釋頌曰前説能破與所破為合不合諸過失誰定有宗乃有過我無此宗故無失前説能破所破為合而破為不合而破所有諸過失若誰定計有自性之宗彼乃有過由我無此有自性之宗故汝所説若合不合二種過失我定非有以我許能破所破俱無自性故釋論前説為他宗所出因果合不合之過失自宗不同犯之理謂他計因果實有自相自許如幻都無自性此處説他所出過自宗不犯之理謂無自性故於是應知自宗不同之理是因自不許有自性之二品也回諍論云若我有少宗則我有彼過由我全無宗故我唯無失此等所説之宗義當知皆如上説般若經云具壽須菩提為以生法得無生得為以無生法得無生得須菩提言具壽舍利弗我不許以生法得無生得亦不許以無生法得無生得舍利弗言具壽須菩提豈無得無證耶須菩提言具壽舍利弗雖有得有證然非以二相具壽舍利弗若得若證唯是世間名言預流一來不還阿羅漢獨覺菩薩亦唯世間名言於勝義中無得無證亦不許以無生法得無生得以上謂推求能得所得二假立義則得非有故觀察時破由二門得其所得由二相觀察之所得於無自性法中不應理故唯不觀察於世間名言許有此得經云雖有得有證然非以二相即明彼義言得者謂證得所得如説此二於勝義無於名言有如是能破雖勝義中不破所破然名言中破於所破辰二許立自宗復次頌曰如日輪有蝕等別於影像上亦能見日影合否皆非理然是名言依緣生如為修飾面容故影雖不實而有用如是此因雖非實能淨慧面亦違宗如日輪與面容上所有差別如日蝕等汝由見影像為緣亦能觀見若推求日輪面容與彼二影像為相合而生為不合而生雖皆不應理然是依日輪及面容唯由名言增上安立有影像生復能成辦所求之事如為修飾面容影像雖非實有然依影像亦有彼用如是此中所説之緣起因及離一異等因雖非有實自性然能清淨慧面之垢亦能通達無自性宗亦字顯示無自性之能破亦能破於所破也由二邊言論於許唯假有者全不應理故依二邊若破若答欲求中觀宗之過失畢竟不能得便四百論云有非有俱非諸宗皆寂滅於彼欲興難畢竟不能申中論亦云依空問難時若人欲有答是則不成答俱同於所立由此所説觀察能破所破為合不合之理當知亦能觀察能生因為合不合而破清辨論師云中論是説能生因非能顯因觀合不合是能顯因非能生因故我自語非似能破此説觀察能生因為合不合不能觀察能顯因等然不成答以此有過答覆他必不忍如計能生因實有犯過則計能顯因有自性亦犯過故又清辨論師為成立中論所説無自性宗故自安立因他舉能破釋彼難時僅答似破此唯是他人之所破凡許有自性者若能生因若能顯因俱犯合不合之過失若不許有自性則無彼過故唯吾人之答覆最為端嚴卯二不同他過之理復次頌曰若能了因是實有及所了宗有自性則可配此合等理非爾故汝唐劬勞若計能了宗之因是實有及所了之宗是有自性則可配此能破之理推求能立與所立為合而立抑不合而立由彼自性都無所有汝將不淨宗之過失推於淨宗是於我等唐設劬勞都無所益如破眩翳人所見髮等一性多性圓形黑色等宗於無翳人都無妨害如是觀察無自性之因果汝執二邊而破亦無妨難故彼所立眼與磁石等喻雖不相合而有作用亦應破除以計有自性亦必同犯合不合之過故汝今棄捨無自性之直途愛著惡分別之斜徑分別造障蔽真道汝何用此大劬勞為卯三如成無性難成有性復次頌曰易達諸法無自性難使他知有自性汝復以惡分別網何為於此惱世間如中觀師能以敵者所許幻夢等喻極易令他了達世間一切諸法皆無自性汝則不能使中觀師了達諸法皆有自性以無共許實有喻故此説成立無實之緣起因等若於同喻上未能了解凡是緣起決定無實則於有法上更無正量能了解無實也由是當知我能破除諸實事師一切妨難誰亦不能作合法之解答是誰差汝損惱世間諸世間人如蠶作繭已為煩惱惡分別繭之所纏縛汝今何為復於其上更以惡分別絲結為堅網周匝遍繞故應棄此實執妄諍一切虛妄如同影像之法上寧有自性成就之自相共相現量比量耶此中現證一切所知者唯一現量謂一切智智卯四了知餘能破復次頌曰了知上述餘破已重破外答合等難云何而是破法人由此當知餘能破前安立緣起如依種子而有芽生及安立假設如依諸蘊假設補特伽羅時破實事宗所餘之能破謂即上説因為合而生果為不合而生果亦當了知此能破觀察因果合不合生外人為答此妨難故反觀能破為合不合則於爾時當重破彼謂彼觀察於自不同上文所説亦僅一例耳又中論中所有立破皆為遣除實執分別我於異生皆被分別縛時已廣説故中論寧有破法之過其破法者是恐安立自宗犯過唯破他宗故我今此中亦非勝義破除他宗以勝義中全無法故故我寧有破法之過若人不立自宗而許勝義破除他宗是破法人相諸中觀師誰於名言不立自宗誰於勝義而許破他二俱非有故中觀師亦無破法人故彼破法人相畢竟非理如是前説能破之餘義即由此無間所説而當了知始從彼非彼生豈從他至觀察速當得解脫明法無我次從慧見煩惱諸過患直至此頌明人無我
