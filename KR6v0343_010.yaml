body:
  text: 宗喀巴大師造釋第六勝義菩提心之七未三成立唯字表心為主上文已說破離心作者唯字義盡故彼唯字不破外境除前理外今更以說心為主之餘門明不破外境頌曰如覺真理說名佛如是唯心最主要經說世間唯是心故此破色非經義如於真實義覺慧圓滿說名曰佛略去前句醒寤之義亦可名佛如是色心二法中唯心為主當知略去後句為主之義經說世間三界唯心故此唯心是遮色等為成就世間之主因若說唯心有自性都無外色則非經義故此釋地經義當許唯如我等所說也若如汝宗頌曰若知此等唯有心故破離心外色者何故如來於彼經復說心從癡業生若佛由知三界唯是有自性之心故於釋地經中破外色者則佛世尊何故復於釋地經中說識從無明愚癡及諸行業生耶如云無明緣行行緣識釋地經說識是無明諸行之果未說識有自性若說是緣起復說有自性則彼說者應成迷亂自宗必不俱許彼二當知是為引導衆生依衆生力而許也自宗不可俱許彼二者謂識有自性應不觀待無明及行然實觀待故無自性也內識畢竟非有自性如眩翳人見毛輪等要有顛倒因緣彼方得有若無顛倒因緣彼即無故要有顛倒因緣乃有識者由經中流轉緣起顯示若無無明即無識者由還滅緣起顯示其後又云菩薩如是觀察有為多諸過患無有自性不生不滅誰有心者見此教已復計識為實有如是計者唯由自內實執宗之所迷耳六十正理論云佛說此世間以無明為緣故世即分別云何不應理若無明滅者此法即隨滅是無明遍計云何不明顯義謂若有自性即是實有迷惑滅時理應明顯不應隨滅也為顯心為主故頌曰有情世間器世間種種差別由心立經說衆生從業生心已斷者業非有有情世間是由各自業及煩惱感得我事器世間種種差別下自風輪上至色究竟天亦唯由諸有情心所造共業之所感生如孔雀翎等各種雜色是由彼衆生自不共業之所感生如蓮華瓣各種顏色是由衆生共業所感餘亦應知經云隨有情業力應時起黑山如地獄天宮有劍林寶樹唯識教中亦說二種世間是由共不共業所感故唯識宗亦非不許有器世間也如是一切衆生皆從業生心已斷者業即非有要有心者乃能造業故業亦依心如是依釋地經說無作者受者明唯字破餘作者依經說十二有支皆依一心顯唯字以心為主前者約遮品說後者約表品說由衆生流轉唯心是主要之因餘非主要之因故經安立唯心為主不立外色頌曰若謂雖許有色法然非如心為作者則遮離心餘作者非是遮遣此色法若謂雖許有色法然說色法非如內心能為衆生之作者是則唯破離心之作者非遮遣此外色也此中數論師等計自性等為作者佛弟子衆許內心為作者色非作者則俱無諍也故當觀察自性等餘作者為破無作者相之自性等故於名言中說有作者功能之唯心乃是作者由破自性等作者自即據有驅自性等出境之所諍地如有二王欲王一國逐走敵人自即得有其國民衆是二王所共需者故於國民都不損害如是此色亦是二者所共需都不損害故定應知此色是有也午二明外境內心有無相同由前所說道理頌曰若謂安住世間理世間五蘊皆是有若許現起真實智行者五蘊皆非有若謂安住世間建立之道理則世間共許外色等五蘊皆是有若許是現起親證真實義之智者則行者住根本定時五蘊皆非有也由是當知頌曰無色不應執有心有心不應執無色若許無外色者則亦不應執有內心若許有內心者則亦不應執無外色若時以正理推求假立義了知無外色者亦應了達無有內心以內外二法之有皆非正理所成立故若時了達有內心者亦應了達有外色以二法俱是世間所共許故此說唯識師許心色二法有無不同者其所無之色謂無外色如論云無外所取由自種變似青等釋云雖無青等外色說無色時於所破上加外簡別釋又云故彼唯字不破所知更以異門明不破外境說破色非是經義時解釋破色即是破外境故若不如是解但依文者則釋云故彼唯字不破所知亦應說唯識宗許唯字破所知心也若謂唯識宗不許有色者則唯識宗成立阿賴耶識時攝大乘論云復次結生相續已若離異熟識執受色根亦不可得又云若離異熟識識與名色更互相依譬如蘆束相依而轉此亦不成應皆成相違以許有色法即須許有外境故以是當知雖許以識為緣生名色等不須許有外境不可違此而說明唯識宗不共建立時多作如是說故即由聖教亦應了達內心外境有無相同頌曰般若經中佛俱遮彼等對法俱說有色等五蘊佛於般若波羅蜜多經中俱遮其自性故如云須菩提色自性空乃至識自性空對法藏中則由自相共相等門俱說五蘊為有也如是頌曰二諦次第縱破壞汝物已遮終不成是故他宗是破壞上來所說外境內心勝義俱無世俗俱有聖教以正理所成立之二諦次第縱使如是破壞然汝唯識師所計之依他起實物終不得成何以故依他起實有前已數破故汝徒勞無益也不可破壞二諦次第應許勝義中無世俗中有頌曰由是次第知諸法真實不生世間生由上來所說次第當知諸法於真實義本來不生於世間名言中則有生也此中既說諸法不生是依勝義於名言中則許有生故於所破定當加簡別午三解楞伽經說唯心之密意分二未一明說唯心都無外境是不了義未二明通達不了義經之方便初又分二中一以教明不了義申二以理明不了義初中又二酉一正義酉二明如是餘經亦非了義今初問釋地經義雖如是說然楞伽經云外境悉非有心變種種相似身受用處故我說唯心此中身謂眼等有色根受用謂色聲等五境處謂器世間由離內心無外境故內識生時變似根身受用處所故身等境事似離內識別有外境是故三界唯心也為顯此經是密意語頌曰經說外境悉非有唯心變為種種事彼經密意頌曰是於貪著妙色者為遮色故非了義諸有情以貪著妙色為緣隨貪瞋慢等而轉不得自在由貪著彼故造諸重罪退失福德智慧資糧世尊為破以色為緣所起煩惱故說唯心如於有貪衆生說除外境貪之骨鎖雖非實有亦如是說復次此經是不了義非是了義由何决定頌曰佛說此是不了義此非了義理亦成此經說唯心都無外境大師自說是不了義故由聖教即能成立為不了義此經是不了義以正理亦能成立也月稱論師不說外境悉非有等唯心之唯字如釋地經不破外境破餘作者說此唯字是破外境然釋此經是不了義清辨論師則釋此經說心似身受用處者謂心帶彼影像而生外境悉非有者謂破心無相而見故說此唯字亦不破外境也酉二明如是餘經亦非了義非但說外境悉非有等明唯有心都無外境之經是不了義頌曰如是行相諸餘經此教亦顯不了義凡如上說行相之經唯識宗許為了義者由下引之教亦皆顯其是不了義如是行相之經為何等耶釋論說如解深密經明三自性中遍計執無性依他起有性又說阿陀那識甚深細一切種子如暴流我於凡愚不開演恐彼分別執為我如是等經彼經中說遍計執無自相依他起有自相分其有無之別如二我遍計執與假立諸法自性差別為有自相之遍計執唯識宗雖不許有然如假立自性差別之遍計執等許為有者亦多也彼經雖說依他起與圓成實俱有自相釋論僅說依他起者因中觀與唯識諍有無實性之主要所依為依他起以施設遍計執之所依是依他起圓成實亦是依依他起而安立故此宗則說如是分別遍計無性依他有性亦非了義又彼經說阿陀那識等八識品謂離六轉識外別有阿賴耶識此宗說彼亦非了義既無阿賴耶識則亦不能安立染污意也等字所攝謂彼經中破除外境及究竟三乘二義故此宗須解為不了義者共有四義也若於此等義不得透徹了解則不能知二宗差別更不能了知此宗之不共要義於辨了不了義論中皆已詳釋解深密經何文顯示無有外境攝大乘論曰世尊三摩地所行影像彼與此心當言有異當言無異佛告慈氏菩薩曰善男子當言無異何以故我說識所緣唯識所現故引此經文此宗於上述四義皆須釋為不了義不可說彼中有者是不了義有者是了義也其說究竟三乘者意謂就龍猛菩薩集經論中成立究竟一乘易可了知故入中論中未更解說餘三義中以教顯示說無外境唯心有自性為不了義者如楞伽經云如對諸病者醫生給衆藥如是對有情佛亦說唯心謂如醫生對各別病人給各別藥此非由醫生自主是須順病人之病情而給也如是佛說唯心亦非由大師自主是隨順衆生意樂增上而說故知前經是不了義釋論於引如對諸病者之後又廣引楞伽經云如是世尊於契經中說如來藏乃至速證無上正等菩提此教是顯唯識宗許說阿賴耶識為了義者亦是不了義疏說言如是者謂經說常住堅固如來藏是不了義如是顯經說唯心亦是不了義此是倒說釋論顯然是說如經說唯心是不了義故彼文是說如以如對諸病者等解釋經說唯心是不了義如是以說常住堅固如來藏是不了義亦能成立解深密經等說有阿賴耶識非如實言也此須先知說如來藏非如實言如楞伽經云隨順有情意樂所說諸經是權便義非如實言譬如陽焰實無有水欺誑濁鹿彼所說法亦為令諸愚夫歡喜非是聖智安立之言故汝應隨義轉莫著言說又曰大慧問曰佛於經中說如來藏謂彼自性光明本來清淨具足三十二相一切有情身中皆有如摩尼寶被垢衣纏裹如是此亦被蘊處界衣之所纏裹而有垢染然是常恆堅固者此如來藏與諸外道所說神我有何差別如來解釋謂如是說者非如實言故與外道之神我不同其密意之所依是空性無相無願法無我性密意之所為是為除愚夫之無我恐怖及為引攝著我之外道與曾習彼見之有情令彼漸次入真實義故說有常恆堅固之如來藏現在及未來之菩薩不應於此妄執為我也此義是說如言執著則與執著外道神我相同故不應如言執著也如言執著之妨難謂如言而許則與外道之神我無別此等已於餘處廣釋釋論曰彼經又云大慧空性不生不二無自性相皆悉遍入一切佛經又曰是故如是行相契經凡唯識師計為了義者已由此教顯彼一切皆非了義如是行相之經非指其前無間所引兩段楞伽經文以彼兩段經文唯識宗不許是了義釋論前文明說是解深密經也由此教句疏中釋為釋地經中觀察緣起破餘作者極不應理破餘作者是證釋地經所說唯心不遮外境非證雖破外境而非了義也以是當知頌中此教亦顯不了義之此教凡有三教一顯破外境說唯有心是不了義者謂如對諸病者等四句二顯說阿賴耶是不了義者謂明常恆堅固如來藏之教是不了義之教由說有如來藏是不了義如何成立說阿賴耶亦是不了義耶如厚嚴經云地等阿賴耶亦善如來藏佛於如來藏說名阿賴耶劣慧者不知藏名阿賴耶楞伽經亦云說如來藏名阿賴耶識具前七識多說彼二是異名也由說彼二一是常住一是無常故非說彼二如言義同然依何義說如來藏即依彼義說阿賴耶觀待密意所依唯是異名故義是一由說前者是不了義故亦能成立後者是不了義釋論云由隨一切法性轉故當知唯說空性名阿賴耶識若將此文與說常恆堅固如來藏是不了義之經文善為配觀則能知彼教可顯阿賴耶識亦非了義也三經云大慧空性乃至遍入一切佛經又云任於何經應當了知皆是此義是顯分初二自性有無自相之差別是不了義之教也申二以理明不了義今以正理明說唯心是不了義頌曰佛說所知若非有則亦易除諸能知由無所知即遮知是故佛先遮所知如修植福德是易悟入法性之方便故佛先說布施等如是最初不能通達甚深空義之衆生佛亦令彼漸入無性若先為彼說無外所知後易遣除能知自性由先破外境說無所知即是圓滿通達無我之方便故佛先遮所知外境以了達無所知外境無我亦易遣除能知了達能知無我故了達外境無自性已有唯以自力便能了達能知無自性者有因他略加開導即能了達者又釋菩提心論亦說無外境唯心有自性是不了義如云為除愚夫怖故佛說此等一切皆唯心然非如實言提婆菩薩智藏集論中亦明顯宣說未二明通達了不了義經之方便諸有慧者於餘不了義經凡未圓滿宣說真實義者皆應如是解釋頌曰如是了知教規已凡經所說非真義應知不了而解釋說空性者是了義了知如上所說了義不了義經之建立規矩者凡有契經詮說非真實義未明了宣說不生等緣起者當知彼經即不了義了知彼是不了義已即當解釋彼是悟入無自性之因如出世讚云大種非眼見眼寧見彼造佛為破色執於色如是說經亦云無常義者是謂無義前教成證之理謂佛於對法中說四大種是觸塵非眼所見境四大種所造色處是眼所見須俱許此二事也佛明彼等之真實義時謂若彼等有自性者應四大種亦是眼所見或應色境亦非眼所見由知此理則知前說非是彼等之真實義須更通達彼真實義亦知前說是悟入真實義之方便也後教成證之理亦同前說了知經說諸法生滅即是無有自性之義也若有契經明了宣說人法性空當知彼經是真了義如三摩地王經云當知善逝宣說空是諸了義經差別若說有情數取趣當知彼法不了義經差別謂不同不了義經之差別說數取趣僅是一例說有作者作業作用等亦是不了義經此即安立契經有了不了義二類之根據彼經又云我於千世界所說諸契經不能盡宣說文異義唯一若能修一事即遍修一切盡一切諸佛所說無量法諸法皆無我若人善解義能於此處學不難得佛法我於千世界等四句謂盡諸佛所說一切經中凡明顯宣說勝義者即是直接趣入真如其不如是說之不了義經亦是間接趣向真如故趣入真如其義唯一也初發業者不能盡學世界所有一切佛經可學任何一經之真實義此是引證諸未明說真實義之契經亦是悟入真實義之因也若能修一事等二句若善了知一法之真實義而修習之則能修習一切法之真實義不須別修一一法之法性也若修一事即成修一切法彼事為何盡一切諸佛等三句即明彼事謂法無我非說廣大行品唯修一法即足也如月燈經即三摩地王經安立了不了義之理無盡慧經等亦如是廣說此等已於辨了不了義論中詳盡解說釋論曰略說少分謂既釋解深密經所說三性為不了義自宗如何安立三性耶此謂略說彼義之少分如蛇在盤繩之緣起上是遍計執以彼蛇於此繩上非是有故於真蛇上則是圓成實以非是於無上遍計執故如是真理自性於依他起有為法上是遍計執中論云自性名無作不待異法成以真理之自性非所作法故如於現見之緣起所作如幻法上遍計執為真理之自性者於佛如所有智所行境上乃是真理以彼非於無上遍計執故由智慧不觸因緣所作事唯親證自性者名曰佛證悟真理故不觸之義後當决擇釋論曰當了達如是三性建立而解說契經密意謂由彼道理既可了知彌勒問品所說三性之密意亦能了知解深密經所說三性之密意是不了義也又唯識師說於依他起上假立異體二取為遍計執此是所應思察者以能取所取即是依他起離二取外別無依他起事故彌勒問品所說之三自性與解深密經所說三自性之建立於辨了不了義論中已廣决擇寅三破共生計從共生亦非理俱犯已說衆過故露形外道計自他共生謂如從泥團杖輪繩水陶師等而有瓶生瓶要泥性中有乃得生故從自生陶師功用等他法亦能生瓶故亦從他生外法既爾內法亦然要自他共乃得有生彼宗安立九句義謂人我所愛護之命諸根等非命能生善趣與解脫之法與彼相違之非法煩惱等諸漏遮止犯戒等之律儀苦樂從所知生能為知因之和合勢力如慈氏要於前生命中已有乃受現生故從自生以慈氏與命不異故命能從此世往他世故復許能往天等諸趣故慈氏亦從父母法非法有漏等他法生故亦從他生以不許自他各別能生故前破自他各別生於吾等無妨也不但計自他各別生不應道理即計從自他和合共生亦不應理前對各別生者所說衆過於計共生宗亦成過故若計慈氏觀待彼命是自生者前說生應無用等過已破若謂觀待父母等是他生者前說應從一切生等過已破又如前說計自生他生於世俗勝義皆不應理如是今計共生亦定非有故結頌曰此非世間非真實此計從自他共生世間非有是事於真實勝義亦非有也頌曰各生未成况共生由自他各別生尚且未成故從共生亦非正理也寅四破無因生順世外道計自然生謂若有因生觀待彼果必是自生他生共生便有上過我今不許從因生故無彼三宗之過失如蓮莖之粗蓮瓣之柔未見有人製造其瓣鬚蕊等顏色形狀各別不同亦未見作者波那娑果及石榴等各種差別亦皆如是外物既爾內界亦然如孔雀底底利鳥及水鵠等未見有人強捉為作種種形狀色彩故諸法生唯自然生破彼頌曰若計無因而有生一切恆從一切生世間為求果實故不應多門收集種若計諸法無因自然而生者應一切法從一切非因而生以一切法同是非因故又如現見阿摩羅果等要待時節乃得成熟是暫時性彼等亦應恆時而有不待時故如是烏鴉亦應有孔雀翎孔雀於胎中亦應有鸚鵡之羽彼皆不待因故如是已說違理當說違背現事世人為求穀實等果故亦應不由多門劬勞收集種子然實收集故非自然生復有過失頌曰衆生無因應無取猶如空花色與香繁華世間有可取知世有因如自心若衆生無因者應諸衆生如同虛空青蓮花之色香都無可取然此繁華復雜之世間實有可取故當知世間皆從自因而生如有青相之自心是從青色而生也又順世外道計四大種實物為一切衆生之因謂地水火風由彼等變異差別非但現見之蓮花石榴等及孔雀水鵠等各種差別應合道理即能了別各種物體之內心亦唯從彼生也如諸酒中由四大種和合變異差別便有狂醉之功能為諸衆生狂醉悶絶之因如是由羯邏藍等大種之差別變異生諸心識乃至能廣了別一切衆物故一切法唯從現世因生非是前世造業今世成熟此世造業他世成熟前後他世皆非是有彼欲受用美女為令美女了知無有後世曾曰美女善行善飲噉妙身已去非汝有此身唯是假合成去已不返不須畏末句拏錯譯為過去怖畏不復生問汝謂無有他世為以何理决定曰他世非現見故問他世非現見此為現事抑非現事若言現事者既許非現見者為現事應無事與現事不相違是則汝宗無事亦成有事以許他世非現見為現見所親量之現事故猶如有事既全無無事亦應無有事無所待故若彼二非有則汝有四大種及無他世之宗皆當失壞也若謂非現事者既非現事則以現量應不可見云何由不可見門而比知他世非有耶若謂由比量能知者雖總不限於現量由比量所成立者亦能成辦士夫之義利奈此比量非汝宗所許如云唯根所行境齊此是士夫多聞者所說欺惑如痕跡此說士夫見境之量唯齊眼等諸根所行境也頌曰汝論所說大種性汝心所緣且非有汝意對此尚愚暗何能正知於他世如汝論所說地等四大種性於汝心所緣彼等境界尚且非有汝意對此最粗顯義猶有厚重之愚暗則於最極微細之他世何能正知其為有無耶復有過失頌曰破他世時汝自體於所知性成倒見由具彼見同依身如計大種有性時破他世時汝順世外道自體於所知自性成顛倒見以具足彼毀謗他世見同等所依之身故如計大種自性實有之時也所依謂彼見安住之因若謂我計大種實有時非顛倒見汝之同喻缺所立法也曰此過非有汝計自性不生自性非有之大種為自性有及自性生是顛倒見已成立故此明自宗正因之量式中所舉同喻要不缺所立法則所建之正因亦必應爾前說成立聲是無常以眼所見為因犯不成過故以正因成立宗要具三相也若謂大種自性不生猶待成立者頌曰大種非有前已說由前總破自他生共生及從無因生故無未說諸大種彼諸大種非有自性如前已說由前破自生他生共生無因生時大種自性生我已總破前總破時未說到之諸大種皆悉非有故喻已成如是破除毀謗一切智者及計有餘自性法等諸宗派時亦當配云謗正覺時汝自體於所知性成倒見由具彼見同依身如計大種有性時意在總破一切有無見故若謂汝自宗亦應同犯此過曰非有以無成立我等為倒見之同喻故且可作是說我達他世為有時即成正見所知性由具此見同依身如許通達無我時如是配云我達一切智有時即成正見所知性因喻同前於一切法亦如是說釋曰由此道理即善成立彼非彼生豈從他亦非共生寧無因前說之四宗故不應說唯破他宗不立自宗也丑四破四邊生結成義問若諸法不自生他生共生無因生者為如何生曰若計諸法有自性决定無疑或自生或他生或共生或無因生以更無餘生故諸計大自在天等能生諸法者彼大自在天等亦必是若自若他若共故計大自在天等為因亦不能出上說諸過故無第五能生之因以無餘因故由破四種分別妄計之生故說諸法無自性生為顯此義頌曰由無自他共無因故說諸法離自性由無自生他生共生無因生故故說諸法永離自性此明破四邊生後依止正因引生比量之理言無四邊生即正因諸法是有法永離自性即所立宗也子二釋妨難分二丑一正義丑二總結今初若謂諸法皆無自性生者不生之青等云何可見曰青等自性非有無明染者之所見境故現在眼等識都不能見青等自性也若爾現前數數所見之境性為是何事曰此是顛倒增上所現非真自性唯有無明染著增上者乃見彼境性故為明此義頌曰世有厚癡同稠雲故諸境性顛倒現世間衆生由有厚重愚癡如同稠雲障蔽青等自性令不得見故諸愚夫不能親見青等自性其於境上可倒執為自性者唯諸實執愚夫顛倒所現耳若謂由愚癡覆蔽故雖可不見真實義何以反見顛倒性耶曰雖無自性而現有者是由愚癡之力當以外喻顯示頌曰如由翳力倒執髮二月雀翎蜂蠅等如是無智由癡過以種種慧觀有為如有翳根由眩翳力雖無毛髮二月雀翎蜂蠅等事倒執為有如是諸無智異生由愚癡過失力故以種種慧解觀察青等之有為如佛於緣起經云無明緣行又云補特伽羅由無明隨逐故造福非福不動諸行又云無明滅故行滅由此道理頌曰說癡起業無癡滅唯使無智者了達慧日破除諸冥暗智者達空即解脫佛說依於無明愚癡起諸行業若無愚癡業則不生者唯使無智衆生了達彼義是依彼增上而說智者見說無明緣行非但了達諸行空無自性且以通達緣起真理之慧日破除如同冥暗之無明即亦不取諸行業由已斷造業之無明因故亦決定解脫生死也般若攝頌曰菩薩般若觀緣起了知無生無有盡如日無雲放光明破無明障證菩提若謂色等諸法於真實勝義中都無自性者應如石女兒於名言中亦無青等自性然色等性於世俗有故彼等有亦應是勝義中有也頌曰若謂諸法真實無則彼應如石女兒於名言中亦非有故彼定應自性有今當告彼頌曰有眩翳者所見境彼毛髮等皆不生汝且與彼而辨諍後責無明眩翳者如有眩翳人所見毛髮等境皆悉不生與石女兒不生相同汝應且先問彼為眩翳等壞眼根者何故汝等唯見非有之毛髮等境不見石女兒耶後再責難為無明翳障慧眼者同是自性不生汝何故唯見色等不見石女兒耶此於我等不應責難以經說諸瑜伽師諸法如是餘欲求得瑜伽智者於所說法性亦應如是信解我等是依聖教說瑜伽師通達諸法皆無自性非依自智而作是說我等亦被無明眩翳障蔽慧眼故如經云知蘊性離皆空寂菩提性空亦遠離所修正行無空性智者能知非凡了能知智慧自性空所知境界空離性了達知者亦如是是人能修菩提道故於諸瑜伽師亦無此責難彼於世俗中不見少法是有自性於勝義中亦不見故暫勿責難有眩翳人且應詰問汝自身頌曰若見夢境尋香城陽焰幻事影像等同石女兒非有性汝見不見應非理若見夢中房屋乾闥婆城幻師所幻之男女等及陽焰為水影像為人等取谷響變化等無生非有之事既同屬非有性汝云何只見彼等不見石女兒耶此亦應非理故應先自責難後問我等也頌曰此於真實雖不生然不同於石女兒非是世間所見境故汝所言不決定此色等法於真實中雖無有生然不同石女兒非是世間所見之境故汝所言若勝義無應如石女兒於名言中亦無所見此因不定有錯誤失薄伽梵亦說言諸趣如夢非依真實說夢中都無物倒慧者妄執乾闥婆城雖可見十方非有餘亦無彼城唯名假安立佛說諸趣亦復然有水想者雖見水然陽焰中水終無如是分別擾亂者於不淨中見為淨猶如淨鏡中現無性影像大樹汝應知諸法亦如是此教亦說色等雖自性不生然是世間共見之境石女兒則不爾此於汝自宗成不定過此於我等不成責難以我等非於世俗許色等有自性生次於勝義中破也丑二總結問汝宗何故非世俗中許色等有自性生勝義中破頌曰如石女兒自性生真實世間均非有如是諸法自性生世間真實皆悉無如石女兒之自性生非但於真實義中無有於世間名言中亦非是有如是色等一切諸法於世間名言與真實義中俱無自性生也諸法自性生雖於錯亂執前似有然中觀師絶不許為世俗中有復應憶念於所破上加自性生之簡別也由此道理頌曰故佛宣說一切法本寂靜離自性生復是自性般涅槃以是知生恆非有是故佛薄伽梵宣說一切諸法本來寂靜離自性生自性涅槃以是當知自性生恆時非有寶雲經云佛轉妙法輪宣說一切法本寂靜不生自性般涅槃此說諸法真實義由是寂靜智之境故名寂靜其理由謂自性不生故不生之理由謂若法有自性彼乃有生自性且無彼云何生耶故是清淨涅槃言本來者表示諸法非唯得瑜伽智時乃不生是於彼前世間名言時亦自性不生也本字是最初之異名自部不應難云若勝義中無世俗中亦應無何以故是彼所共許故頌曰如說瓶等真實無世間共許亦容有應一切法皆如是故不同於石女兒如說瓶等於真實勝義中無於世間共許名言中有一切諸法皆應如是故勝義中無不同石女兒如俱舍云彼覺破便無慧析餘亦爾如瓶水世俗異此名勝義論曰若彼物覺彼破便無應知彼物名世俗有如瓶被破為碎瓦時瓶覺則無又若有物以慧析餘彼覺便無亦是世俗如水被慧析色等時水覺便無若彼物覺彼破不無及慧析餘彼覺仍有應知彼物名勝義有如色等物碎至極微或以勝慧析餘味等彼覺恆有受等亦爾此等是說彼諸部師不可說云若勝義無世俗亦無非說彼等安立二諦之理與自宗二諦相同以彼等立為世俗有者亦是中觀師所說之勝義有故要有假有瓶等所依之四大種及所造色是實物故乃可假立瓶等有因有依汝中觀師說一切法皆唯假有都無假有所依之實物則同石女兒無可避免也曰此說非理假有所依之實物不得成故如依假有之形等和合便有假有影像可見及依假有柱等假立為屋依假有樹等假名為林又如夢中見從自性不生之種子出生自性不生之芽如是一切假有法理應唯以假法為依也
