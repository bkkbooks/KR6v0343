body:
  text: 宗喀巴大師造釋第六勝義菩提心之八子三以緣起生破邊執分別若汝於二諦俱破自生他生共生無因生者則從無明生行識等及從種子生芽苗等此世俗生如何決定頌曰諸法非是無因生非由自在等因生非自他生非共生故知唯是依緣生由前所説道理諸法之生非無因自然生非由大自在天為因為生等取非從時微塵自性士夫那羅延天等生亦非自生他生共生故知唯是依此因緣有彼果生破四生已唯有彼生故亦不破壞世間之因果名言如薄伽梵説諸法名言謂此有故彼有此生故彼生所謂無明緣行寶鬘論云此有故彼有如有長説短此生故彼生如燈然發光中論云因業有作者因作者有業除此緣起外更無成業因如破業作者受受者亦爾及餘一切法亦應如是破唯説有此生不説有四邊生如佛説唯有緣生聖者亦唯作是説并許依業立作者等觀待緣起言除此緣起外即分別自宗生與他宗生之差別凡屬有法皆如是説月稱論席亦多勵力總許有生由非四邊生故許緣起生有違反此宗倒説四邊不生即全無生者當知是以惡分別垢污染此宗通達空性之無上正理謂緣起深義即空性義也如是宣説唯有緣性之緣起非但不落無因生等四生其餘增益有自性之常見都無作用之斷見及先有後仍存在之常住前後自性各別之剎那無常有自性之有事無事此等分別或分別境亦皆非有為顯此義頌曰由説諸法依緣生非諸分別能觀察是故以此緣起理能破一切惡見網依此為緣有彼果生唯由此道理諸世俗法便得成立非由餘理故非自他生等諸邪分別之所能觀察以此緣起道理即能破除前説計自他生等一切惡見網也唯以此緣性立為緣起義之中觀師不許少法是有自性六十正理論云若依彼彼生即自性不生自性不生者云何得名生此説依緣生者即自性不生是則如何可説苗芽由自性生中論亦云因緣所生法我説即是空亦為是假名亦是中道義此説由是因緣生故即是自性空經亦云若從緣生即不生此中無有生自性若法依緣即説空知空即是不放逸從緣生是因不生是所立第二句解釋彼義謂自性不生故非於所破不加簡別顯句論引楞伽經云大慧我依自性不生密意説一切法不生佛自解其密意故龍猛菩薩由見世尊以緣起理破自性生最為希有故中論及六十正理論等多由宣説緣起門稱讚世尊諸有智者不可説由依緣生即是不生也不許諸法是有自性無自性中如何得有自他生等唯計有自性者乃有自然生自生他生自在等生及生已安住不滅之常與壞已斷滅等分別餘則不爾為顯此義頌曰有性乃生諸分別已觀自性咸非有無性彼等即不生譬如無薪則無火執諸法有自性乃生諸邊執分別由前道理已觀諸法是無自性既不執諸法有自性則不生彼等邊執分別譬如無薪為因則不生火果也諸瑜伽師由修所決擇之真實義故證聖道時以根本智不見戲論境相之理而見真實義無始所習執著諸法實有之分別皆得息滅如眩翳人塗以安膳那藥令毛髮等相皆歸息滅即所得之果非令毛髮等相轉成餘性之境也子四明正理觀察之果異生皆被分別縛能滅分別即解脫智者説滅諸分別即是觀察所得果由諸異生不知如前所説法性即被邊執分別繫縛諸聖瑜伽師由能如是通達法性不邪分別即得解脫故破盡一切邊執分別所執之境令分別息滅智者説彼即是龍猛菩薩中論等中觀察所得之果四百論云若法有自性見空有何德處妄分別縛彼是此所破此説諸法若有自性彼即諸法之真理見彼為妙見自性空則無功德虛妄分別執有自性彼即是縛彼所著境即此中觀論之所破也月稱疏亦云分別謂增益不實之自性此説於非真實有增益為真實有故非説一切分別是説實執分別與邊執分別邊執分別之邊字雖亦通多義然離邊見之邊如中觀光明論云若計任何一法是勝義有性者以有彼故隨執為常或云無常皆是邊見若謂如實隨順諸法真實性轉如理作意是墮落處者則不應道理此謂若如所執而境有者彼境非邊彼心亦是如理作意非是邊見故此之邊是墮落處如世間之懸險名邊墮彼險處名墮邊處如是由執何事能使執者衰損即名墮落邊處由自性有於名言中亦不可有其自性無於名言中則可容有故云勝義無非執無邊及云非如是亦非彼無邊然執所破之無為真實有則是墮落於無事邊破彼亦是破無邊也因果等法於名言有無量能害若執彼無或執非有其所執境即是無邊其能執心即無邊執若謂佛無過失則非是無邊及無邊執此執無因果等是損減之無邊前者是增益執之無邊無邊即斷邊有邊即常邊除前説之所破若執餘法為勝義有或自相有其所執境即是有邊其能執心即有邊執若謂佛有悲智則非是有邊及有邊執論亦有時説一切勝義有皆是有邊頌曰論中觀察非好諍為解脫故顯真理龍猛菩薩於中論中演説極多觀察道理當知非好諍論為降伏他故而説是為解脫衆生故演説觀察道理顯示真理謂念云何能使衆生無倒通達此真實義而得解脫汝於論中豈非列舉實事師一切所計而破斥乎故汝造論專為諍論云何可説唯滅分別為所得果曰此諸觀察雖非為諍論而發然由顯示真實義時他宗本性脆弱所有教理不能建立如近光明冥暗自息此於我等何咎之有頌曰若由解釋真實義他宗破壞亦無咎若由解釋真實義故破壞他宗假立諸法無有過咎四百論云諸佛雖無心説法摧他論而他論自壞如野火焚薪謂如然火意在煎茶非為製造灰炭然灰炭亦自然而有也若因好諍而説法者決定瞋他有過宗愛自應理宗必不能滅貪瞋分別何以故頌曰若於自見起愛者及瞋他見即分別若愛著自見及瞋恚他見此即繫縛之分別貪瞋分別增長不息是為繫縛非是解脫若時説法非為諍論頌曰是故若能除貪瞋觀察速當得解脫是故若能除遣貪著自宗瞋恚他宗而以正理觀察則能速得解脫六十正理論云智者無諍論彼即無所宗自宗尚非有云何有他宗四百論云若汝愛自宗他宗則不喜不能證涅槃二行無寂滅三摩地王經云若聞此法起貪愛聞説非法動瞋心被憍慢摧成顛倒由憍慢力受衆苦此説若於自他宗不能棄捨貪瞋私見以正直慧如理觀察則於宗派觀察修習依此因緣反令生死繫縛緊迫當知此是由大悲心賜給我等最勝教授釋論説從破自生至此明法無我意謂多明有為法無我中間亦兼明無為法無我癸二以理成立人無我分三子一明求解脫者當先破自性我子二破我我所有自性之理子三觀我及車亦例餘法今初上文已以聖教正理明法無我今當明人無我頌曰慧見煩惱諸過患皆從薩迦耶見生由了知我是彼境故瑜伽師先破我諸瑜伽師欲求悟入真實義斷除一切煩惱過患先作是念生死輪回以何為本既以正慧觀察已便見貪等煩惱與生老病死等一切過患皆從執我我所有自性之染慧薩迦耶見而生彼等皆是薩迦耶見之果諸有智者如是見已為欲斷除薩迦耶見故便知要如前引法界讚與四百論所説由觀彼境上無彼所執之我乃能斷除進觀薩迦耶見為著何事以何為所緣則能了知所言之我是我見所緣之境以我執是緣我之心故欲求斷除一切過患者應斷根本薩迦耶見後由通達彼所緣我是無自性乃能斷除故瑜伽師先應觀察我執所緣之我為有無自性諸瑜伽師由破自性我故便斷薩迦耶見滅盡一切過患故觀察我即是修解脫之方便集學論云若善成立補特伽羅空由根本斷故一切煩惱皆悉不生如來祕密經云寂靜慧如斬斷樹根一切枝葉皆當乾枯寂靜慧如是若滅薩迦耶見一切煩惱及隨煩惱亦皆寂滅諸天論師於此所説意旨相同故當了知生死過患如理思惟次應認識何為其本為斷彼故須求能斷正確方便破所著境於無我見獲決定解後於彼義數數修習是大小乘共需之道設作是念寶鬘論云乃至有蘊執從彼起我執有我執造業從業復受生説法我執執蘊實有為生死之根本此中則説薩迦耶見為生死根本二應相違以生死根本不容有不同之二法故曰無過此宗所説二種我執由所緣分行相無別二執俱以執有自相為行相故若生死根本二相違者須立二法行相不同為生死之根本也論説法我執為薩迦耶見之因者是顯無明中二執之因果説彼二執為煩惱之根本者是明為餘行相不同一切煩惱之根本由彼二執皆具此理故不相違如説前後二念同類無明為生死之根本子二破我我所有自性之理分二丑一破我有自性丑二破我所有自性初又分六寅一破外道所計離蘊我寅二破內道所計即蘊我寅三破能依所依等三計寅四破不一不異之實我寅五明假我及喻寅六明此建立易除邊執分別之功德初中又二卯一敘計卯二破執初中又二辰一敘數論宗辰二敘勝論等宗今初薩迦耶見所緣之我其相云何且述外道計頌曰外計受者常法我無德無作非作者依彼少少差別義諸外道類成多派數論計我是能受者受苦樂等是常法非變異之作者無喜憂暗之功德遍一切故更無作用彼論云根本自性非變異大等七性亦變異餘十六法唯變異神我非性非變異由能生故名自性於何時生謂見神我起欲時生若時自性了知神我欲受用聲等境即與神我相合次由自性出生聲等生起次第謂自性生大大生慢慢生十一根與五唯共十六法十六法中聲等五唯復生五大言自性非變異者謂但生果非如大等亦通變異大等七法既是能生亦是變異以大等七法望自果則是自性望根本自性則是變異五知根等十六法唯是變異神我既非能生亦非變異耳等五根由意加持攝取聲等五境覺使貪著神我思惟覺所著義即由彼欲受用諸境也若時神我於境少欲觀察諸境過患遠離諸欲修習靜慮依止靜慮得天眼通次以天眼觀察自性由是觀察自性含羞如他人婦即便脫離神我一切變異亦皆逆轉入自性中隱滅不現爾時神我獨存名曰解脫由彼神我常時獨立故名為常何等是作者何等非作者曰其中喜憂暗為三德憂以動轉為性暗以重覆為性喜以輕明為性苦樂癡三即此三之異名三德平等時名冥性此時三德為主極寂靜故三德未變時名有自性從自性生大大為覺之異名此能雙現外境與內我之影像從大生慢慢有三種曰變異慢喜慢暗慢從變異生色聲香味觸五唯從五唯生地水火風空五大從喜慢生十一根曰五作根謂口手足大小便道曰五知根謂眼耳鼻舌皮曰通二性之意根暗慢能發動餘二慢其中大慢五唯等七法雙通自性與變異十一根及五大唯是變異根本自性唯是自性自性即因變異即果辰二敘勝論等宗如數論派所計之我即依彼我少少差別諸外道類演成多派如勝論派計覺樂苦欲瞋勤勇法非法行勢為我之九種功德覺謂能取境樂謂受所欲境苦與上相違欲謂希望所願事瞋謂厭離所不欲境勤勇謂於所作事思惟善巧令到究竟法謂能感增上生與決定勝者非法與上相違行勢謂從知生復為知因若時我與九德和合即由彼等造善不善業流轉生死若時神我以真實智斷除覺等功德便獲獨存而得解脫又説彼神我為常住能作果能受用果有功德遍一切故更無作用勝論有一派計我有屈伸作用吠陀派計如一虛空瓶等各異由所依身異即一能依神我成為多種釋論曰依我少少差別諸外道類遂成異派有説此謂依數論之差別分成多派外道者是未了解論義卯二破執外道各派説我不同頌曰如石女兒不生故彼所計我皆非有此亦非是我執依不許世俗中有此彼等所計之我皆非實有以離生故如石女兒此因是外道自許比量彼因雖破所説有法然無過失以因與法皆唯遮詮故如是他所計我亦非是俱生我執所依因喻同前言非我執所依者謂非所緣境以彼所緣境是我及補特伽羅許此是有事與不生相違故其行相境謂補特伽羅我此於名言亦不許有與不生無違也有説此宗許補特伽羅我於名言有者是未了解此宗關要復未能分薩迦耶見所緣境與行相境之差別隨意妄説如是破彼我有及薩迦耶見之境是依勝義差別而破非但如是當知於世俗中亦破彼二言不許有我者謂不許我為實物也又彼因喻非但破上述二義當知亦破外道所計我之差別一切非有頌曰由於彼彼諸論中外道所計我差別自許不生因盡破故彼差別皆非有數論論典與勝論等論典中外道所計我之一切差別當知以外道自許之不生因與石女兒喻便能廣破我之自性差別頌曰是故離蘊無異我離蘊無我可取故是故無離蘊之異我以離五蘊別無單獨之我可取故若我與蘊異以俱無二種係屬故應全無關係有我可取如不取瓶可單取衣然彼都無可見也中論云若離取有我是事則不然離取應可見而實無可見又云若我異五蘊應無五蘊相取即五蘊也復有過失頌曰不許為世我執依不了亦起我見故不許此異蘊之我為世間有情無始以來我執所依之境以不了知外道所計之我不執彼相然由執著差別之力亦起我見執我我所故此與前文此亦非是我執依無重復過前破實我為我見所緣此破異蘊我為所緣故設作是念現在諸人雖不了知我有常住不生等差別然由往昔串習之力彼等亦有緣彼我之我見也曰此亦不然唯學邪宗者乃計離蘊之我為我見所依初未學邪宗之有情現見彼等亦有我執頌曰有生旁生經多劫彼亦未見常不生然猶見彼有我執故離五蘊全無我有諸有情生旁生趣經過多劫至今未出旁生趣者彼亦未見有如外道所計常住不生之我然猶見彼等有我執轉誰有智者執著外道所計之我為我執所依耶故離五蘊全無異體之我亦字攝墮地獄等趣寅二破內道所計即蘊我分五卯一明計即蘊是我之妨難卯二成立彼計非理卯三明計即蘊是我之餘難卯四解釋説蘊為我之密意卯五明他宗無係屬初又分二辰一正義辰二破救初中又二巳一敘計巳二破執今初此中內教人計頌曰由離諸蘊無我故我見所緣唯是蘊由離諸蘊無異體我故我見薩迦耶見之所緣唯是自蘊以彼所緣異蘊即蘊二類決定異蘊非理故説唯自內蘊為我此是犢子部等正量部計復有異執頌曰有計我見依五蘊有者唯計依一心正量部二派計自身五蘊為我見所緣之依説此我執從五蘊起如薄伽梵説苾芻當知一切沙門婆羅門等所有執我一切唯見此五取蘊為顯此見是於可壞積聚之法而起非於我我所起故説我我所行相之見名薩迦耶見因經説見五取蘊故計五蘊為我見所緣正量別派則計唯心為我如契經云我自為依怙更有誰為依由善調伏我智者得生天此頌即説內心為我何以知然以無異蘊之我故餘經亦説調伏心故如契經云應善調伏心心調能引樂故説我執所依之心名我分別熾然論云我等於名言中亦於識上安立我名由識能取後有故識是我又引教云有契經説調伏內心能得安樂有契經説由調伏我能得生天故於內心安立為我又以理成立云能取蘊者謂我識能取後有故立識為我清辨論師不許阿賴耶識故説取後有之識是意識餘不許阿賴耶識者當知亦爾許阿賴耶識者則計阿賴耶識為補特伽羅彼等宗中説二乘能證無實物之補特伽羅然不許彼能證無實物之第二識第六第八言補特伽羅無自立實物者是説補特伽羅自相無實非説補特伽羅所相識無實也巳二破執若謂五蘊即是我由蘊多故我應多其我復應成實物我見緣物應非倒若謂自身五蘊即是我者由蘊多故一補特伽羅亦應有多我若謂唯心是我由眼識等差別或由一一剎那有多識生滅差別有多識故我亦應多釋論説我應成多之過於彼二派中為第一派出或餘過失通難兩派此非説凡許我與多蘊是同體者便能出過是許我與蘊全無異者乃能出過他宗初不許爾故先應難彼若是假我與蘊同體異相雖可無過然汝計我蘊實有故應成全無差別之一體次乃難彼我應成多或五蘊應成一也契經説世間生時唯一補特伽羅生故他宗亦不許有多我我應是實物者由色等物有過去等差別唯諸異法説名為蘊汝説彼等是我故我應是實物然契經説苾芻當知有五種法唯名唯言唯是假音謂過去時未來時虛空涅槃補特伽羅又有頌言如即攬支聚假想立為車世俗立有情應知攬諸蘊故彼亦不許我為實物又見諸蘊之薩迦耶見由於實物轉故是緣實物之心應非顛倒如緣青黃等識故斷薩迦耶見應非令其同類相續不生名斷應如斷緣青黃色等之識唯斷緣薩迦耶見之欲貪説名為斷也復有過失頌曰般涅槃時我定斷般涅槃前諸剎那生滅無作故無果他所造業餘受果若如汝説自蘊是我者則無餘依般涅槃時由五蘊斷故我亦決定應斷故成邊執之斷見以汝等説緣所計我執常斷者是邊見故未般涅槃前諸剎那中如五蘊剎那生滅其我亦應一一剎那各別生滅如憶宿命決不念曰我今此身昔已曾有如是亦不應説我於爾時為頂生王以彼時我如身已滅現在非有汝許離彼前我別有異性之義受此生故中論云非所取即我彼有生滅故云何以所取而作能取者又曰若五蘊是我我應有生滅若前後剎那自性各異應無能作之我由業無所依故業亦應無則我與業果亦應無關係設作是念前剎那造業後剎那受果無過失者是則他人作業應餘人受果以他造業餘受報故如是亦犯造業失壞未造受報等過失中論云若謂有異者離彼應有今我住過去世未死今我生如是則斷滅失壞諸業報他作業此受有如是等過此説若前後我自性各異則後我不應觀待前我即無前我後我亦應生前我照常安住不死今我應自生也辰二破救設有是念前後剎那雖異而是一相續故無過咎頌曰實一相續無過者前已觀察説其失若謂諸真實異法是一相續故無過者此不應理前文如依慈氏近密法觀察自性異法是一相續時已説其過失中論云若天異於人是即為無常若天異人者是則無相續故自性互異諸法是一相續不應正理未造業而受報造業後失壞等過仍不能免頌曰故蘊與心皆非我故計自身諸蘊為我與計內心為我皆不應理卯二成立彼計非理非但以上文所説道理諸蘊與內心非我復有過失頌曰世有邊等無記故世間有邊等取無邊二俱雙非世間常無常二俱雙非如來死後有非有二俱雙非身即命者身異命者許此十四見為不應記故此不應記見一切部中咸誦持故説蘊是我不應道理若世間言目諸蘊者自宗許諸蘊生滅則應記世間無常般涅槃後諸蘊皆無汝亦應記世間有邊如來死後非有然問世間有邊等遮止授記故計諸蘊是我不應道理此中命者是我之異名問世間亦是依我而問問者意樂既是依神我而問彼所別事尚屬非有如何可記其能別法若依假我而答由彼問者尚非通達無我之法器故亦不可作如是答卯三明計即蘊是我之餘難復有過失頌曰若汝瑜伽見無我爾時定見無諸法若如汝説則瑜伽師現見無我時謂見一切法無我是見苦諦無我相爾時決定由見無有蘊等諸法名見無我以計五蘊及心即是我故然不許爾故五蘊非我問不許諸蘊為我之宗現見無我時亦應見安立為我之補特伽羅畢竟非有理相等故答未解微細正理者不能答此難茲當解釋他宗計蘊與心為我者是因未知我及補特伽羅等唯由名言增上假立謂要尋求假立之義有所得者乃能安立故計五蘊或內心為我成為有自性之我現見無我時應見彼我畢竟非有故他宗計為內我之五蘊內心等性亦應見為一切非有也其許唯由假名安立非由尋求假義而立之宗則無彼失設作是念業果關係時由離五蘊更無別法故所説我唯詮五蘊見無我時則詮外道所計神我故見無我時是離神我唯見諸行不犯見無蘊等諸法之失頌曰若謂爾時離常我則汝心蘊非是我若謂見無我時是離常住神我見為非有餘處所説之我亦不可作別義解則汝所説內心及蘊皆非是我便失汝自宗若謂業果關係時不許外道所計之我於彼境轉故無失壞自宗之過失者此亦非理汝於此時説是神我於業果關係時則説是五蘊如斯隨意轉計非正理故若謂於業果時決無神我為作業者及受果者則五蘊上亦無此我前已宣説故説一切法無我時不許我字詮五蘊者則業果時亦應不許若業果時許彼我字詮五蘊者則説一切法無我時亦應許我字詮表五蘊復有過失頌曰汝宗瑜伽見無我不違色等真實義緣色轉故生貪等以未違彼本性故若如汝宗則瑜伽師現見無我時應不通達色等真實義以彼於爾時唯見無有外道所計之常我故由緣色等有實執故則緣色等生貪等煩惱以未通達彼色等之本性真理故如昔未曾嘗花中蜜汁者僅見花上有鳥猶不能知彼味甘美如是諸瑜伽師先不曾知色等體性者僅見蘊等法離常住之我後仍不知色等體性又如曾嘗花中蜜汁者即見花中無鳥非即不知彼味甘美亦不能斷彼味之愛著如是執著色等自性實有者雖見無有常住之我由何能斷緣色等所起之貪等耶若見無有常住之我即能斷除緣色等之貪等任何有情皆不為令神我快樂求可樂境及恐常我痛苦避不可愛境是故若無能斷貪等之因緣則必不能解脫生死猶如外道卯四解釋説蘊為我之密意分五辰一解釋經説我見唯見諸蘊之義辰二依止餘經解釋蘊聚非我辰三破蘊聚之形狀為我辰四計蘊聚為我出餘妨難辰五佛説依六界等假立為我初又分三巳一明遮詮遮遺所破是經密意巳二縱是表詮亦非説諸蘊即我巳三破救今初設作是説吾等以聖教為量諸分別量不能妨難聖教中説唯蘊為我如世尊説苾芻當知一切沙門婆羅門等所有執我一切唯見此五取蘊頌曰若謂佛説蘊是我故計諸蘊為我者彼唯破除離蘊我餘經説色非我故若謂此經説蘊是我便計五蘊為我者然彼經非説諸蘊是我佛説唯蘊之密意是破計離蘊之我為我見所緣是觀待世俗諦外道論及為無倒顯示世俗諦中所有之我故由何知彼是破離蘊之我耶曰以餘經説色非我等破色等是我故餘經如何破頌曰由餘經説色非我受想諸行皆非我説識亦非是我故略標非許蘊為我由餘經説色受想行識皆非是我故前經略標唯見此五取蘊者非許諸蘊即我是破計有離蘊之我設作是念彼經言唯見雖破異我然言唯見此五取蘊既説見五蘊則明説諸蘊為我見所緣故彼經意是説諸蘊為我見所緣也若如是者則違餘經説諸蘊非我以俱生我執薩迦耶見之所緣定是我故此於後經義都無妨難不爾則如前説違難極多後亦當説故知前經非説諸蘊即薩迦耶見之所緣經言唯見諸蘊者當知是説緣依蘊假立之我計即蘊離蘊為我執所緣皆已破故若有經中破除色等為我當知彼經亦破薩迦耶見所緣依蘊假立能取諸蘊之我為有自性以説色等非我之經是依真實義而説故若能取之我是無自性則我所取之諸蘊自性亦定非有故於色等遠離實執之貪著亦應正理若將衆經互相配合破除即蘊離蘊為我見之所緣則知唯由名言增上依蘊假立我名安立此補特伽羅為無我義此不共理是內教大乘各宗論師解釋契經密意者所未能闡發之契經密意今以精微教理無倒揭出依此道理亦顯安立所餘諸法法無我義與前無別披露諸佛最深密意是此論師不共深旨諸有智者當善學習巳二縱是表詮亦非説諸蘊即我即使經説唯見此五蘊是表詮門説蘊是我然亦非説一一蘊皆是我頌曰經説五蘊是我時是諸蘊聚非蘊體經説五蘊是我時是説諸蘊總聚為我非説一一蘊體皆是我如言衆樹為林是説樹聚為林非説一一樹皆是林此是他宗共許之喻若謂許蘊總聚為我者頌曰非依非調非證者由彼無故亦非聚經説我為依怙可調伏為證者若如汝宗則彼蘊聚非是依怙亦非可調伏非是證者以唯蘊聚無實物故故蘊聚亦非我經説我為依怙等如云我自為依怙亦自為怨家若作善作惡我自為證者此説我為依怙為證者又云由善調伏我智者得生天此説我可調伏巳三破救若作是念離有聚法別無總聚能作依怙等果即是有聚法故我作依怙可調伏為證者亦應道理破曰汝之我名時詮蘊聚時詮有聚諸蘊何得如是隨意轉計此過如前已説復有過失頌曰爾時支聚應名車以車與我相等故若計蘊聚為我者爾時車之支分堆聚一處亦應名車以車與我於自支聚安立不安立二者相等故如經云汝墮惡見趣於空行聚中妄執有有情智者遠非有如即攬支聚假想立為車世俗立有情應知攬諸蘊辰二依止餘經解釋蘊聚非我由前説道理頌曰經説依止諸蘊立故唯蘊聚非是我經説依止諸蘊假立有情故唯蘊聚非即是我此以量式立云凡依他法而立者非唯他法支聚依他立故如大種所造如以大種為因安立青等大種所造色與眼等根然彼二法非唯大種相聚如是以蘊為因安立為我説唯蘊聚亦不應理設作是念若經云攬諸蘊聚雖不可説蘊聚即是補特伽羅然經僅云攬諸蘊而無聚字不可證明蘊聚為安立補特伽羅之所依也曰不然經舉喻云如即攬支聚説依支聚假立為車次合法云應如攬諸蘊雖未明説聚字勢必應有故當知智者誦經之文句而生歡喜若謂瓶等不決定者此亦不然説瓶等唯色等聚亦不成故彼亦與觀察我相同如唯我之支聚為不可説為我唯色等支聚亦不可説為瓶等二者相同辰三破蘊聚之形狀為我設作是念唯輪等堆積猶非是車要輪等堆積具足特殊車形乃名為車如是有情身中色等諸蘊之有形狀乃是自我此亦不然頌曰若謂是形色乃有汝應唯説色是我心等諸蘊應非我彼等非有形狀故形狀唯色法乃有汝宗應説唯色法是我心心所等聚應不立為我以心心所等非有形故非色法故辰四計蘊聚為我出餘妨難復有過失頌曰取者取一不應理業與作者亦應一由此取故名能取者即作者我由取此故名所取事即所作五蘊言彼二為一體不應理者謂安立蘊聚為我不應道理倘計色等蘊聚即是我者則作業作者皆應成一然非汝許以大種與所造色瓶與陶師皆應一故中論云若薪即是火作者業則一又云以薪與火理説我與所取及説瓶衣等一切皆如是如不許火與薪為一亦不應計我與所取為一論説彼二相等故設作是念此中全無能取蘊聚之作者唯有所取蘊聚之所作業耳此亦不然頌曰若謂有業無作者不然離作者無業若無作者亦無無因之業故中論云如破作作者應知取亦爾及餘一切法亦應如是破此説以破作業作者有自性之理當知亦破受與受者是有自性言餘法者顯句論云亦破能生所生能去所去能見所見能相所相能出所出支與有支德與有德能量所量等法是自有性智者應知唯是互相觀待而有此中總説一切能作所作別説能量所量非有自性許為觀待而有故此觀待當知更有不共互相觀待之理也言取者此中事字界塢跋札給以羅札字緣猶能取故名之為取若離作用則亦無事故所取能取俱名曰取問曰羅札字緣表由此取之作用云何可説通所取業答如聲明論云枳達與羅札是多分謂多分雖爾然於作業可給羅札字緣故通所取業亦不相違中論亦云我不異於取亦不即是取而復非無取亦不定是無此説我非異所取而有亦非即是所取復非不待所取此我亦非全無故非無作者而有作業勝義空經説無作者有業有報當知是破有自性之作者非破名言支分假立之我如經廣云補特伽羅無明隨轉作諸福行解釋正理論雖説前經於無性宗不相符合於唯識宗極為符順然此宗安立補特伽羅之理謂蘊之自性作者名言中亦無若名言中所有業報則如後經所説能作業之補特伽羅亦定許有故不立所取即我立我為彼之能取者極為善哉辰五佛説依六界等假立為我若計諸蘊積聚即是我者復有過失頌曰佛説依於地水火風識空等六種界及依眼等六觸處假名安立以為我説依心心所立我故非彼等即是我彼等積聚亦非我故彼非是我執境佛於父子相見經中説依於六界謂地水火風識界鼻孔等空界及依六觸處謂眼觸處乃至意觸處假説名我既説依於心心所等法假立為我故非彼地等任何一界即是我亦非彼等積聚即立為我故彼諸法若總若別皆非無始傳來我執心之所緣也經云大王六界六觸處十八意近行是士夫補特伽羅士夫與補特伽羅是異名六界六觸處十八意近行之三者是所具之法補特伽羅是能具之人十八意近行謂緣六種可愛境生六種喜受緣六種不可愛境生六種憂受緣六種中庸境生六種捨受由憂喜捨受之力含意於色聲等境數數馳逐故名意近行如是諸蘊既非俱生我執所緣境離諸蘊外亦無彼之所緣故我執所緣境非有自性諸瑜伽師由見我無自性故亦知我所是無自性即能斷除一切有為生死繫縛不受後有而得涅槃是故五蘊若總若別及離五蘊皆不立為我見所緣然善安立我見所緣補特伽羅依此道理便能安立補特伽羅是自性空此觀察慧是最利根求解脫者至上莊嚴於他宗中皆非有故
